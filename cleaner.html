<style>
:root{
  --bg:#EEF2F1;--surface:#fff;--surface-2:#F7FAF9;--ink:#15211F;--muted:#5E6F6C;--faint:#8A9A97;
  --line:#E2E8E6;--petrol:#0E3B3A;--petrol-2:#17524F;--gold:#C2A567;--danger:#B23A3A;--success:#1F7A5E;--warn:#B9842B;

body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--ink);

.muted{color:var(--muted)} .small{font-size:12.5px}

.c-pending{background:rgba(185,132,43,.15);color:#8a6118} .c-done{background:rgba(47,111,143,.15);color:#245b76}
.c-complete{background:rgba(31,122,94,.15);color:#1f7a5e} .c-cancel{background:rgba(178,58,58,.14);color:#a23}

/* Login */
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:22px;
  background:linear-gradient(160deg,#0E3B3A,#17524F)}
.login-card{background:#fff;border-radius:22px;padding:26px 22px;width:100%;max-width:380px;box-shadow:0 20px 60px -20px rgba(0,0,0,.5)}
.brand{font-size:26px;font-weight:800;letter-spacing:.5px;text-align:center;margin-bottom:2px}
.brand b{color:var(--gold)}
.login-sub{text-align:center;color:var(--muted);font-size:13px;margin-bottom:20px}
.fld{margin-bottom:13px}
.fld label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:5px}
.fld input{width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:12px;font-size:16px;background:var(--surface-2)}
#loginErr{color:var(--danger);font-size:13px;min-height:18px;margin:4px 0 8px;text-align:center}
.login-logo{width:62px;height:62px;border-radius:18px;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:30px;
  background:linear-gradient(135deg,var(--petrol),var(--petrol-2));box-shadow:0 12px 26px -12px rgba(14,59,58,.7)}
.brand{margin-bottom:2px}
.in-group{position:relative;display:flex;align-items:center;margin-bottom:12px}
.in-group .in-ic{position:absolute;left:14px;font-size:15px;opacity:.65;pointer-events:none}
.in-group input{width:100%;padding:14px 14px 14px 42px;border:1.5px solid var(--line);border-radius:14px;font-size:16px;background:var(--surface-2);
  transition:border-color .15s,box-shadow .15s,background .15s}
.in-group input:focus{outline:none;border-color:var(--petrol);background:#fff;box-shadow:0 0 0 4px rgba(14,59,58,.09)}
.in-group input::placeholder{color:var(--faint)}
.in-group .in-eye{position:absolute;right:8px;background:none;border:none;font-size:16px;padding:8px;opacity:.5;line-height:1}
.in-group .in-eye.on{opacity:1}

/* Filter chips */
.fchips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.fchip{padding:7px 14px;border-radius:999px;border:1px solid var(--line);background:#fff;color:var(--muted);font-weight:700;font-size:12.5px}
.fchip.on{background:var(--petrol);color:#fff;border-color:transparent}
.frange{display:flex;gap:8px;margin-bottom:12px}
.frange input,.fsel{flex:1;padding:10px;border:1px solid var(--line);border-radius:10px;background:var(--surface-2);font-size:13px;font-family:inherit}
.fsel{width:100%;margin-bottom:12px}

/* Detail modal */
.modal{position:fixed;inset:0;z-index:60;background:rgba(15,33,31,.5);display:flex;align-items:flex-end;justify-content:center}
.modal .sheet{background:#fff;width:100%;max-width:640px;border-radius:20px 20px 0 0;padding:18px 18px calc(20px + env(safe-area-inset-bottom));max-height:88vh;overflow:auto}

.drow{display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid var(--line);font-size:14px}

.drow .k{color:var(--muted);flex:none}
.drow .v{text-align:right;font-weight:600}

.ocard{cursor:pointer}

/* Topbar */
.topbar{position:sticky;top:0;z-index:20;background:var(--petrol);color:#fff;display:flex;align-items:center;gap:12px;
  padding:14px 16px calc(14px);box-shadow:0 2px 16px -6px rgba(10,43,42,.6)}
.topbar .av{width:38px;height:38px;border-radius:50%;background:var(--gold);color:#3a2f13;display:flex;align-items:center;justify-content:center;font-weight:800;flex:none}
.topbar .nm{font-weight:800;font-size:15px;line-height:1.2}
.topbar .sb{font-size:11.5px;opacity:.85}
.topbar .out{margin-left:auto;background:rgba(255,255,255,.14);border:none;color:#fff;border-radius:10px;padding:8px 12px;font-size:12.5px;font-weight:700}

.wrap{padding:16px;max-width:640px;margin:0 auto}
.h-title{font-size:20px;font-weight:800;margin:2px 0 14px}
.stat{background:linear-gradient(135deg,var(--petrol),var(--petrol-2));color:#fff;border-radius:18px;padding:20px;margin-bottom:14px}
.stat .l{font-size:12.5px;opacity:.85} .stat .v{font-size:30px;font-weight:800;margin-top:4px}
.row{display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:14px}
.row:last-child{border-bottom:none}
.empty{text-align:center;color:var(--faint);padding:28px 10px;font-size:13.5px}

/* Bottom nav */
.nav{position:fixed;left:0;right:0;bottom:0;z-index:30;background:var(--surface);border-top:1px solid var(--line);
  display:flex;padding:6px 4px calc(6px + env(safe-area-inset-bottom));box-shadow:0 -6px 24px -14px rgba(0,0,0,.25)}
.nav button{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px;color:var(--faint);font-size:10.5px;font-weight:700}
.nav button.on{color:var(--petrol)}
.nav .ic{font-size:19px;line-height:1}

/* Absen */
.cam-wrap{position:relative;border-radius:16px;overflow:hidden;background:#000;aspect-ratio:3/4;margin-bottom:12px}
.cam-wrap video,.cam-wrap canvas,.cam-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.gps{font-size:12.5px;color:var(--muted);margin:8px 0 12px;display:flex;align-items:center;gap:6px}
.gps b{color:var(--ink)}
.toast{position:fixed;left:50%;bottom:88px;transform:translateX(-50%);background:#15211F;color:#fff;padding:11px 16px;border-radius:12px;
  font-size:13px;z-index:50;opacity:0;transition:.2s;max-width:90%;text-align:center}
.toast.show{opacity:1}
.seg{display:flex;gap:6px;background:var(--surface-2);border:1px solid var(--line);border-radius:12px;padding:5px;margin-bottom:14px}
.seg button{flex:1;border:none;background:none;padding:8px;border-radius:9px;font-weight:700;font-size:13px;color:var(--muted)}
.seg button.on{background:var(--petrol);color:#fff}
textarea,select,input.f{width:100%;padding:12px;border:1px solid var(--line);border-radius:12px;font-size:15px;background:var(--surface-2);font-family:inherit}
label.fl{display:block;font-size:12px;font-weight:700;color:var(--muted);margin:10px 0 5px}
</style>

<script>
const $=s=>document.querySelector(s);
const rp=n=>'Rp '+(Number(String(n==null?0:n).replace(/[^0-9-]/g,''))||0).toLocaleString('id-ID');
const norm=s=>String(s==null?'':s).trim().toLowerCase();
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const md=n=>Number(String(n==null?'':n).replace(/[^0-9-]/g,''))||0;
function ymd(d){d=d||new Date();const p=n=>String(n).padStart(2,'0');return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate());}
function fmtTgl(s){ s=String(s||''); const m=s.match(/^(\d{4})-(\d{2})-(\d{2})/); if(!m) return s||'-';
  const BL=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
  return (+m[3])+' '+BL[(+m[2])-1]+' '+m[1]; }
function toast(t){ const el=$('#toast'); el.textContent=t; el.classList.add('show'); clearTimeout(window._tt); window._tt=setTimeout(()=>el.classList.remove('show'),2600); }
const HARI_ID=['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
function hariTgl(s){ const m=String(s||'').match(/^(\d{4})-(\d{2})-(\d{2})/); if(!m) return fmtTgl(s);
  const dt=new Date(+m[1],(+m[2])-1,+m[3]); return HARI_ID[dt.getDay()]+', '+fmtTgl(s); }
// Periode gaji: tgl 28 bulan lalu → 27 bulan ini. Jika hari ini ≥28, mulai 28 bulan ini.
function payCycle(now){ now=now||new Date();
  const start = now.getDate()>=28 ? new Date(now.getFullYear(),now.getMonth(),28)
                                  : new Date(now.getFullYear(),now.getMonth()-1,28);
  return { start:ymd(start), end:ymd(now) }; }
function dayOffset(n){ const d=new Date(); d.setDate(d.getDate()+n); return ymd(d); }
// Absen telat: DENPASAR/TABANAN batas 09:16, cabang lain 08:16 (jam segitu ke atas = telat)
function jamToMin(s){ const m=String(s||'').match(/(\d{1,2})[:.](\d{2})/); return m ? (+m[1])*60+(+m[2]) : -1; }
function batasTelatMin(){ const c=norm(ME&&ME.cabang); return (c==='denpasar'||c==='tabanan') ? 9*60+16 : 8*60+16; }
function isTelat(jam){ const j=jamToMin(jam); return j>=0 && j>=batasTelatMin(); }
function batasTelatStr(){ const m=batasTelatMin(); return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0'); }
function inRange(d,start,end){ d=String(d||'').slice(0,10); if(!d) return false;
  if(start && d<start) return false; if(end && d>end) return false; return true; }
// modal
function openModal(html){ $('#modalSheet').innerHTML=html; $('#modal').classList.remove('hide');
  $('#modalSheet').querySelectorAll('[data-close]').forEach(b=>b.onclick=closeModal); }
function closeModal(){ $('#modal').classList.add('hide'); }
$('#modal').addEventListener('click', e=>{ if(e.target.id==='modal') closeModal(); });

let ME=null;         // { id, nama, cabang, email, jabatan, status }
let TAB='overview';
let CAM=null, SHOT=null, GPS=null;

/* ---------- AUTH ---------- */
async function ensureAuth(){
  try{ const s=await window.sb.auth.getSession(); if(s.data.session) return true; }catch(e){}
  try{ const r=await window.sb.auth.signInAnonymously(); if(!r.error) return true; }catch(e){}
  return false;
}
async function doLogin(){
  const email=$('#email').value.trim(); const pin=$('#pin').value.trim();
  $('#loginErr').textContent='';
  if(!email||!pin){ $('#loginErr').textContent='Isi email & PIN.'; return; }
  $('#btnLogin').textContent='Memproses…'; $('#btnLogin').disabled=true;
  try{
    ensureAuth();  // untuk upload foto absen (opsional, tidak wajib untuk login)
    const r=await window.sb.rpc('cleaner_login', { p_email:email, p_pin:pin });
    if(r.error) throw r.error;
    const hit=(r.data||[])[0];
    if(!hit){ $('#loginErr').textContent='Email atau PIN salah.'; return; }
    ME={ id:hit['ID Karyawan'], nama:hit['Nama Lengkap']||email, cabang:hit['Cabang']||'',
         email:hit['Email']||email, jabatan:hit['Jabatan']||'', status:hit['Status']||'' };
    try{ localStorage.setItem('klinklin_cleaner', JSON.stringify(ME)); }catch(e){}
    enterApp();
  }catch(err){ $('#loginErr').textContent='Gagal: '+(err.message||err); }
  finally{ $('#btnLogin').textContent='Masuk'; $('#btnLogin').disabled=false; }
}
function logout(){ localStorage.removeItem('klinklin_cleaner'); ME=null; stopCam();
  $('#app').classList.add('hide'); $('#login').classList.remove('hide'); $('#pin').value=''; }

function enterApp(){
  $('#login').classList.add('hide'); $('#app').classList.remove('hide');
  $('#tName').textContent=ME.nama;
  $('#tSub').textContent=(ME.jabatan||'Cleaner')+(ME.cabang?(' · '+ME.cabang):'');
  $('#avatar').textContent=(ME.nama||'C').charAt(0).toUpperCase();
  switchTab('overview');
}

/* ---------- DATA ---------- */
async function myBonus(){
  try{ const r=await window.sb.rpc('my_bonus', { p_nama:ME.nama }); return r.data||[]; }
  catch(e){ return []; }
}
async function myOrders(){
  try{ const r=await window.sb.rpc('my_orders', { p_nama:ME.nama }); return r.data||[]; }
  catch(e){ return []; }
}
async function myAbsen(){
  try{ const r=await window.sb.rpc('my_absen', { p_email:ME.email, p_nama:ME.nama }); return r.data||[]; }
  catch(e){ return []; }
}

/* ---------- TABS ---------- */
function switchTab(t){ TAB=t; if(t!=='absen') stopCam();
  document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('on', b.dataset.tab===t));
  const v=$('#view'); v.innerHTML='<div class="empty">Memuat…</div>';
  ({overview:renderOverview,kerja:renderKerja,absen:renderAbsen,ajuan:renderAjuan,bonus:renderBonus}[t]||renderOverview)();
}

let ovMode='cycle', ovStart='', ovEnd='';
async function renderOverview(){
  const [bonus, absen] = await Promise.all([myBonus(), myAbsen()]);
  window._ovBonus=bonus; window._ovAbsen=absen;
  paintOverview();
}
function ovRange(){
  if(ovMode==='today')      return { start:dayOffset(0),  end:dayOffset(0),  label:'Hari ini' };
  if(ovMode==='yesterday')  return { start:dayOffset(-1), end:dayOffset(-1), label:'Kemarin' };
  if(ovMode==='range')      return { start:ovStart||'',   end:ovEnd||'',     label:'Rentang tanggal' };
  const c=payCycle(new Date()); return { start:c.start, end:c.end, label:'' };
}
function paintOverview(){
  const bonus=window._ovBonus||[], absen=window._ovAbsen||[];
  const R=ovRange();
  const fb=bonus.filter(b=>inRange(b['Tanggal Pengerjaan'],R.start,R.end));
  const total=fb.reduce((s,b)=>s+md(b['Nominal']),0);
  const fa=absen.filter(a=>inRange(a['Tanggal'],R.start,R.end))
    .sort((a,b)=>String(b['Tanggal']+' '+b['Jam']).localeCompare(String(a['Tanggal']+' '+a['Jam'])));
  const hariMasuk=new Set(fa.filter(a=>norm(a['Tipe'])==='masuk').map(a=>a['Tanggal'])).size;

  let h='<div class="h-title">Halo, '+esc((ME.nama||'').split(' ')[0])+' 👋</div>';
  // filter
  h+='<div class="fchips">'+
     '<button class="fchip'+(ovMode==='cycle'?' on':'')+'" data-ov="cycle">Periode Gaji</button>'+
     '<button class="fchip'+(ovMode==='today'?' on':'')+'" data-ov="today">Hari ini</button>'+
     '<button class="fchip'+(ovMode==='yesterday'?' on':'')+'" data-ov="yesterday">Kemarin</button>'+
     '<button class="fchip'+(ovMode==='range'?' on':'')+'" data-ov="range">Rentang</button>'+
   '</div>';
  if(ovMode==='range'){
    h+='<div class="frange"><input type="date" id="ovS" value="'+esc(ovStart)+'"><input type="date" id="ovE" value="'+esc(ovEnd)+'"></div>';
  }
  // total bonus
  h+='<div class="stat"><div class="l">Total Bonus'+(R.label?(' · '+esc(R.label)):'')+'</div><div class="v">'+rp(total)+'</div>'+
     '<div class="l" style="margin-top:8px">'+fb.length+' bonus'+(R.start?(' · '+esc(fmtTgl(R.start))+' – '+esc(fmtTgl(R.end))):'')+'</div></div>';
  // rincian absen — dikelompokkan per hari
  const byDay={};
  fa.forEach(a=>{ const d=a['Tanggal']; if(!d) return; (byDay[d]=byDay[d]||[]).push(a); });
  const days=Object.keys(byDay).sort().reverse();
  h+='<div class="card"><div style="font-weight:800;margin-bottom:10px">🗓️ Rincian Absen · '+hariMasuk+' hari masuk</div>';
  if(days.length){
    h+=days.slice(0,31).map(d=>{
      const recs=byDay[d];
      const masuk =recs.filter(r=>norm(r['Tipe'])==='masuk' ).sort((a,b)=>jamToMin(a['Jam'])-jamToMin(b['Jam']))[0];
      const pulang=recs.filter(r=>norm(r['Tipe'])==='pulang').sort((a,b)=>jamToMin(b['Jam'])-jamToMin(a['Jam']))[0];
      let masukLine, pulangLine;
      if(masuk){
        const telat=isTelat(masuk['Jam']);
        masukLine='<span>Masuk <b>'+esc(masuk['Jam']||'-')+'</b></span>'+
          '<span class="chip '+(telat?'c-cancel':'c-complete')+'">'+(telat?'Terlambat':'Tepat waktu')+'</span>';
      } else {
        masukLine='<span class="muted">Absen masuk</span><span class="chip c-cancel">Tidak absen masuk</span>';
      }
      if(pulang){
        pulangLine='<span>Pulang <b>'+esc(pulang['Jam']||'-')+'</b></span><span class="chip c-done">Selesai</span>';
      } else if(masuk){
        pulangLine='<span class="muted">Absen pulang</span><span class="chip c-pending">Belum absen pulang</span>';
      } else { pulangLine=''; }
      return '<div style="padding:10px 0;border-bottom:1px solid var(--line)">'+
        '<div style="font-weight:700;margin-bottom:6px">'+esc(hariTgl(d))+'</div>'+
        '<div class="row" style="border:none;padding:3px 0">'+masukLine+'</div>'+
        (pulangLine?'<div class="row" style="border:none;padding:3px 0">'+pulangLine+'</div>':'')+
      '</div>';
    }).join('');
  } else h+='<div class="empty">Belum ada absen pada periode ini.</div>';
  h+='</div>';

  $('#view').innerHTML=h;
  document.querySelectorAll('[data-ov]').forEach(b=>b.onclick=()=>{ ovMode=b.dataset.ov; paintOverview(); });
  const s=$('#ovS'), e=$('#ovE');
  if(s) s.onchange=()=>{ ovStart=s.value; paintOverview(); };
  if(e) e.onchange=()=>{ ovEnd=e.value; paintOverview(); };
}

let kerjaMode='today';
async function renderKerja(){
  window._orders = await myOrders();
  paintKerja();
}
function kerjaRange(){
  if(kerjaMode==='yesterday') return { d:dayOffset(-1), label:'Kemarin' };
  if(kerjaMode==='tomorrow')  return { d:dayOffset(1),  label:'Besok' };
  if(kerjaMode==='all')       return { d:'',            label:'Semua' };
  return { d:dayOffset(0), label:'Hari ini' };
}
function layananText(o){ return [1,2,3].map(i=>{ const n=o['Layanan '+i]; if(!n) return '';
  const q=String(o['Qty '+i]||'').trim(); return n+(q&&q!=='1'?(' ×'+q):''); }).filter(Boolean).join(', ') || o['Keterangan Order'] || '-'; }
function coworkers(o){ return String(o['Nama Cleaner']||'').split(',').map(s=>s.trim())
  .filter(n=>n && norm(n)!==norm(ME.nama)); }
function paintKerja(){
  const R=kerjaRange();
  let orders=(window._orders||[]).slice();
  if(R.d) orders=orders.filter(o=>String(o['Tanggal Pengerjaan']||'').slice(0,10)===R.d);
  orders.sort((a,b)=>String(a['Tanggal Pengerjaan']+' '+(a['Waktu Pengerjaan']||'')).localeCompare(String(b['Tanggal Pengerjaan']+' '+(b['Waktu Pengerjaan']||''))));

  let h='<div class="h-title">Pekerjaan Saya</div>';
  h+='<div class="fchips">'+
     '<button class="fchip'+(kerjaMode==='yesterday'?' on':'')+'" data-kj="yesterday">Kemarin</button>'+
     '<button class="fchip'+(kerjaMode==='today'?' on':'')+'" data-kj="today">Hari ini</button>'+
     '<button class="fchip'+(kerjaMode==='tomorrow'?' on':'')+'" data-kj="tomorrow">Besok</button>'+
     '<button class="fchip'+(kerjaMode==='all'?' on':'')+'" data-kj="all">Semua</button>'+
   '</div>';

  if(!orders.length){ h+='<div class="empty">Tidak ada pekerjaan untuk '+esc(R.label.toLowerCase())+'.</div>'; }
  else h+=orders.map((o,i)=>{ const st=norm(o['Status Order'])||'pending';
    return '<div class="card ocard" data-detail="'+i+'">'+
      '<div style="display:flex;justify-content:space-between;gap:8px;align-items:center;margin-bottom:6px">'+
        '<b>'+esc(o['Nama Customer']||'-')+'</b><span class="chip c-'+st+'">'+st+'</span></div>'+
      '<div class="small muted" style="margin-bottom:6px">'+esc(hariTgl(o['Tanggal Pengerjaan']))+(o['Waktu Pengerjaan']?(' · '+esc(o['Waktu Pengerjaan'])):'')+'</div>'+
      '<div style="font-size:14px;margin-bottom:6px">🧴 '+esc(layananText(o))+'</div>'+
      (coworkers(o).length?'<div class="small" style="margin-bottom:6px">👥 Bareng: '+esc(coworkers(o).join(', '))+'</div>':'')+
      '<div class="small" style="margin-bottom:10px">📍 '+esc(o['Alamat']||'-')+'</div>'+
      '<button class="btn btn-soon" data-map="'+i+'">🗺️ Buka Map (Segera)</button>'+
    '</div>';
  }).join('');

  $('#view').innerHTML=h;
  document.querySelectorAll('[data-kj]').forEach(b=>b.onclick=()=>{ kerjaMode=b.dataset.kj; paintKerja(); });
  // urutan sesuai orders yg sudah difilter
  window._kerjaShown=orders;
  document.querySelectorAll('.ocard[data-detail]').forEach(c=>c.onclick=e=>{
    if(e.target.closest('[data-map]')) return;
    showKerjaDetail(window._kerjaShown[+c.dataset.detail]);
  });
  document.querySelectorAll('[data-map]').forEach(b=>b.onclick=e=>{ e.stopPropagation(); toast('Fitur peta segera hadir'); });
}
function showKerjaDetail(o){
  if(!o) return;
  const st=norm(o['Status Order'])||'pending';
  // Field yang DITAMPILKAN — TANPA No WA Customer & TANPA nominal/harga.
  const rows=[
    ['Status','<span class="chip c-'+st+'">'+st+'</span>'],
    ['Customer', esc(o['Nama Customer']||'-')],
    ['Hari / Tanggal', esc(hariTgl(o['Tanggal Pengerjaan']))],
    ['Jam', esc(o['Waktu Pengerjaan']||'-')],
    ['Alamat', esc(o['Alamat']||'-')],
    ['Layanan', esc(layananText(o))],
    ['Bareng', coworkers(o).length?esc(coworkers(o).join(', ')):'—'],
    ['Metode', esc(o['Metode Pembayaran']||'-')],
    ['Cabang', esc(o['Cabang']||'-')],
    ['Catatan', esc(o['Keterangan Order']||'-')],
  ];
  const html='<div class="mh"><b>Detail Pekerjaan</b><button class="x" data-close>✕</button></div>'+
    rows.map(r=>'<div class="drow"><span class="k">'+r[0]+'</span><span class="v">'+r[1]+'</span></div>').join('')+
    '<button class="btn btn-soon" style="margin-top:14px" onclick="toast(\'Fitur peta segera hadir\')">🗺️ Buka Map (Segera)</button>';
  openModal(html);
}
function waNum(p){ const raw=String(p||'').trim(); const d=raw.replace(/[^0-9]/g,''); if(!d) return '';
  if(/^\s*\+/.test(raw)) return d; if(d[0]==='0') return '62'+d.slice(1); if(d.slice(0,2)==='62') return d; return '62'+d; }

/* ---------- ABSEN ---------- */
async function renderAbsen(){
  SHOT=null; GPS=null;
  const hr=new Date().getHours();
  // Aturan: 05:00–11:59 → Masuk, 12:00+ → Pulang, sebelum 05:00 → belum bisa.
  let tipe = hr<5 ? '' : (hr<12 ? 'Masuk' : 'Pulang');
  if(!tipe){
    $('#view').innerHTML='<div class="h-title">Absen</div>'+
      '<div class="card" style="text-align:center;padding:26px 16px">⏰<div style="font-weight:800;margin-top:8px">Belum waktunya absen</div>'+
      '<div class="small muted" style="margin-top:6px">Absen masuk otomatis mulai <b>jam 5 pagi</b>.</div></div>';
    return;
  }
  // Aturan: hanya SEKALI masuk & SEKALI pulang per hari
  $('#view').innerHTML='<div class="empty">Memuat…</div>';
  const today=ymd();
  const todays=(await myAbsen()).filter(a=>a['Tanggal']===today);
  const sudahMasuk =todays.some(a=>norm(a['Tipe'])==='masuk');
  const sudahPulang=todays.some(a=>norm(a['Tipe'])==='pulang');
  if((tipe==='Masuk'&&sudahMasuk) || (tipe==='Pulang'&&sudahPulang)){
    $('#view').innerHTML='<div class="h-title">Absen</div>'+
      '<div class="card" style="text-align:center;padding:26px 16px">✅<div style="font-weight:800;margin-top:8px">Absen '+tipe+' hari ini sudah tercatat</div>'+
      '<div class="small muted" style="margin-top:6px">Absen '+esc(tipe)+' hanya bisa sekali dalam sehari.</div></div>';
    return;
  }

  const now=new Date(); const jamNow=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  let info;
  if(tipe==='Masuk'){
    info = isTelat(jamNow)
      ? '⚠️ <b>Absen Masuk · Terlambat</b><div class="small muted" style="margin-top:4px">Batas tepat waktu '+batasTelatStr()+'. Sekarang '+jamNow+'.</div>'
      : '🌅 <b>Absen Masuk · Tepat waktu</b><div class="small muted" style="margin-top:4px">Batas tepat waktu '+batasTelatStr()+'.</div>';
  } else {
    info = '🌇 <b>Absen Pulang</b><div class="small muted" style="margin-top:4px">Otomatis, setelah jam 12 siang.</div>';
  }
  $('#view').innerHTML=
    '<div class="h-title">Absen Selfie</div>'+
    '<div class="card" style="padding:12px 14px;margin-bottom:12px">'+info+'</div>'+
    '<div class="cam-wrap" id="camWrap"><video id="cam" autoplay playsinline muted></video></div>'+
    '<div class="gps" id="gpsInfo">📍 Mengambil lokasi GPS…</div>'+
    '<button class="btn btn-gold" id="btnShot">📸 Ambil Foto</button>'+
    '<button class="btn hide" id="btnRetake" style="margin-top:8px">Ulangi Foto</button>'+
    '<button class="btn hide" id="btnKirim" style="margin-top:8px">Kirim Absen '+tipe+'</button>';
  $('#btnShot').onclick=takeShot;
  $('#btnRetake').onclick=()=>renderAbsen();
  $('#btnKirim').onclick=()=>kirimAbsen(tipe);
  startCam();
  getGps();
}
async function startCam(){
  try{ CAM=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:false});
    const v=$('#cam'); if(v){ v.srcObject=CAM; } }
  catch(e){ $('#camWrap').innerHTML='<div class="empty" style="color:#fff">Kamera tidak bisa diakses.<br>Izinkan kamera di browser.</div>'; }
}
function stopCam(){ if(CAM){ CAM.getTracks().forEach(t=>t.stop()); CAM=null; } }
function getGps(){
  if(!navigator.geolocation){ $('#gpsInfo').innerHTML='📍 GPS tidak didukung perangkat.'; return; }
  navigator.geolocation.getCurrentPosition(
    async pos=>{ GPS={lat:pos.coords.latitude,lng:pos.coords.longitude,place:''};
      const koord=GPS.lat.toFixed(5)+', '+GPS.lng.toFixed(5);
      $('#gpsInfo').innerHTML='📍 Lokasi terkunci · <span class="small muted">mencari nama tempat…</span>';
      try{
        const nm=await reverseGeocode(GPS.lat,GPS.lng);
        GPS.place=nm||'';
        $('#gpsInfo').innerHTML='📍 <b>'+esc(nm||'Lokasi tidak dikenal')+'</b><br><span class="small muted">'+koord+'</span>';
      }catch(e){ $('#gpsInfo').innerHTML='📍 <b>'+koord+'</b>'; }
    },
    err=>{ $('#gpsInfo').innerHTML='📍 <span style="color:#B23A3A">Gagal ambil GPS ('+esc(err.message)+'). Izinkan lokasi.</span>'; },
    {enableHighAccuracy:true,timeout:10000});
}
async function reverseGeocode(lat,lng){
  const url='https://api.bigdatacloud.net/data/reverse-geocode-client?latitude='+lat+'&longitude='+lng+'&localityLanguage=id';
  const r=await fetch(url); const j=await r.json();
  const parts=[j.locality, j.city, j.principalSubdivision].filter(Boolean);
  return [...new Set(parts)].join(', ');
}
function takeShot(){
  const v=$('#cam'); if(!v||!v.videoWidth){ toast('Kamera belum siap'); return; }
  const c=document.createElement('canvas'); c.width=v.videoWidth; c.height=v.videoHeight;
  c.getContext('2d').drawImage(v,0,0,c.width,c.height);
  SHOT=c.toDataURL('image/jpeg',0.85);
  stopCam();
  const wrap=$('#camWrap'); wrap.innerHTML='<img src="'+SHOT+'">';
  $('#btnShot').classList.add('hide'); $('#btnRetake').classList.remove('hide'); $('#btnKirim').classList.remove('hide');
}
async function kirimAbsen(tipe){
  if(!SHOT){ toast('Ambil foto dulu'); return; }
  $('#btnKirim').textContent='Mengirim…'; $('#btnKirim').disabled=true;
  try{
    // upload foto
    let foto='';
    try{
      const blob=await (await fetch(SHOT)).blob();
      const path='absen/'+ymd()+'-'+(ME.id||'x')+'-'+Date.now()+'.jpg';
      const up=await window.sb.storage.from('bukti').upload(path, blob, {contentType:'image/jpeg'});
      if(!up.error){ foto=window.sb.storage.from('bukti').getPublicUrl(path).data.publicUrl; }
    }catch(e){}
    const now=new Date();
    const rec={ 'ID Karyawan':ME.id, 'Nama':ME.nama, 'Cabang':ME.cabang, email:ME.email,
      'Tanggal':ymd(now), 'Jam':String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0'),
      'Tipe':tipe, foto:foto, lat:GPS?GPS.lat:null, lng:GPS?GPS.lng:null };
    const r=await window.sb.from('ABSEN').insert(rec);
    if(r.error) throw r.error;
    toast('Absen '+tipe+' berhasil ✓');
    renderAbsen();
  }catch(err){ toast('Gagal: '+(err.message||err)); $('#btnKirim').textContent='Kirim Absen'; $('#btnKirim').disabled=false; }
}

/* ---------- AJUAN ---------- */
async function renderAjuan(){
  let h='<div class="h-title">Ajuan</div>'+
    '<div class="card">'+
      '<label class="fl">Jenis Ajuan</label>'+
      '<select id="ajJenis"><option>Izin</option><option>Cuti</option><option>Sakit</option><option>Perlengkapan</option><option>Keluhan</option><option>Lainnya</option></select>'+
      '<label class="fl">Tanggal</label><input class="f" type="date" id="ajTgl" value="'+ymd()+'">'+
      '<label class="fl">Pesan / Keterangan</label><textarea id="ajPesan" rows="4" placeholder="Tulis ajuan kamu…"></textarea>'+
      '<button class="btn" id="btnAjuan" style="margin-top:12px">Kirim Ajuan</button>'+
    '</div>'+
    '<div style="font-weight:800;margin:6px 2px 8px">Riwayat Ajuan</div><div id="ajList"><div class="empty">Memuat…</div></div>';
  $('#view').innerHTML=h;
  $('#btnAjuan').onclick=kirimAjuan;
  loadAjuan();
}
async function loadAjuan(){
  try{ const r=await window.sb.rpc('my_ajuan', { p_email:ME.email });
    const rows=(r.data||[]).sort((a,b)=>String(b.created_at||'').localeCompare(String(a.created_at||'')));
    $('#ajList').innerHTML = rows.length ? rows.map(a=>'<div class="card"><div style="display:flex;justify-content:space-between"><b>'+esc(a['Jenis']||'-')+'</b><span class="chip c-pending">'+esc(a['Status']||'Baru')+'</span></div>'+
      '<div class="small muted" style="margin:4px 0">'+esc(fmtTgl(a['Tanggal']))+'</div><div>'+esc(a['Pesan']||'')+'</div></div>').join('')
      : '<div class="empty">Belum ada ajuan.</div>';
  }catch(e){ $('#ajList').innerHTML='<div class="empty">Belum ada ajuan.</div>'; }
}
async function kirimAjuan(){
  const jenis=$('#ajJenis').value, tgl=$('#ajTgl').value, pesan=$('#ajPesan').value.trim();
  if(!pesan){ toast('Isi pesan ajuan'); return; }
  $('#btnAjuan').textContent='Mengirim…'; $('#btnAjuan').disabled=true;
  try{
    const r=await window.sb.from('AJUAN').insert({ 'Nama':ME.nama,'Cabang':ME.cabang,email:ME.email,'Jenis':jenis,'Pesan':pesan,'Tanggal':tgl,'Status':'Baru' });
    if(r.error) throw r.error;
    toast('Ajuan terkirim ✓'); $('#ajPesan').value=''; loadAjuan();
  }catch(err){ toast('Gagal: '+(err.message||err)); }
  finally{ $('#btnAjuan').textContent='Kirim Ajuan'; $('#btnAjuan').disabled=false; }
}

/* ---------- BONUS ---------- */
let bMode='cycle', bJenis='', bStart='', bEnd='';
async function renderBonus(){
  window._bonus = await myBonus();
  paintBonus();
}
function bRange(){
  if(bMode==='today')     return { start:dayOffset(0),  end:dayOffset(0) };
  if(bMode==='yesterday') return { start:dayOffset(-1), end:dayOffset(-1) };
  if(bMode==='range')     return { start:bStart||'',    end:bEnd||'' };
  if(bMode==='all')       return { start:'', end:'' };
  const c=payCycle(new Date()); return { start:c.start, end:c.end };   // 'cycle' = 28 bln lalu → hari ini
}
function paintBonus(){
  const all=(window._bonus||[]).slice();
  const jenisList=[...new Set(all.map(b=>String(b['Jenis']||'').trim()).filter(Boolean))].sort();
  const R=bRange();
  let bonus = (R.start||R.end) ? all.filter(b=>inRange(b['Tanggal Pengerjaan'],R.start,R.end)) : all.slice();
  if(bJenis) bonus=bonus.filter(b=>norm(b['Jenis'])===norm(bJenis));
  bonus.sort((a,b)=>String(b['Tanggal Pengerjaan']||'').localeCompare(String(a['Tanggal Pengerjaan']||'')));
  const total=bonus.reduce((s,b)=>s+md(b['Nominal']),0);

  let h='<div class="h-title">Bonus / Insentif</div>';
  h+='<div class="fchips">'+
     '<button class="fchip'+(bMode==='cycle'?' on':'')+'" data-b="cycle">Periode</button>'+
     '<button class="fchip'+(bMode==='all'?' on':'')+'" data-b="all">Semua</button>'+
     '<button class="fchip'+(bMode==='today'?' on':'')+'" data-b="today">Hari ini</button>'+
     '<button class="fchip'+(bMode==='yesterday'?' on':'')+'" data-b="yesterday">Kemarin</button>'+
     '<button class="fchip'+(bMode==='range'?' on':'')+'" data-b="range">Rentang</button>'+
   '</div>';
  if(bMode==='range'){
    h+='<div class="frange"><input type="date" id="bS" value="'+esc(bStart)+'"><input type="date" id="bE" value="'+esc(bEnd)+'"></div>';
  }
  h+='<select class="fsel" id="bJ"><option value="">Semua jenis bonus</option>'+
     jenisList.map(j=>'<option'+(norm(j)===norm(bJenis)?' selected':'')+'>'+esc(j)+'</option>').join('')+'</select>';
  h+='<div class="stat"><div class="l">Total Bonus</div><div class="v">'+rp(total)+'</div><div class="l" style="margin-top:6px">'+bonus.length+' bonus</div></div>';
  if(!bonus.length){ h+='<div class="empty">Tidak ada bonus untuk filter ini.</div>'; }
  else h+=bonus.map(b=>'<div class="card"><div style="display:flex;justify-content:space-between;align-items:center">'+
    '<b>'+esc(b['Jenis']||'Bonus')+'</b><b style="color:var(--success)">'+rp(b['Nominal'])+'</b></div>'+
    '<div class="small muted" style="margin-top:4px">'+esc(fmtTgl(b['Tanggal Pengerjaan']))+(b['Nama Customer']?(' · '+esc(b['Nama Customer'])):'')+(b['No Order']?(' · '+esc(b['No Order'])):'')+'</div></div>').join('');

  $('#view').innerHTML=h;
  document.querySelectorAll('[data-b]').forEach(x=>x.onclick=()=>{ bMode=x.dataset.b; paintBonus(); });
  const s=$('#bS'), e=$('#bE'), j=$('#bJ');
  if(s) s.onchange=()=>{ bStart=s.value; paintBonus(); };
  if(e) e.onchange=()=>{ bEnd=e.value; paintBonus(); };
  if(j) j.onchange=()=>{ bJenis=j.value; paintBonus(); };
}

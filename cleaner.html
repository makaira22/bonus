.in-group input{width:100%;padding:14px 14px 14px 42px;border:1.5px solid var(--line);border-radius:14px;font-size:16px;background:var(--surface-2);

.in-group .in-eye{position:absolute;right:8px;background:none;border:none;font-size:16px;padding:8px;opacity:.5;line-height:1}
.in-group .in-eye.on{opacity:1}

.fchip{padding:7px 14px;border-radius:999px;border:1px solid var(--line);background:#fff;color:var(--muted);font-weight:700;font-size:12.5px}
.fchip.on{background:var(--petrol);color:#fff;border-color:transparent}
.btn-more{width:100%;padding:12px;border:1px solid var(--line);background:#fff;color:var(--petrol);border-radius:12px;font-weight:800;font-size:13.5px;margin-top:2px}

function ic(n,cls){ return '<svg class="i'+(cls?' '+cls:'')+'" viewBox="0 0 24 24" aria-hidden="true">'+(IC[n]||'')+'</svg>'; }
const rp=n=>'Rp '+(Number(String(n==null?0:n).replace(/[^0-9-]/g,''))||0).toLocaleString('id-ID');
const norm=s=>String(s==null?'':s).trim().toLowerCase();
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const md=n=>Number(String(n==null?'':n).replace(/[^0-9-]/g,''))||0;
function ymd(d){d=d||new Date();const p=n=>String(n).padStart(2,'0');return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate());}
function fmtTgl(s){ s=String(s||''); const m=s.match(/^(\d{4})-(\d{2})-(\d{2})/); if(!m) return s||'-';
  const BL=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
  return (+m[3])+' '+BL[(+m[2])-1]+' '+m[1]; }
function toast(t){ const el=$('#toast'); el.textContent=t; el.classList.add('show'); clearTimeout(window._tt); window._tt=setTimeout(()=>el.classList.remove('show'),2600); }
const HARI_ID=['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
function hariTgl(s){ const m=String(s||'').match(/^(\d{4})-(\d{2})-(\d{2})/); if(!m) return fmtTgl(s);
  const dt=new Date(+m[1],(+m[2])-1,+m[3]); return HARI_ID[dt.getDay()]+', '+fmtTgl(s); }
// Periode gaji: tgl 28 bulan lalu → 27 bulan ini. Jika hari ini ≥28, mulai 28 bulan ini.
function payCycle(now){ now=now||new Date();
  const start = now.getDate()>=28 ? new Date(now.getFullYear(),now.getMonth(),28)
                                  : new Date(now.getFullYear(),now.getMonth()-1,28);
  return { start:ymd(start), end:ymd(now) }; }
function dayOffset(n){ const d=new Date(); d.setDate(d.getDate()+n); return ymd(d); }
// Absen telat: DENPASAR/TABANAN batas 09:16, cabang lain 08:16 (jam segitu ke atas = telat)
function jamToMin(s){ const m=String(s||'').match(/(\d{1,2})[:.](\d{2})/); return m ? (+m[1])*60+(+m[2]) : -1; }

/* ---------- ATURAN ABSEN (diatur HRD di ERP → Pengaturan → Aturan Absensi) ----------
   Kolom ABSEN_ATURAN: Cabang, Jam Masuk, Toleransi Telat, Jam Pulang,
                       Latitude, Longitude, Radius (meter).
   Bila cabang belum diatur → pakai aturan cadangan seperti sebelumnya.        */
let ATURAN=null;
const RADIUS_DEFAULT=5;   // meter — dipakai bila HRD belum mengisi Radius
async function loadAturan(){
  try{
    const r=await window.sb.from('ABSEN_ATURAN').select('*').eq('Cabang', ME.cabang);
    ATURAN=(r.data||[])[0]||null;
  }catch(e){ ATURAN=null; }
  return ATURAN;
}
function aturNum(k, dflt){
  const raw=String((ATURAN&&ATURAN[k])||'').trim();
  if(!raw) return dflt;
  const n=Number(raw.replace(/[^0-9.\-]/g,''));
  return isFinite(n) ? n : dflt;
}
/* Batas absen masuk (menit) = Jam Masuk + Toleransi Telat. Lewat ini = telat. */
function batasTelatMin(){
  if(ATURAN && String(ATURAN['Jam Masuk']||'').trim()){
    const m=jamToMin(ATURAN['Jam Masuk']);
    if(m>=0) return m + aturNum('Toleransi Telat',0);
  }
  const c=norm(ME&&ME.cabang);                       // cadangan: aturan lama
  return (c==='denpasar'||c==='tabanan') ? 9*60+15 : 8*60+15;
}
function isTelat(jam){ const j=jamToMin(jam); return j>=0 && j>batasTelatMin(); }
function batasTelatStr(){ const m=batasTelatMin(); return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0'); }
/* Titik kantor + radius izin absen. */
function titikKantor(){
  if(!ATURAN) return null;
  const la=Number(String(ATURAN['Latitude']||'').trim()), ln=Number(String(ATURAN['Longitude']||'').trim());
  if(!isFinite(la) || !isFinite(ln) || (la===0 && ln===0)) return null;
  return { lat:la, lng:ln, radius: Math.max(1, aturNum('Radius', RADIUS_DEFAULT)) };
}
/* Jarak dua titik GPS dalam meter (rumus Haversine). */
function jarakMeter(lat1,lng1,lat2,lng2){
  const R=6371000, rad=x=>x*Math.PI/180;
  const dLat=rad(lat2-lat1), dLng=rad(lng2-lng1);
  const a=Math.sin(dLat/2)*Math.sin(dLat/2)+
          Math.cos(rad(lat1))*Math.cos(rad(lat2))*Math.sin(dLng/2)*Math.sin(dLng/2);
  return 2*R*Math.asin(Math.min(1,Math.sqrt(a)));
}
function fmtJarak(m){ return m>=1000 ? (m/1000).toFixed(2)+' km' : Math.round(m)+' m'; }
function inRange(d,start,end){ d=String(d||'').slice(0,10); if(!d) return false;
  if(start && d<start) return false; if(end && d>end) return false; return true; }

let ovMode='cycle', ovStart='', ovEnd='', ovAbsLimit=15;
async function renderOverview(){
  const [bonus, absen] = await Promise.all([myBonus(), myAbsen()]);
  window._ovBonus=bonus; window._ovAbsen=absen;
  paintOverview();
}
function ovRange(){
  if(ovMode==='today')      return { start:dayOffset(0),  end:dayOffset(0),  label:'Hari ini' };
  if(ovMode==='yesterday')  return { start:dayOffset(-1), end:dayOffset(-1), label:'Kemarin' };
  if(ovMode==='range')      return { start:ovStart||'',   end:ovEnd||'',     label:'Rentang tanggal' };
  const c=payCycle(new Date()); return { start:c.start, end:c.end, label:'' };
}
function paintOverview(){
  const bonus=window._ovBonus||[], absen=window._ovAbsen||[];
  const R=ovRange();
  const fb=bonus.filter(b=>inRange(b['Tanggal Pengerjaan'],R.start,R.end));
  const total=fb.reduce((s,b)=>s+md(b['Nominal']),0);
  const fa=absen.filter(a=>inRange(a['Tanggal'],R.start,R.end))
    .sort((a,b)=>String(b['Tanggal']+' '+b['Jam']).localeCompare(String(a['Tanggal']+' '+a['Jam'])));

  let h='<div class="h-title">Halo, '+esc((ME.nama||'').split(' ')[0])+'</div>';
  // filter
  h+='<div class="fchips">'+
     '<button class="fchip'+(ovMode==='cycle'?' on':'')+'" data-ov="cycle">Periode</button>'+
     '<button class="fchip'+(ovMode==='today'?' on':'')+'" data-ov="today">Hari ini</button>'+
     '<button class="fchip'+(ovMode==='yesterday'?' on':'')+'" data-ov="yesterday">Kemarin</button>'+
     '<button class="fchip'+(ovMode==='range'?' on':'')+'" data-ov="range">Rentang</button>'+
   '</div>';
  if(ovMode==='range'){
    h+='<div class="frange"><input type="date" id="ovS" value="'+esc(ovStart)+'"><input type="date" id="ovE" value="'+esc(ovEnd)+'"></div>';
  }
  // total bonus
  h+='<div class="stat"><div class="l">Total Bonus'+(R.label?(' · '+esc(R.label)):'')+'</div><div class="v">'+rp(total)+'</div>'+
     '<div class="l" style="margin-top:8px">'+fb.length+' bonus'+(R.start?(' · '+esc(fmtTgl(R.start))+' – '+esc(fmtTgl(R.end))):'')+'</div></div>';
  // ---- Rincian absen: dikelompokkan per hari, lalu diringkas ----
  const byDay={};
  fa.forEach(a=>{ const d=a['Tanggal']; if(!d) return; (byDay[d]=byDay[d]||[]).push(a); });
  const days=Object.keys(byDay).sort().reverse();
  // Ringkas tiap hari → { tgl, masuk, pulang, telat }
  const hari=days.map(d=>{
    const recs=byDay[d];
    const masuk =recs.filter(r=>norm(r['Tipe'])==='masuk' ).sort((a,b)=>jamToMin(a['Jam'])-jamToMin(b['Jam']))[0]||null;
    const pulang=recs.filter(r=>norm(r['Tipe'])==='pulang').sort((a,b)=>jamToMin(b['Jam'])-jamToMin(a['Jam']))[0]||null;
    return { tgl:d, masuk, pulang, telat: masuk ? isTelat(masuk['Jam']) : false };
  });
  const nLengkap    = hari.filter(x=>x.masuk && x.pulang).length;   // absen sesuai aturan (masuk + pulang)
  const nTelat      = hari.filter(x=>x.telat).length;
  const nTanpaMasuk = hari.filter(x=>!x.masuk).length;
  const nTanpaPulang= hari.filter(x=>x.masuk && !x.pulang).length;

  h+='<div class="card"><div style="font-weight:800;margin-bottom:10px">'+ic('calendar','i-lead')+'Rincian Absen</div>'+
     '<div class="astat">'+
       '<div class="as"><div class="as-v">'+nLengkap+'</div><div class="as-l">Hari absen<br><span class="as-n">masuk + pulang</span></div></div>'+
       '<div class="as"><div class="as-v as-warn">'+nTelat+'</div><div class="as-l">Telat<br><span class="as-n">lewat '+esc(batasTelatStr())+'</span></div></div>'+
       '<div class="as"><div class="as-v as-bad">'+nTanpaMasuk+'</div><div class="as-l">Tidak absen<br><span class="as-n">masuk</span></div></div>'+
       '<div class="as"><div class="as-v as-bad">'+nTanpaPulang+'</div><div class="as-l">Tidak absen<br><span class="as-n">pulang</span></div></div>'+
     '</div>';

  // ---- Detail per hari: 15 dulu, sisanya lewat tombol ----
  const shown=hari.slice(0, ovAbsLimit);
  if(shown.length){
    h+='<div class="as-sep">Detail</div>';
    h+=shown.map(x=>{
      let masukLine, pulangLine;
      if(x.masuk){
        masukLine='<span>Masuk <b>'+esc(x.masuk['Jam']||'-')+'</b></span>'+
          '<span class="chip '+(x.telat?'c-cancel':'c-complete')+'">'+(x.telat?'Terlambat':'Tepat waktu')+'</span>';
      } else {
        masukLine='<span class="muted">Absen masuk</span><span class="chip c-cancel">Tidak absen masuk</span>';
      }
      if(x.pulang){
        pulangLine='<span>Pulang <b>'+esc(x.pulang['Jam']||'-')+'</b></span><span class="chip c-done">Selesai</span>';
      } else if(x.masuk){
        pulangLine='<span class="muted">Absen pulang</span><span class="chip c-pending">Belum absen pulang</span>';
      } else { pulangLine=''; }
      return '<div style="padding:10px 0;border-bottom:1px solid var(--line)">'+
        '<div style="font-weight:700;margin-bottom:6px">'+esc(hariTgl(x.tgl))+'</div>'+
        '<div class="row" style="border:none;padding:3px 0">'+masukLine+'</div>'+
        (pulangLine?'<div class="row" style="border:none;padding:3px 0">'+pulangLine+'</div>':'')+
      '</div>';
    }).join('');
    if(hari.length>shown.length){
      h+='<button class="btn-more" id="absMore" style="margin-top:10px">Muat lebih banyak ('+(hari.length-shown.length)+' lagi)</button>';
    }
  } else h+='<div class="empty">Belum ada absen pada periode ini.</div>';
  h+='</div>';

  $('#view').innerHTML=h;
  document.querySelectorAll('[data-ov]').forEach(b=>b.onclick=()=>{ ovMode=b.dataset.ov; ovAbsLimit=15; paintOverview(); });
  const am=$('#absMore'); if(am) am.onclick=()=>{ ovAbsLimit+=15; paintOverview(); };
  const s=$('#ovS'), e=$('#ovE');
  if(s) s.onchange=()=>{ ovStart=s.value; ovAbsLimit=15; paintOverview(); };
  if(e) e.onchange=()=>{ ovEnd=e.value; ovAbsLimit=15; paintOverview(); };
}

/* ---------- ABSEN ---------- */
async function renderAbsen(){
  SHOT=null; GPS=null;
  const hr=new Date().getHours();
  // Aturan: 05:00–11:59 → Masuk, 12:00+ → Pulang, sebelum 05:00 → belum bisa.
  let tipe = hr<5 ? '' : (hr<12 ? 'Masuk' : 'Pulang');
  if(!tipe){
    $('#view').innerHTML='<div class="h-title">Absen</div>'+
      '<div class="card" style="text-align:center;padding:26px 16px">'+ic('clock','i-lg')+'<div style="font-weight:800;margin-top:8px">Belum waktunya absen</div>'+
      '<div class="small muted" style="margin-top:6px">Absen masuk otomatis mulai <b>jam 5 pagi</b>.</div></div>';
    return;
  }
  // Aturan: hanya SEKALI masuk & SEKALI pulang per hari
  $('#view').innerHTML='<div class="empty">Memuat…</div>';
  await loadAturan();                       // aturan terbaru dari HRD
  const today=ymd();
  const todays=(await myAbsen()).filter(a=>a['Tanggal']===today);
  const sudahMasuk =todays.some(a=>norm(a['Tipe'])==='masuk');
  const sudahPulang=todays.some(a=>norm(a['Tipe'])==='pulang');
  if((tipe==='Masuk'&&sudahMasuk) || (tipe==='Pulang'&&sudahPulang)){
    $('#view').innerHTML='<div class="h-title">Absen</div>'+
      '<div class="card" style="text-align:center;padding:26px 16px">'+ic('check','i-lg')+'<div style="font-weight:800;margin-top:8px">Absen '+tipe+' hari ini sudah tercatat</div>'+
      '<div class="small muted" style="margin-top:6px">Absen '+esc(tipe)+' hanya bisa sekali dalam sehari.</div></div>';
    return;
  }

  const now=new Date(); const jamNow=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  const K=titikKantor();
  let info;
  if(tipe==='Masuk'){
    info = isTelat(jamNow)
      ? ic('alert','i-lead')+'<b>Absen Masuk · Terlambat</b><div class="small muted" style="margin-top:4px">Batas tepat waktu '+batasTelatStr()+'. Sekarang '+jamNow+'.</div>'
      : ic('sunrise','i-lead')+'<b>Absen Masuk · Tepat waktu</b><div class="small muted" style="margin-top:4px">Batas tepat waktu '+batasTelatStr()+'.</div>';
  } else {
    const jp = ATURAN && String(ATURAN['Jam Pulang']||'').trim();
    info = ic('sunset','i-lead')+'<b>Absen Pulang</b><div class="small muted" style="margin-top:4px">'+
           (jp ? ('Jam pulang '+esc(String(jp).slice(0,5))+'.') : 'Otomatis, setelah jam 12 siang.')+'</div>';
  }
  const aturanInfo = K
    ? '<div class="small muted" style="margin-top:6px">'+ic('target','i-lead')+'Harus berada maksimal <b>'+K.radius+' m</b> dari titik kantor '+esc(ME.cabang||'')+'.</div>'
    : '<div class="small muted" style="margin-top:6px">'+ic('target','i-lead')+'Titik kantor belum diatur HRD — absen tidak dibatasi jarak.</div>';

  $('#view').innerHTML=
    '<div class="h-title">Absen Selfie</div>'+
    '<div class="card" style="padding:12px 14px;margin-bottom:12px">'+info+aturanInfo+'</div>'+
    '<div class="cam-wrap" id="camWrap"><video id="cam" autoplay playsinline muted></video></div>'+
    '<div class="gps" id="gpsInfo">'+ic('pin','i-lead')+'Mengambil lokasi GPS…</div>'+
    '<button class="btn btn-gold" id="btnShot">'+ic('camera','i-lead')+'Ambil Foto</button>'+
    '<button class="btn hide" id="btnRetake" style="margin-top:8px">Ulangi Foto</button>'+
    '<button class="btn hide" id="btnKirim" style="margin-top:8px">Kirim Absen '+tipe+'</button>'+
    '<button class="btn btn-ghost hide" id="btnUlangGps" style="margin-top:8px">'+ic('refresh','i-lead')+'Cek Ulang Lokasi</button>';
  $('#btnShot').onclick=takeShot;
  $('#btnRetake').onclick=()=>renderAbsen();
  $('#btnKirim').onclick=()=>kirimAbsen(tipe);
  $('#btnUlangGps').onclick=()=>{ GPS=null; $('#gpsInfo').innerHTML=ic('pin','i-lead')+'Mengambil lokasi GPS…'; getGps(); };
  startCam();
  getGps();
}
/* Kunci tombol Kirim + tutup kamera bila di luar radius kantor / GPS belum siap. */
function updateAbsenGate(){
  const K=titikKantor();
  const btn=$('#btnKirim');
  const boleh = !K || !!(GPS && GPS.ok);        // titik belum diatur → tidak dibatasi
  if(btn){ btn.disabled=!boleh; btn.style.opacity = boleh ? '' : '.5'; }
  paintCamLock(K, boleh);
}
/* Tirai gelap menutupi kotak kamera + pesan "di luar kantor". */
function paintCamLock(K, boleh){
  const wrap=$('#camWrap'); if(!wrap) return;
  const old=wrap.querySelector('.cam-lock'); if(old) old.remove();
  const shot=$('#btnShot');
  if(boleh){                                    // di dalam radius → kamera dibuka
    if(shot && !SHOT) shot.classList.remove('hide');
    if(!CAM && !SHOT){                          // nyalakan ulang kamera bila sempat dimatikan
      if(!wrap.querySelector('video')) wrap.innerHTML='<video id="cam" autoplay playsinline muted></video>';
      startCam();
    }
    return;
  }
  let t,d,j='';
  if(!GPS){                                     // GPS belum didapat / ditolak
    t='Menunggu lokasi'; d='Aktifkan izin lokasi di HP, lalu tekan “Cek Ulang Lokasi”.';
  }else{
    t='Di luar area kantor';
    j=fmtJarak(GPS.dist)+' dari kantor';
    d='Absen hanya bisa dilakukan maksimal <b>'+K.radius+' m</b> dari titik kantor '+esc(ME.cabang||'')+'. Mendekat ke kantor lalu tekan “Cek Ulang Lokasi”.';
  }
  const div=document.createElement('div');
  div.className='cam-lock';
  div.innerHTML=ic('ban')+'<div class="cl-t">'+t+'</div>'+
    (j?'<div class="cl-j">'+esc(j)+'</div>':'')+'<div class="cl-d">'+d+'</div>';
  wrap.appendChild(div);
  stopCam();                                    // hentikan kamera, hemat baterai
  if(shot) shot.classList.add('hide');          // tidak bisa ambil foto dari luar area
}
async function startCam(){
  try{ CAM=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:false});
    const v=$('#cam'); if(v){ v.srcObject=CAM; } }
  catch(e){ $('#camWrap').innerHTML='<div class="empty" style="color:#fff">Kamera tidak bisa diakses.<br>Izinkan kamera di browser.</div>'; }
}
function stopCam(){ if(CAM){ CAM.getTracks().forEach(t=>t.stop()); CAM=null; } }
function getGps(){
  if(!navigator.geolocation){ $('#gpsInfo').innerHTML=ic('pin','i-lead')+'GPS tidak didukung perangkat.'; return; }
  navigator.geolocation.getCurrentPosition(
    async pos=>{
      GPS={ lat:pos.coords.latitude, lng:pos.coords.longitude, acc:pos.coords.accuracy||null, place:'', dist:null, ok:true };
      const K=titikKantor();
      if(K){
        GPS.dist = jarakMeter(GPS.lat, GPS.lng, K.lat, K.lng);
        GPS.ok   = GPS.dist <= K.radius;
      }
      paintGps();                       // tampil cepat dulu (tanpa nama tempat)
      updateAbsenGate();
      const ug=$('#btnUlangGps'); if(ug) ug.classList.remove('hide');
      try{ GPS.place=(await reverseGeocode(GPS.lat, GPS.lng))||''; paintGps(); }catch(e){}
    },
    err=>{ GPS=null; updateAbsenGate();
      $('#gpsInfo').innerHTML=ic('pin','i-lead')+'<span style="color:#B23A3A">Gagal ambil GPS ('+esc(err.message)+'). Izinkan lokasi.</span>';
      const ug=$('#btnUlangGps'); if(ug) ug.classList.remove('hide');
    },
    {enableHighAccuracy:true, timeout:15000, maximumAge:0});
}
/* Gambar kotak info GPS: nama tempat, koordinat, akurasi, dan jarak ke kantor. */
function paintGps(){
  const box=$('#gpsInfo'); if(!box || !GPS) return;
  const K=titikKantor();
  const koord=GPS.lat.toFixed(5)+', '+GPS.lng.toFixed(5);
  const akur=GPS.acc!=null ? (' · akurasi ±'+Math.round(GPS.acc)+' m') : '';
  let h=ic('pin','i-lead')+'<b>'+esc(GPS.place||'Mencari nama tempat…')+'</b>'+
        '<br><span class="small muted">'+koord+akur+'</span>';
  if(K && GPS.dist!=null){
    h += GPS.ok
      ? '<div class="gps-ok">'+ic('check','i-lead')+'<b>'+fmtJarak(GPS.dist)+'</b> dari kantor — dalam batas '+K.radius+' m.</div>'
      : '<div class="gps-bad">'+ic('ban','i-lead')+'<b>'+fmtJarak(GPS.dist)+'</b> dari kantor — maksimal <b>'+K.radius+' m</b>.'+
        '<br><span class="small">Mendekat ke titik kantor lalu tekan “Cek Ulang Lokasi”.</span></div>';
  }
  box.innerHTML=h;
}
async function reverseGeocode(lat,lng){
  // Utama: Nominatim (OpenStreetMap) — detail sampai nama jalan / lingkungan (RT/RW bila ada di peta)
  try{
    const u='https://nominatim.openstreetmap.org/reverse?format=jsonv2&addressdetails=1&zoom=18&lat='+lat+'&lon='+lng;
    const r=await fetch(u,{headers:{'Accept-Language':'id'}});
    if(r.ok){
      const j=await r.json(); const a=j.address||{};
      const parts=[
        [a.road, a.house_number?('No. '+a.house_number):''].filter(Boolean).join(' '),
        a.neighbourhood||a.quarter||a.hamlet,     // sering memuat RT/RW / nama lingkungan
        a.suburb||a.village||a.town,              // kelurahan/desa
        a.city_district,                          // kecamatan
        a.city||a.county||a.municipality,         // kota/kabupaten
      ].filter(Boolean);
      const uniq=[...new Set(parts)];
      if(uniq.length) return uniq.join(', ');
      if(j.display_name) return j.display_name;
    }
  }catch(e){}
  // Cadangan: BigDataCloud (kalau Nominatim gagal)
  try{
    const u2='https://api.bigdatacloud.net/data/reverse-geocode-client?latitude='+lat+'&longitude='+lng+'&localityLanguage=id';
    const r2=await fetch(u2); const j2=await r2.json();
    return [...new Set([j2.locality,j2.city,j2.principalSubdivision].filter(Boolean))].join(', ');
  }catch(e){ return ''; }
}
function takeShot(){
  const v=$('#cam'); if(!v||!v.videoWidth){ toast('Kamera belum siap'); return; }
  const maxW=640;                                   // kecilkan resolusi (cukup untuk verifikasi wajah)
  const scale=Math.min(1, maxW/v.videoWidth);
  const w=Math.round(v.videoWidth*scale), hh=Math.round(v.videoHeight*scale);
  const c=document.createElement('canvas'); c.width=w; c.height=hh;
  c.getContext('2d').drawImage(v,0,0,w,hh);
  SHOT=c.toDataURL('image/jpeg',0.5);               // kompres kuat, ukuran file kecil
  stopCam();
  const wrap=$('#camWrap'); wrap.innerHTML='<img src="'+SHOT+'">';
  $('#btnShot').classList.add('hide'); $('#btnRetake').classList.remove('hide'); $('#btnKirim').classList.remove('hide');
  updateAbsenGate();
}
async function kirimAbsen(tipe){
  if(!SHOT){ toast('Ambil foto dulu'); return; }
  // Pemeriksaan terakhir: harus di dalam radius titik kantor (bila HRD sudah mengaturnya).
  const K=titikKantor();
  if(K){
    if(!GPS){ toast('Lokasi GPS belum didapat. Tekan “Cek Ulang Lokasi”.'); return; }
    if(!GPS.ok){ toast('Terlalu jauh dari kantor ('+fmtJarak(GPS.dist)+'). Maksimal '+K.radius+' m.'); return; }
  }
  $('#btnKirim').textContent='Mengirim…'; $('#btnKirim').disabled=true;
  try{
    // upload foto
    let foto='';
    try{
      const blob=await (await fetch(SHOT)).blob();
      const path='absen/'+ymd()+'-'+(ME.id||'x')+'-'+Date.now()+'.jpg';
      const up=await window.sb.storage.from('bukti').upload(path, blob, {contentType:'image/jpeg'});
      if(!up.error){ foto=window.sb.storage.from('bukti').getPublicUrl(path).data.publicUrl; }
    }catch(e){}
    const now=new Date();
    const rec={ 'ID Karyawan':ME.id, 'Nama':ME.nama, 'Cabang':ME.cabang, email:ME.email,
      'Tanggal':ymd(now), 'Jam':String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0'),
      'Tipe':tipe, foto:foto, lat:GPS?GPS.lat:null, lng:GPS?GPS.lng:null };
    const r=await window.sb.from('ABSEN').insert(rec);
    if(r.error) throw r.error;
    toast('Absen '+tipe+' berhasil ✓');
    renderAbsen();
  }catch(err){ toast('Gagal: '+(err.message||err)); $('#btnKirim').textContent='Kirim Absen'; $('#btnKirim').disabled=false; }
}

/* ---------- AJUAN ---------- */
async function renderAjuan(){
  let h='<div class="h-title">Ajuan</div>'+
    '<div class="card">'+
      '<label class="fl">Jenis Ajuan</label>'+
      '<select id="ajJenis"><option>Izin</option><option>Cuti</option><option>Sakit</option><option>Tukar Libur</option></select>'+
      '<div id="ajTukarWrap" class="hide"><label class="fl">Tukar libur dengan</label>'+
        '<select id="ajCleaner" class="fsel"><option value="">Pilih cleaner…</option></select></div>'+
      '<label class="fl">Tanggal</label><input class="f" type="date" id="ajTgl" value="'+ymd()+'">'+
      '<label class="fl">Pesan / Keterangan</label><textarea id="ajPesan" rows="4" placeholder="Tulis ajuan kamu…"></textarea>'+
      '<button class="btn" id="btnAjuan" style="margin-top:12px">Kirim Ajuan</button>'+
    '</div>'+
    '<div style="font-weight:800;margin:6px 2px 8px">Riwayat Ajuan</div><div id="ajList"><div class="empty">Memuat…</div></div>';
  $('#view').innerHTML=h;
  $('#ajJenis').onchange=()=>{ const tk=$('#ajJenis').value==='Tukar Libur';
    $('#ajTukarWrap').classList.toggle('hide', !tk);
    if(tk && $('#ajCleaner').options.length<=1) loadCleanerOpts();
  };
  $('#btnAjuan').onclick=kirimAjuan;
  loadAjuan();
}
async function loadCleanerOpts(){
  const sel=$('#ajCleaner'); if(!sel) return;
  sel.innerHTML='<option value="">Memuat…</option>';
  try{ const r=await window.sb.rpc('cleaners_by_cabang',{ p_cabang:ME.cabang });
    const names=(r.data||[]).map(x=>x['Nama Lengkap']).filter(n=>n && norm(n)!==norm(ME.nama));
    sel.innerHTML='<option value="">Pilih cleaner…</option>'+names.map(n=>'<option>'+esc(n)+'</option>').join('');
  }catch(e){ sel.innerHTML='<option value="">Gagal memuat daftar</option>'; }
}
async function loadAjuan(){
  try{ const r=await window.sb.rpc('my_ajuan', { p_email:ME.email });
    const rows=(r.data||[]).sort((a,b)=>String(b.created_at||'').localeCompare(String(a.created_at||'')));
    $('#ajList').innerHTML = rows.length ? rows.map(a=>'<div class="card"><div style="display:flex;justify-content:space-between"><b>'+esc(a['Jenis']||'-')+'</b><span class="chip c-pending">'+esc(a['Status']||'Baru')+'</span></div>'+
      '<div class="small muted" style="margin:4px 0">'+esc(fmtTgl(a['Tanggal']))+'</div>'+(a['Nama Cleaner']?'<div class="small" style="margin-bottom:4px">'+ic('swap','i-lead')+'Tukar dengan: <b>'+esc(a['Nama Cleaner'])+'</b></div>':'')+'<div>'+esc(a['Pesan']||'')+'</div></div>').join('')
      : '<div class="empty">Belum ada ajuan.</div>';
  }catch(e){ $('#ajList').innerHTML='<div class="empty">Belum ada ajuan.</div>'; }
}
async function kirimAjuan(){
  const jenis=$('#ajJenis').value, tgl=$('#ajTgl').value, pesan=$('#ajPesan').value.trim();
  const tukar = jenis==='Tukar Libur';
  const cleaner = tukar && $('#ajCleaner') ? $('#ajCleaner').value : '';
  if(!pesan){ toast('Isi pesan ajuan'); return; }
  if(tukar && !cleaner){ toast('Pilih cleaner untuk tukar libur'); return; }
  $('#btnAjuan').textContent='Mengirim…'; $('#btnAjuan').disabled=true;
  try{
    const rec={ 'Nama':ME.nama,'Cabang':ME.cabang,email:ME.email,'Jenis':jenis,'Pesan':pesan,'Tanggal':tgl,'Status':'Baru' };
    if(tukar) rec['Nama Cleaner']=cleaner;
    const r=await window.sb.from('AJUAN').insert(rec);
    if(r.error) throw r.error;
    toast('Ajuan terkirim ✓'); $('#ajPesan').value=''; loadAjuan();
  }catch(err){ toast('Gagal: '+(err.message||err)); }
  finally{ $('#btnAjuan').textContent='Kirim Ajuan'; $('#btnAjuan').disabled=false; }
}

/* ---------- BONUS ---------- */
let bMode='cycle', bJenis='', bStart='', bEnd='', bLimit=15;
async function renderBonus(){
  window._bonus = await myBonus();
  paintBonus();
}
function bRange(){
  if(bMode==='today')     return { start:dayOffset(0),  end:dayOffset(0) };
  if(bMode==='yesterday') return { start:dayOffset(-1), end:dayOffset(-1) };
  if(bMode==='range')     return { start:bStart||'',    end:bEnd||'' };
  if(bMode==='all')       return { start:'', end:'' };
  const c=payCycle(new Date()); return { start:c.start, end:c.end };   // 'cycle' = 28 bln lalu → hari ini
}
function paintBonus(){
  const all=(window._bonus||[]).slice();
  const jenisList=[...new Set(all.map(b=>String(b['Jenis']||'').trim()).filter(Boolean))].sort();
  const R=bRange();
  let bonus = (R.start||R.end) ? all.filter(b=>inRange(b['Tanggal Pengerjaan'],R.start,R.end)) : all.slice();
  if(bJenis) bonus=bonus.filter(b=>norm(b['Jenis'])===norm(bJenis));
  bonus.sort((a,b)=>String(b['Tanggal Pengerjaan']||'').localeCompare(String(a['Tanggal Pengerjaan']||'')));
  const total=bonus.reduce((s,b)=>s+md(b['Nominal']),0);

  let h='<div class="h-title">Bonus / Insentif</div>';
  h+='<div class="fchips">'+
     '<button class="fchip'+(bMode==='cycle'?' on':'')+'" data-b="cycle">Periode</button>'+
     '<button class="fchip'+(bMode==='all'?' on':'')+'" data-b="all">Semua</button>'+
     '<button class="fchip'+(bMode==='today'?' on':'')+'" data-b="today">Hari ini</button>'+
     '<button class="fchip'+(bMode==='yesterday'?' on':'')+'" data-b="yesterday">Kemarin</button>'+
     '<button class="fchip'+(bMode==='range'?' on':'')+'" data-b="range">Rentang</button>'+
   '</div>';
  if(bMode==='range'){
    h+='<div class="frange"><input type="date" id="bS" value="'+esc(bStart)+'"><input type="date" id="bE" value="'+esc(bEnd)+'"></div>';
  }
  h+='<select class="fsel" id="bJ"><option value="">Semua jenis bonus</option>'+
     jenisList.map(j=>'<option'+(norm(j)===norm(bJenis)?' selected':'')+'>'+esc(j)+'</option>').join('')+'</select>';
  h+='<div class="stat"><div class="l">Total Bonus</div><div class="v">'+rp(total)+'</div><div class="l" style="margin-top:6px">'+bonus.length+' bonus</div></div>';
  // rincian subtotal per jenis (urut: Kilometer, Deep Clean, Salon, lalu lainnya)
  if(bonus.length){
    const byJenis={};
    bonus.forEach(b=>{ const j=(String(b['Jenis']||'').trim()||'Lainnya'); byJenis[j]=(byJenis[j]||0)+md(b['Nominal']); });
    const rank=j=>{ const n=norm(j); if(n.includes('kilometer'))return 0; if(n.includes('deep'))return 1; if(n.includes('salon'))return 2; return 3; };
    const keys=Object.keys(byJenis).sort((a,b)=>{ const ra=rank(a),rb=rank(b); if(ra!==rb) return ra-rb; return a.localeCompare(b,'id'); });
    h+='<div class="card"><div style="font-weight:800;margin-bottom:6px">Rincian per Jenis</div>'+
       keys.map(k=>'<div class="row"><span>'+esc(k)+'</span><b style="color:var(--success)">'+rp(byJenis[k])+'</b></div>').join('')+'</div>';
  }
  const shown = bonus.slice(0, bLimit);
  if(!bonus.length){ h+='<div class="empty">Tidak ada bonus untuk filter ini.</div>'; }
  else h+=shown.map(b=>{
    const ket=String(b['Keterangan']||'').trim();
    return '<div class="card"><div style="display:flex;justify-content:space-between;align-items:center">'+
    '<b>'+esc(b['Jenis']||'Bonus')+'</b><b style="color:var(--success)">'+rp(b['Nominal'])+'</b></div>'+
    '<div class="small muted" style="margin-top:4px">'+esc(hariTgl(b['Tanggal Pengerjaan']))+(b['Jam']?(' · '+esc(b['Jam'])):'')+(b['Nama Customer']?(' · '+esc(b['Nama Customer'])):'')+'</div>'+
    (ket?'<div class="bket">'+esc(ket)+'</div>':'')+
    '</div>';
  }).join('');
  if(bonus.length>shown.length) h+='<button class="btn-more" id="bonusMore">Muat lebih banyak ('+(bonus.length-shown.length)+' lagi)</button>';

  $('#view').innerHTML=h;
  document.querySelectorAll('[data-b]').forEach(x=>x.onclick=()=>{ bMode=x.dataset.b; bLimit=15; paintBonus(); });
  const bm=$('#bonusMore'); if(bm) bm.onclick=()=>{ bLimit+=15; paintBonus(); };
  const s=$('#bS'), e=$('#bE'), j=$('#bJ');
  if(s) s.onchange=()=>{ bStart=s.value; bLimit=15; paintBonus(); };
  if(e) e.onchange=()=>{ bEnd=e.value; bLimit=15; paintBonus(); };
  if(j) j.onchange=()=>{ bJenis=j.value; bLimit=15; paintBonus(); };
}

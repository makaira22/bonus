<style>
:root{
  --bg:#EEF2F1; --surface:#FFFFFF; --surface-2:#F7FAF9;
  --ink:#15211F; --muted:#5E6F6C; --faint:#8A9A97;
  --line:#E2E8E6; --line-2:#D2DBD9;
  --petrol:#0E3B3A; --petrol-2:#17524F; --petrol-3:#0a2b2a;
  --gold:#C2A567; --gold-deep:#A6863F; --gold-soft:#F0E7D2;
  --success:#1F7A5E; --warn:#B9842B; --danger:#B23A3A; --info:#2F6F8F;
  --radius:16px; --radius-sm:11px;
  --shadow:0 1px 2px rgba(15,40,38,.05), 0 8px 28px -14px rgba(15,40,38,.22);
  --shadow-lg:0 24px 60px -28px rgba(10,43,42,.5);
  --display:"Fraunces", Georgia, serif;
  --ui:"Plus Jakarta Sans", system-ui, -apple-system, sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:var(--ui); color:var(--ink); background:var(--bg);
  font-size:14.5px; line-height:1.5; -webkit-font-smoothing:antialiased;
  min-height:100vh; min-height:100dvh;
}
button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit}
input,select,textarea{font-family:inherit; font-size:14.5px; color:var(--ink)}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:#cfd9d7;border-radius:9px}
.hide{display:none !important}

/* ---------- LOGIN ---------- */
#login{
  position:fixed; inset:0; display:grid; place-items:center; padding:24px;
  background:
    radial-gradient(1200px 600px at 12% -10%, rgba(194,165,103,.18), transparent 55%),
    radial-gradient(900px 600px at 110% 110%, rgba(23,82,79,.55), transparent 50%),
    linear-gradient(160deg, var(--petrol-3), var(--petrol) 60%, #093332);
  overflow:auto;
}
.login-card{
  width:min(380px,100%); background:var(--surface); border-radius:24px;
  padding:34px 30px 30px; box-shadow:var(--shadow-lg);
  border:1px solid rgba(255,255,255,.5);
}
.brand{display:flex; align-items:center; gap:12px; justify-content:center; margin-bottom:6px}
.brand .mark{width:46px;height:46px;flex:none}
.brand .name{font-family:var(--display); font-weight:600; font-size:25px; letter-spacing:.4px}
.brand .name b{color:var(--gold-deep); font-weight:600}
.login-card .sub{text-align:center; color:var(--muted); font-size:13px; margin:2px 0 22px;
  letter-spacing:.18em; text-transform:uppercase; font-weight:600}
.pin-wrap{position:relative; margin-bottom:14px}
.login-field{margin-bottom:14px;text-align:left}
.login-field label{display:block;font-size:12px;font-weight:700;color:var(--muted);
  letter-spacing:.03em;margin:0 0 6px 3px}
.lf-box{position:relative}
.lf-box .lf-ic{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;
  color:var(--faint);pointer-events:none;transition:.18s}
.login-input{
  width:100%; text-align:left; letter-spacing:.01em; font-weight:500; font-size:15px;
  font-family:var(--ui); color:var(--ink);
  padding:14px 44px 14px 42px; border:1.5px solid var(--line-2); border-radius:13px;
  background:var(--surface-2); outline:none; transition:.18s;
}
.login-input::placeholder{color:var(--faint); font-weight:500; letter-spacing:.01em}
.login-input:focus{border-color:var(--petrol); background:#fff; box-shadow:0 0 0 4px rgba(14,59,58,.08)}
.lf-box:focus-within .lf-ic{color:var(--petrol)}
.pin-input{
  width:100%; text-align:center; letter-spacing:.32em; font-weight:700;
  padding:15px 44px 15px 16px; border:1.5px solid var(--line-2); border-radius:14px;
  background:var(--surface-2); outline:none; transition:.18s; font-size:17px;
}
.pin-input:focus{border-color:var(--petrol); background:#fff; box-shadow:0 0 0 4px rgba(14,59,58,.08)}
.pin-eye{position:absolute; right:8px; top:50%; transform:translateY(-50%); padding:8px; color:var(--faint)}
.pin-eye svg{width:19px;height:19px;display:block}
.pin-eye:hover{color:var(--petrol)}
.keypad{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:6px 0 4px}
.key{
  padding:15px 0; border-radius:13px; font-weight:600; font-size:18px;
  background:var(--surface-2); border:1px solid var(--line); transition:.12s;
}
.key:active{transform:scale(.96); background:var(--gold-soft); border-color:var(--gold)}
.key.fn{font-size:13px; color:var(--muted); font-weight:600}
.btn-login{
  width:100%; margin-top:14px; padding:15px; border-radius:14px; font-weight:700; font-size:15px;
  background:linear-gradient(180deg,var(--petrol-2),var(--petrol)); color:#fff;
  letter-spacing:.02em; transition:.15s; box-shadow:0 10px 24px -12px rgba(14,59,58,.7);
}
.btn-login:active{transform:translateY(1px)}
.login-err{color:var(--danger); font-size:13px; text-align:center; min-height:18px; margin-top:10px; font-weight:600}
.login-foot{text-align:center; margin-top:18px; font-size:12px; color:var(--faint)}
.login-foot a{color:var(--gold-deep); text-decoration:none; font-weight:600; cursor:pointer}

/* ---------- APP SHELL ---------- */
#app{display:none; min-height:100vh; min-height:100dvh}
.topbar{
  position:sticky; top:0; z-index:30; display:flex; align-items:center; gap:14px;
  padding:12px 18px; background:var(--petrol);
  color:#fff; box-shadow:0 2px 18px -6px rgba(10,43,42,.6);
}
.topbar .mark{width:34px;height:34px;flex:none}
.topbar .tt{font-family:var(--display); font-weight:600; font-size:19px; letter-spacing:.3px}
.topbar .tt b{color:var(--gold)}
.role-chip{
  margin-left:auto; display:flex; align-items:center; gap:8px; font-size:12.5px; font-weight:600;
  background:rgba(255,255,255,.1); padding:7px 12px; border-radius:30px; letter-spacing:.04em;
}
.role-chip .dot{width:7px;height:7px;border-radius:50%;background:var(--gold)}
.icon-btn{width:38px;height:38px;display:grid;place-items:center;border-radius:11px;
  background:rgba(255,255,255,.1);transition:.15s}
.icon-btn:active{background:rgba(255,255,255,.22)}

.layout{display:flex; min-height:calc(100dvh - 58px)}
.sidebar{
  width:230px; flex:none; padding:20px 14px; background:var(--surface);
  border-right:1px solid var(--line); position:sticky; top:58px; height:calc(100dvh - 58px);
  overflow:auto;
}
.side-label{font-size:11px;font-weight:700;letter-spacing:.16em;color:var(--faint);
  text-transform:uppercase; padding:4px 12px 10px}
.nav-item{
  display:flex; align-items:center; gap:12px; padding:12px 14px; border-radius:12px;
  color:var(--muted); font-weight:600; transition:.13s; margin-bottom:4px; width:100%; text-align:left;
}
.nav-item svg{width:19px;height:19px;flex:none;opacity:.8}
.nav-item:hover{background:var(--surface-2); color:var(--ink)}
.nav-item.active{background:var(--petrol); color:#fff; box-shadow:0 8px 18px -10px rgba(14,59,58,.7)}
.nav-item.active svg{opacity:1}
.main{flex:1; padding:26px 30px 60px; overflow:auto; max-width:100%}
.bottom-nav{display:none}

/* ---------- PAGE HEAD ---------- */
.page-head{display:flex; align-items:flex-end; gap:16px; flex-wrap:wrap; margin-bottom:20px}
.page-title{font-family:var(--display); font-size:30px; font-weight:600; letter-spacing:.2px; line-height:1.1}
.page-sub{color:var(--muted); font-size:13px; margin-top:3px}
.hairline{height:1px;background:linear-gradient(90deg,var(--gold),transparent);width:60px;margin:9px 0 0;border-radius:2px}
.spacer{flex:1}
.btn{
  display:inline-flex; align-items:center; gap:8px; padding:11px 16px; border-radius:12px;
  font-weight:600; font-size:13.5px; transition:.14s; white-space:nowrap;
}
.btn svg{width:17px;height:17px}
.btn-primary{background:linear-gradient(180deg,var(--petrol-2),var(--petrol));color:#fff;
  box-shadow:0 10px 22px -12px rgba(14,59,58,.7)}
.btn-primary:active{transform:translateY(1px)}
.btn-ghost{background:var(--surface); border:1px solid var(--line-2); color:var(--ink)}
.btn-ghost:hover{border-color:var(--petrol)}
.btn-gold{background:linear-gradient(180deg,#d4b878,var(--gold-deep)); color:#3a2e10;
  box-shadow:0 10px 22px -12px rgba(166,134,63,.8)}
.btn-sm{padding:8px 12px; font-size:12.5px; border-radius:10px}

/* ---------- TOOLBAR / FILTERS ---------- */
.toolbar{display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:18px}
.search{position:relative; flex:1; min-width:210px}
.search svg{position:absolute; left:13px; top:50%; transform:translateY(-50%); width:17px; color:var(--faint)}
.search input{width:100%; padding:11px 13px 11px 38px; border:1px solid var(--line-2);
  border-radius:12px; background:var(--surface); outline:none; transition:.15s}
.search input:focus{border-color:var(--petrol); box-shadow:0 0 0 4px rgba(14,59,58,.07)}
.fl{display:flex; align-items:center; gap:6px}
.fl select,.fl input{padding:10px 12px; border:1px solid var(--line-2); border-radius:11px;
  background:var(--surface); outline:none; transition:.15s; max-width:170px}
.fl select:focus,.fl input:focus{border-color:var(--petrol)}
.fl .lbl{font-size:11px; font-weight:700; color:var(--faint); text-transform:uppercase; letter-spacing:.08em}

/* ---------- TABLE / CARDS ---------- */
.panel{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
  box-shadow:var(--shadow); overflow:hidden}
.tbl-wrap{overflow-x:auto}
table{width:100%; border-collapse:collapse; min-width:640px}
th{font-size:11px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--faint);
  text-align:left; padding:14px 16px; background:var(--surface-2); border-bottom:1px solid var(--line);
  white-space:nowrap; position:sticky; top:0}
td{padding:13px 16px; border-bottom:1px solid var(--line); vertical-align:middle; white-space:nowrap}
tr:last-child td{border-bottom:none}
tbody tr{transition:.1s}
tbody tr:hover{background:var(--surface-2)}
td.money{font-variant-numeric:tabular-nums; font-weight:600}
.thp{font-family:var(--display); font-weight:600; color:var(--petrol); font-size:15.5px; font-variant-numeric:tabular-nums}
.avatar{width:38px;height:38px;border-radius:50%;object-fit:cover;background:var(--gold-soft);
  border:2px solid var(--gold-soft); display:grid; place-items:center; font-weight:700; color:var(--gold-deep)}
.thumb{width:38px;height:38px;border-radius:9px;object-fit:cover;border:1px solid var(--line)}
.flink{color:var(--info); font-weight:600; text-decoration:none; font-size:12.5px}
.badge{display:inline-flex; align-items:center; gap:6px; padding:5px 11px; border-radius:30px;
  font-size:11.5px; font-weight:700; letter-spacing:.02em; text-transform:capitalize}
.badge .d{width:6px;height:6px;border-radius:50%}
.b-pending{background:#FBF1DD;color:var(--warn)} .b-pending .d{background:var(--warn)}
.b-done{background:#E2EEF4;color:var(--info)} .b-done .d{background:var(--info)}
.b-complete{background:#E1F1EA;color:var(--success)} .b-complete .d{background:var(--success)}
.b-cancel{background:#F6E3E3;color:var(--danger)} .b-cancel .d{background:var(--danger)}
.row-act{display:flex;gap:6px;justify-content:flex-end}
.act-ic{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;
  background:var(--surface-2);border:1px solid var(--line);transition:.13s}
.act-ic:hover{border-color:var(--petrol);color:var(--petrol)}
.act-ic svg{width:16px;height:16px}
.empty{padding:60px 24px; text-align:center; color:var(--muted)}
.empty svg{width:46px;height:46px;color:var(--line-2);margin-bottom:12px}
.empty b{display:block;color:var(--ink);font-size:16px;margin-bottom:4px;font-family:var(--display);font-weight:600}
.count{font-size:12.5px;color:var(--muted);margin:14px 2px 0;font-weight:600}

/* ---------- MODAL ---------- */
.overlay{position:fixed; inset:0; background:rgba(10,30,29,.5); backdrop-filter:blur(3px);
  z-index:60; display:none; align-items:flex-start; justify-content:center; padding:30px 16px; overflow:auto}
.overlay.open{display:flex}
.modal{width:min(720px,100%); background:var(--surface); border-radius:20px;
  box-shadow:var(--shadow-lg); overflow:hidden; animation:rise .22s ease}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.modal-head{display:flex;align-items:center;gap:12px;padding:20px 24px;
  border-bottom:1px solid var(--line); background:var(--surface-2)}
.modal-head h3{margin:0;font-family:var(--display);font-weight:600;font-size:21px}
.modal-head .x{margin-left:auto;width:36px;height:36px;border-radius:10px;display:grid;place-items:center}
.modal-head .x:hover{background:var(--line)}
.modal-body{padding:22px 24px; max-height:66vh; overflow:auto}
.form-grid{display:grid; grid-template-columns:1fr 1fr; gap:14px 16px}
.field{display:flex;flex-direction:column;gap:6px}
.field.full{grid-column:1 / -1}
.field label{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.02em}
.field label .req{color:var(--danger)}
.field input,.field select,.field textarea{
  padding:11px 12px; border:1px solid var(--line-2); border-radius:11px;
  background:var(--surface); outline:none; transition:.15s; width:100%;
}
.field input:focus,.field select:focus,.field textarea:focus{
  border-color:var(--petrol); box-shadow:0 0 0 4px rgba(14,59,58,.07)}
.field input[readonly],.field.computed input{background:var(--surface-2); color:var(--muted); font-weight:600}
.field.computed input{color:var(--petrol)}
.field textarea{resize:vertical;min-height:62px}
.field label.chk{display:flex;align-items:center;gap:9px;font-size:14px;font-weight:600;color:var(--ink);
  cursor:pointer;padding:11px 12px;border:1px solid var(--line-2);border-radius:11px;background:var(--surface)}
.field label.chk input{width:18px;height:18px;accent-color:var(--petrol);cursor:pointer}
.os-wrap{position:relative}
.os-input{cursor:text}
.os-list{display:none;position:absolute;top:calc(100% + 6px);left:0;right:0;z-index:50;max-height:260px;overflow:auto;
  background:var(--surface);border:1px solid var(--line-2);border-radius:12px;box-shadow:var(--shadow-lg);padding:6px}
.os-list.open{display:block}
.os-item{padding:9px 10px;border-radius:9px;cursor:pointer;display:flex;flex-direction:column;gap:1px}
.os-item:hover{background:var(--surface-2)}
.os-item b{font-size:13px;color:var(--ink)}
.os-item span{font-size:11.5px;color:var(--muted)}
.os-empty{padding:10px;font-size:12.5px;color:var(--faint)}
.file-row{display:flex;align-items:center;gap:10px}
.file-row .prev{width:42px;height:42px;border-radius:10px;object-fit:cover;border:1px solid var(--line);display:none}
.file-btn{display:inline-flex;align-items:center;gap:7px;padding:10px 13px;border:1px dashed var(--line-2);
  border-radius:11px;background:var(--surface-2);font-size:12.5px;font-weight:600;color:var(--muted)}
.file-btn:hover{border-color:var(--petrol);color:var(--petrol)}
.file-name{font-size:12px;color:var(--info);font-weight:600;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.modal-foot{display:flex;gap:10px;justify-content:flex-end;padding:18px 24px;border-top:1px solid var(--line);background:var(--surface-2)}
.sec-title{grid-column:1/-1;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:var(--gold-deep);margin:6px 0 -2px;display:flex;align-items:center;gap:10px}
.sec-title::after{content:"";flex:1;height:1px;background:var(--line)}

/* ---------- TOAST ---------- */
#toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(40px);
  background:var(--ink);color:#fff;padding:13px 20px;border-radius:13px;font-weight:600;font-size:13.5px;
  z-index:90;opacity:0;transition:.25s;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:9px}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.err{background:var(--danger)} #toast.ok{background:var(--success)}
.spin{width:34px;height:34px;border:3px solid rgba(255,255,255,.25);border-top-color:#fff;
  border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* ---------- SYNC CHIP (kecil, pojok) ---------- */
#sync{position:fixed;left:18px;bottom:18px;z-index:85;display:none;align-items:center;gap:9px;
  background:var(--petrol);color:#fff;padding:9px 14px;border-radius:30px;font-size:12.5px;font-weight:600;
  box-shadow:0 12px 30px -14px rgba(10,43,42,.7);border:1px solid rgba(255,255,255,.12);
  letter-spacing:.01em;max-width:80vw}
#sync.show{display:inline-flex;animation:rise .2s ease}
#sync .s{width:14px;height:14px;border:2.5px solid rgba(255,255,255,.3);border-top-color:var(--gold);
  border-radius:50%;animation:sp .7s linear infinite;flex:none}
#sync.done .s{display:none}
#sync.done{background:var(--success)}
@media (max-width:880px){ #sync{bottom:78px} }

/* ---------- IMAGE POPUP ---------- */
#imgPop{position:fixed;inset:0;z-index:95;display:none;align-items:center;justify-content:center;
  padding:24px;background:rgba(8,24,23,.82);backdrop-filter:blur(4px);cursor:zoom-out}
#imgPop.show{display:flex;animation:rise .18s ease}
#imgPop img{max-width:92vw;max-height:88vh;border-radius:14px;background:#fff;
  box-shadow:var(--shadow-lg);object-fit:contain;cursor:default}
.imgpop-close{position:fixed;top:16px;right:16px;z-index:96;width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,.16);color:#fff;font-size:26px;line-height:1;display:grid;place-items:center;
  backdrop-filter:blur(4px);transition:.15s}
.imgpop-close:hover{background:rgba(255,255,255,.3)}

/* ---------- SETTINGS ---------- */
.set-row{width:100%;display:flex;align-items:center;gap:14px;padding:14px 14px;border-radius:12px;
  text-align:left;transition:.12s}
.set-row:hover{background:var(--surface-2)}
.set-row+.set-row{border-top:1px solid var(--line)}
.set-ic{width:40px;height:40px;border-radius:11px;background:var(--bg);border:1px solid var(--line);
  display:grid;place-items:center;color:var(--petrol);flex:none}
.set-ic svg{width:19px;height:19px}
.set-txt{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.set-t{font-weight:700;color:var(--ink)}
.set-d{font-size:12px;color:var(--muted)}
.set-arrow{color:var(--faint);flex:none}
.set-arrow svg{width:17px;height:17px}

/* ---------- DESIGNER: fly catch game ---------- */
.fly-arena{position:relative;height:min(62vh,520px);border-radius:18px;overflow:hidden;
  background:
    radial-gradient(120% 90% at 20% 0%, #f4faf7 0%, rgba(244,250,247,0) 55%),
    repeating-linear-gradient(45deg, var(--surface) 0 22px, var(--surface-2) 22px 44px);
  border:1px solid var(--line);box-shadow:var(--shadow-sm);cursor:crosshair;touch-action:none}
.fly-hint{position:absolute;top:14px;left:0;right:0;text-align:center;font-weight:700;
  font-size:14px;color:var(--muted);pointer-events:none;user-select:none}
.fly{position:absolute;left:0;top:0;width:76px;height:auto;display:flex;flex-direction:column;align-items:center;gap:2px;
  transition:left .18s cubic-bezier(.34,1.4,.5,1), top .18s cubic-bezier(.34,1.4,.5,1);will-change:left,top;user-select:none}

  let subtotal=[1,2,3].reduce((s,i)=>s+Number(o['Harga '+i]||0),0);

  const disc=Number(o['Diskon (%)']||0);
  const diskonNilai=Math.round(subtotal*disc/100);
  const afterDisc=subtotal-diskonNilai;
  const ppn=Number((o['PPn']!=null&&o['PPn']!=='')?o['PPn']:0);
  const ppnNilai=Math.round(afterDisc*ppn/100);
  let grand=Number(o['Total Akhir Setelah Diskon']||0);
  if(!grand) grand=afterDisc+ppnNilai;
  return {subtotal, diskonNilai, ppnNilai, grand};

const TABLE_ID = { KARYAWAN:'ID Karyawan', GAJI:'ID Slip', ORDER:'ID Order',
                   BONUS:'ID Insentif', LAYANAN:'ID Layanan' };
function nowStr_(){ const d=new Date(), p=n=>String(n).padStart(2,'0');
  return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes()); }

async function api(payload){
  const sb = window.sb;
  const a = payload.action;
  try{
    if(a==='list'){
      let q = sb.from(payload.sheet).select('*');
      const f = payload.filters||{};
      for(const k in f){ if(f[k]!=='' && f[k]!=null) q=q.eq(k, f[k]); }
      if(payload.statusIn && payload.statusField) q=q.in(payload.statusField, payload.statusIn);
      if(payload.dateField && payload.dateStart)  q=q.gte(payload.dateField, payload.dateStart);
      if(payload.dateField && payload.dateEnd)    q=q.lte(payload.dateField, payload.dateEnd);
      const {data,error}=await q; if(error) throw error;
      return {ok:true, data:data||[]};
    }
    if(a==='create'){
      const {data,error}=await sb.from(payload.sheet).insert(payload.data).select().single();
      if(error) throw error;
      const idf=TABLE_ID[payload.sheet];
      return {ok:true, id: idf? data[idf] : '', data};
    }
    if(a==='update'){
      const idf=payload.idField||TABLE_ID[payload.sheet];
      const {error}=await sb.from(payload.sheet).update(payload.data).eq(idf, payload.id);
      if(error) throw error;
      return {ok:true, id:payload.id};
    }
    if(a==='upsert'){
      const {error}=await sb.from(payload.sheet)
        .upsert(payload.data, {onConflict:(payload.keyFields||[]).join(',')});
      if(error) throw error;
      return {ok:true};
    }
    if(a==='approveOrder'){
      const {data:cur,error:e1}=await sb.from('ORDER').select('"Status Order"').eq('ID Order', payload.id).single();
      if(e1) throw e1;
      const st=String(cur['Status Order']||'').toLowerCase();
      if(st!=='done' && st!=='pending')
        throw new Error('Hanya order berstatus "pending" atau "done" yang bisa di-approve.');
      const {error}=await sb.from('ORDER')
        .update({'Status Order':'complete','Waktu Approve':nowStr_()}).eq('ID Order', payload.id);
      if(error) throw error;
      return {ok:true, id:payload.id};
    }
    if(a==='approveMany'){
      const {data,error}=await sb.from('ORDER')
        .update({'Status Order':'complete','Waktu Approve':nowStr_()})
        .in('ID Order', payload.ids||[]).in('Status Order',['pending','done']).select('ID Order');
      if(error) throw error;
      return {ok:true, approved:(data||[]).length};
    }
    if(a==='uploadFile'){
      let b64=String(payload.base64||''); const c=b64.indexOf(',');
      if(c>-1 && /^data:/.test(b64)) b64=b64.slice(c+1);
      const bin=atob(b64); const arr=new Uint8Array(bin.length);
      for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
      const ext=(payload.name||'file').split('.').pop().toLowerCase();
      const path='order/'+Date.now()+'-'+Math.random().toString(36).slice(2,8)+'.'+ext;
      const {error}=await sb.storage.from('bukti')
        .upload(path, new Blob([arr],{type:payload.mime||'application/octet-stream'}));
      if(error) throw error;
      const {data}=sb.storage.from('bukti').getPublicUrl(path);
      return {ok:true, id:path, url:data.publicUrl, view:data.publicUrl};
    }
    if(a==='bonusSummary'){
      const cleaner=String(payload.namaCleaner||''), start=payload.start||'', end=payload.end||'';
      const map={'Kilometer':'Total Kilometer','Bonus Deepclean':'Total DeepClean','Bonus Salon':'Total Salon',
        'Tips':'Total Tips','Parkir':'Total Parkir','Lembur':'Total Lembur','Uang Makan':'Total Uang Makan','Bonus Lainnya':'Total Bonus Lainnya'};
      const totals={}; Object.values(map).forEach(v=>totals[v]=0);
      const has=field=>!cleaner||String(field||'').split(',').map(s=>s.trim()).indexOf(cleaner)>-1;
      const {data:bonus,error}=await sb.from('BONUS').select('*'); if(error) throw error;
      (bonus||[]).forEach(b=>{ if(!has(b['Nama Cleaner']))return;
        const t=String(b['Tanggal Pengerjaan']||''); if(start&&t&&t<start)return; if(end&&t&&t>end)return;
        const k=map[String(b['Jenis'])]; if(k) totals[k]+=Number(b['Nominal']||0); });
      const {data:orders}=await sb.from('ORDER').select('"Nama Cleaner","Tanggal Pengerjaan"');
      let min='',max=''; (orders||[]).forEach(o=>{ if(!has(o['Nama Cleaner']))return;
        const t=String(o['Tanggal Pengerjaan']||''); if(!t)return; if(start&&t<start)return; if(end&&t>end)return;
        if(!min||t<min)min=t; if(!max||t>max)max=t; });
      return {ok:true, totals, awal:min, akhir:max};
    }
    if(a==='gajiPokok'){
      const {data:rows,error}=await sb.from('GAJI_POKOK').select('*'); if(error) throw error;
      const n=x=>String(x==null?'':x).trim().toLowerCase();
      const cab=n(payload.cabang), jab=n(payload.jabatan), sta=n(payload.status);
      let hit=(rows||[]).find(r=>n(r.Cabang)===cab&&n(r.Jabatan)===jab&&n(r.Status)===sta)
           || (rows||[]).find(r=>n(r.Cabang)===cab&&n(r.Status)===sta);
      if(!hit) return {ok:true, found:false, gajiPokok:0, bonusBulanan:0, tunjanganKos:0, tunjanganKerja:0, premiBpjs:35000};
      return {ok:true, found:true,
        gajiPokok:Number(hit['Gaji Pokok']||0), bonusBulanan:Number(hit['Bonus Bulanan']||0),
        tunjanganKos:Number(hit['Tunjangan Kos']||0), tunjanganKerja:Number(hit['Tunjangan Kerja']||0),
        premiBpjs:Number(hit['Premi BPJS']||0)||35000};
    }
    throw new Error('Aksi tidak dikenal: '+a);
  }catch(err){
    throw new Error((err&&err.message)||String(err));
  }
}
function setSync(on, text){
  const el=$('#sync'); if(!el) return;
  if(on){ el.classList.remove('done'); el.classList.add('show');
    el.querySelector('.t').textContent = text||'Menyinkronkan…'; }

}
function syncDone(n){
  const el=$('#sync'); if(!el) return;
  el.classList.add('show','done');
  el.querySelector('.t').textContent = '✓ '+n+' data tersinkron';
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'), 2200);
}

function openImg(url){
  if(!url) return;

/* ---------- FORMAT ---------- */
const rp = n => 'Rp ' + Number(n||0).toLocaleString('id-ID');
function isMoney(key){
  if(key.indexOf('%')>-1 || key.indexOf('Qty')===0) return false;
  return MONEY_HINT.some(h=>key.indexOf(h)>-1);
}
function initials(name){ return (name||'?').trim().split(/\s+/).slice(0,2).map(w=>w[0]||'').join('').toUpperCase(); }
const norm = s=>String(s==null?'':s).trim().toLowerCase();
function ymd(d){ const x=new Date(d); const m=String(x.getMonth()+1).padStart(2,'0'); const day=String(x.getDate()).padStart(2,'0'); return x.getFullYear()+'-'+m+'-'+day; }
function startOfWeek(d){ const x=new Date(d); const off=(x.getDay()+6)%7; x.setDate(x.getDate()-off); return x; }
/* Qty boleh angka/huruf — ambil bagian angka untuk hitungan (default 1). */
function qtyNum(v){ const n=parseFloat(String(v==null?'':v).replace(/[^0-9.,]/g,'').replace(',','.')); return isNaN(n)?1:n; }
/* Uang: ambil angka murni & format "Rp 1.234.000". */
function moneyDigits(v){ return String(v==null?'':v).replace(/[^0-9]/g,''); }
function fmtRp(v){ const d=moneyDigits(v); return d ? ('Rp '+Number(d).toLocaleString('id-ID')) : ''; }

async function loadSupabaseProfile(){

  const { data, error } = await window.sb
    .from('profiles').select('nama,jabatan,role,cabang,status').eq('id', user.id).single();

async function loadList(force){
  const v=state.view, key=state.viewKey;
  // Pakai data hasil sinkron sebelumnya saat pindah menu (tanpa minta server lagi),
  // kecuali dipaksa (force) — yang terjadi setelah tambah/edit/approve atau tombol Sinkronkan.
  if(!force && key && state.listCache[key]){
    state.rows = state.listCache[key];
    refreshDynFilters(); renderView();
    return;
  }
  setSync(true);
  try{
    const payload={action:'list', sheet:v.sheet};
    if(v.statusIn){ payload.statusIn=v.statusIn; payload.statusField=v.statusField; }
    // BONUS tidak punya kolom Cabang → jangan filter cabang di server (akan kosong).
    // Untuk CS, penyaringan cabang dilakukan di klien lewat kode No Order.
    if(v.branchLock && v.sheet!=='BONUS'){ payload.filters={'Cabang':state.session.cabang}; }
    const r = await api(payload);
    state.rows = trimKeys(r.data || []);
    if(key) state.listCache[key] = state.rows;
    if(v.wa && !state.cache.karyawanMap){
      try{
        const k=trimKeys((await api({action:'list', sheet:'KARYAWAN'})).data||[]);
        const map={}; k.forEach(e=>{ if(e['Nama Lengkap']) map[norm(e['Nama Lengkap'])]=e['No WA']; });
        state.cache.karyawanMap=map;
      }catch(e){ state.cache.karyawanMap={}; }
    }
    refreshDynFilters();
    if(v.special==='reportKPI') await loadTargets();
    if(v.special==='kpiCS' || v.special==='capaian') await loadKpiCfg();
    if(v.special==='dashboard') await loadDashData();
    renderView();
    syncDone(state.rows.length);
  }catch(err){ setSync(false); toast(err.message,'err'); $('#panel').innerHTML=emptyState('Gagal memuat data'); }
}
/* Hapus semua cache daftar (dipanggil setelah ada perubahan data). */
function invalidateLists(){ state.listCache={}; }

/* Isi opsi filter "Cleaner" dari data yang sudah dimuat (distinct, sudah dipecah koma). */
function refreshDynFilters(){
  const v=state.view; if(!v) return;
  if(v.dynCleaner){
    const sel=$('#fCleaner');
    if(sel){
      let base=state.rows;
      if(v.branchLock && v.sheet==='BONUS' && state.session.cabang){
        base=base.filter(r=>cabangOfBonus(r)===String(state.session.cabang).toUpperCase());
      }
      const set=new Set();
      base.forEach(r=>String(r['Nama Cleaner']||'').split(',').forEach(n=>{ const t=n.trim(); if(t) set.add(t); }));
      const names=[...set].sort((a,b)=>a.localeCompare(b,'id'));
      const cur=state.filters['Nama Cleaner']||'';
      sel.innerHTML='<option value="">Semua Cleaner</option>'+
        names.map(n=>'<option'+(n===cur?' selected':'')+'>'+esc(n)+'</option>').join('');
    }
  }
  if(v.dynPeriode){
    const sel=$('#fPeriode');
    if(sel){
      const set=new Set();
      state.rows.forEach(r=>{ const ym=String(r['Periode Bulan']||'').slice(0,7); if(/^\d{4}-\d{2}$/.test(ym)) set.add(ym); });
      const list=[...set].sort().reverse();
      const cur=state.filters['Periode Bulan']||'';
      sel.innerHTML='<option value="">Semua Periode</option>'+
        list.map(ym=>'<option value="'+ym+'"'+(ym===cur?' selected':'')+'>'+esc(monthLabel(ym))+'</option>').join('');
    }
  }
}
function monthLabel(ym){
  const m=String(ym||'').match(/^(\d{4})-(\d{2})/); if(!m) return ym||'';
  return BULAN_ID[(+m[2])-1]+' '+m[1];
}

function applyClientFilters(rows){
  const v=state.view;
  let out = rows.slice();
  // Penyaringan cabang untuk BONUS (sheet tanpa kolom Cabang) berdasar kode No Order.
  if(v.branchLock && v.sheet==='BONUS' && state.session.cabang){
    out = out.filter(r=>cabangOfBonus(r)===String(state.session.cabang).toUpperCase());
  }
  Object.keys(state.filters).forEach(k=>{
    const val=state.filters[k]; if(!val) return;
    if(k==='Nama Cleaner'){
      out = out.filter(r=>String(r['Nama Cleaner']||'').split(',').map(s=>norm(s)).indexOf(norm(val))>-1);
    }else if(k==='Periode Bulan'){
      const want=String(val).slice(0,7);
      out = out.filter(r=>String(r['Periode Bulan']||'').slice(0,7)===want);
    }else{
      out = out.filter(r=>norm(r[k])===norm(val));
    }
  });
  if(v.dateFilterField && (state.dateStart||state.dateEnd)){
    out = out.filter(r=>{
      const d=String(r[v.dateFilterField]||''); if(!d) return false;
      if(state.dateStart && d<state.dateStart) return false;
      if(state.dateEnd && d>state.dateEnd) return false;
      return true;
    });
  }
  if(v.monthFilter && v.monthField && state.kpiMonth){
    out = out.filter(r=>String(r[v.monthField]||'').slice(0,7)===state.kpiMonth);
  }
  if(state.search && v.search){
    out = out.filter(r=> v.search.some(k=>String(r[k]||'').toLowerCase().indexOf(state.search)>-1));
  }
  if(v.statusPrio){
    const PRIO={}; v.statusPrio.forEach((s,i)=>PRIO[norm(s)]=i);
    const jamNum=s=>{ const m=String(s||'').match(/(\d{1,2})[:.]?(\d{2})?/); return m? (+m[1])*60+(+(m[2]||0)) : 9999; };
    out.sort((a,b)=>{
      const pa=PRIO[norm(a['Status Order'])]; const pb=PRIO[norm(b['Status Order'])];
      const ra=(pa==null?99:pa), rb=(pb==null?99:pb);
      if(ra!==rb) return ra-rb;                                     // urut status sesuai statusPrio
      const da=String(a['Tanggal Pengerjaan']||''), db=String(b['Tanggal Pengerjaan']||'');
      if(da!==db) return da<db?-1:1;                                // lalu tanggal terkecil dulu (naik)
      return jamNum(a['Waktu Pengerjaan'])-jamNum(b['Waktu Pengerjaan']); // lalu jam
    });
  } else if(v.orderSort){
    const PRIO={pending:0, done:1, complete:2, cancel:3};
    const jamNum=s=>{ const m=String(s||'').match(/(\d{1,2})[:.]?(\d{2})?/); return m? (+m[1])*60+(+(m[2]||0)) : 9999; };
    out.sort((a,b)=>{
      const pa=PRIO[norm(a['Status Order'])||'pending']; const pb=PRIO[norm(b['Status Order'])||'pending'];
      const ra=(pa==null?9:pa), rb=(pb==null?9:pb);
      if(ra!==rb) return ra-rb;                                    // pending → done → complete → cancel
      const da=String(a['Tanggal Pengerjaan']||''), db=String(b['Tanggal Pengerjaan']||'');
      if(da!==db) return da<db?-1:1;                              // lalu urut tanggal (naik)
      return jamNum(a['Waktu Pengerjaan'])-jamNum(b['Waktu Pengerjaan']); // lalu urut jam
    });
  } else if(v.sortBy && v.sortBy.length){
    out.sort((a,b)=>{
      for(const k of v.sortBy){
        const x=String(a[k]==null?'':a[k]), y=String(b[k]==null?'':b[k]);
        const c=x.localeCompare(y,'id',{numeric:true}); if(c) return c;
      }
      return 0;
    });
  }
  return out;
}

/* Tokenisasi alamat: ambil kata-kata bermakna (buang kata umum & angka murni). */
function alamatTokens(s){
  const stop=new Set(['jalan','jl','jln','no','nomor','rt','rw','blok','gang','gg','kel','kec','kelurahan',
    'kecamatan','kota','kab','kabupaten','perum','perumahan','komplek','kompleks','komp','the','dan','raya',
    'gedung','ruko','apartemen','apt','lantai','lt','depan','belakang','samping','dekat','sebelah']);
  return String(s||'').toLowerCase().replace(/[^a-z0-9\s]/g,' ').split(/\s+/)
    .filter(w=>w.length>=3 && !stop.has(w) && !/^\d+$/.test(w));
}
/* Kelompokkan alamat yang berbagi minimal 2 kata sama (walau depan/belakang & panjang beda). */
function clusterByAlamat(rows){
  const clusters=[];
  rows.forEach(r=>{
    const raw=String(r['Alamat']||'').trim(); if(!raw) return;
    const toks=alamatTokens(raw); if(!toks.length) return;
    const tset=new Set(toks);
    let best=null, bestShare=1;
    clusters.forEach(c=>{ let share=0; tset.forEach(t=>{ if(c.tokens.has(t)) share++; });
      if(share>=2 && share>bestShare){ best=c; bestShare=share; } });
    if(best){ best.count++; toks.forEach(t=>best.tokens.add(t)); best.labelFreq[raw]=(best.labelFreq[raw]||0)+1; }
    else { const c={tokens:tset, count:1, labelFreq:{}}; c.labelFreq[raw]=1; clusters.push(c); }
  });
  clusters.forEach(c=>{ c.label=Object.keys(c.labelFreq).sort((a,b)=>c.labelFreq[b]-c.labelFreq[a])[0]||'-'; });
  return clusters.map(c=>({k:c.label, val:c.count})).sort((a,b)=>b.val-a.val);
}
/* Kartu diagram pie (dipakai Finance untuk Top 5 layanan). */
function pieCard(title, arr, fmt){
  if(!arr.length) return '<div class="cap-card"><div class="cap-card-t">'+title+'</div><div class="cap-empty">Belum ada data</div></div>';
  const colors=['#0E3B3A','#C2A567','#17524F','#A6863F','#5E6F6C','#1F7A5E','#8A9A97'];
  const total=arr.reduce((s,it)=>s+it.val,0)||1;
  const cx=90, cy=90, r=80; let a0=-Math.PI/2, segs='';
  arr.forEach((it,i)=>{
    const frac=it.val/total, a1=a0+frac*Math.PI*2;
    const x0=cx+r*Math.cos(a0), y0=cy+r*Math.sin(a0), x1=cx+r*Math.cos(a1), y1=cy+r*Math.sin(a1);
    const large=frac>0.5?1:0;
    if(arr.length===1){ segs='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+colors[0]+'"></circle>'; }
    else segs+='<path d="M'+cx+' '+cy+' L'+x0.toFixed(2)+' '+y0.toFixed(2)+' A'+r+' '+r+' 0 '+large+' 1 '+x1.toFixed(2)+' '+y1.toFixed(2)+' Z" fill="'+colors[i%colors.length]+'"><title>'+esc(it.k)+': '+fmt(it.val)+'</title></path>';
    a0=a1;
  });
  const legend=arr.map((it,i)=>'<div class="pie-leg"><span class="pie-dot" style="background:'+colors[i%colors.length]+'"></span>'+
    '<span class="pie-name" title="'+esc(it.k)+'">'+esc(it.k)+'</span>'+
    '<span class="pie-val">'+fmt(it.val)+' · '+Math.round(it.val/total*100)+'%</span></div>').join('');
  return '<div class="cap-card"><div class="cap-card-t">'+title+'</div>'+
    '<div class="pie-wrap"><svg viewBox="0 0 180 180" class="pie-svg">'+segs+'</svg>'+
    '<div class="pie-legend">'+legend+'</div></div></div>';
}

function renderCapaian(){
  const v=state.view;
  const rows = applyClientFilters(state.rows);
  const omzetOf = r => Number(moneyDigits(r['Total Akhir Setelah Diskon']||r['Total Akhir']||0))||0;
  let omzet=0; rows.forEach(r=>omzet+=omzetOf(r));
  const jumlah=rows.length;
  const avg = jumlah ? Math.round(omzet/jumlah) : 0;

  const byCab={}, byLay={}, byDay={};
  rows.forEach(r=>{
    const o=omzetOf(r);
    const cab=String(r['Cabang']||'-').toUpperCase()||'-'; byCab[cab]=(byCab[cab]||0)+o;
    [1,2,3].forEach(i=>{ const nm=String(r['Layanan '+i]||'').trim(); if(nm) byLay[nm]=(byLay[nm]||0)+Number(r['Harga '+i]||0); });
    const d=String(r['Tanggal Pengerjaan']||'').slice(0,10); if(d) byDay[d]=(byDay[d]||0)+o;
  });
  const top=(obj,n)=>Object.keys(obj).map(k=>({k,val:obj[k]})).sort((a,b)=>b.val-a.val).slice(0,n);
  const top5Cab=top(byCab,5), top10Lay=top(byLay,10), top5Lay=top(byLay,5);
  const top10Alm=clusterByAlamat(rows).slice(0,10);
  const days=Object.keys(byDay).sort();

  const stat=(l,val,s)=>'<div class="cap-stat"><div class="cap-stat-l">'+l+'</div><div class="cap-stat-v">'+val+'</div>'+(s?'<div class="cap-stat-s">'+s+'</div>':'')+'</div>';
  const isCs = state.session && state.session.role==='CS';
  let statsHtml;
  if(isCs){
    const growBadge=(now,prev)=>{ const diff=now-prev; const pct=prev>0?(diff/prev*100):(now>0?100:0);
      const cls=diff===0?'g-flat':(diff>0?'g-up':'g-down'); const ar=diff===0?'—':(diff>0?'▲':'▼');
      return '<span class="grow '+cls+'" style="font-size:11px">'+ar+' '+Math.abs(pct).toFixed(0)+'% vs bln lalu</span>'; };
    const cab=String(state.session.cabang||'').toUpperCase();
    const now=new Date(); const ymNow=ymd(now).slice(0,7);
    const lm=new Date(now.getFullYear(), now.getMonth()-1, 1); const ymLast=ymd(lm).slice(0,7);
    const inM=(r,ym)=>String(r['Tanggal Pengerjaan']||'').slice(0,7)===ym;
    const mNow=state.rows.filter(r=>inM(r,ymNow)), mLast=state.rows.filter(r=>inM(r,ymLast));
    const sum=arr=>arr.reduce((s,r)=>s+omzetOf(r),0);
    const oNow=sum(mNow), oLast=sum(mLast);
    const jNow=mNow.length, jLast=mLast.length;
    const aNow=jNow?Math.round(oNow/jNow):0, aLast=jLast?Math.round(oLast/jLast):0;
    const kNow=kpiTotalFor(cab,ymNow), kLast=kpiTotalFor(cab,ymLast);
    statsHtml='<div class="cap-stats cap-stats-4">'+
      stat('Jumlah Order',jNow+'', growBadge(jNow,jLast))+
      stat('Total Omzet',rp(oNow), growBadge(oNow,oLast))+
      stat('Rata-rata / Order',rp(aNow), growBadge(aNow,aLast))+
      '<button class="cap-stat cap-stat-btn" id="capKpi"><div class="cap-stat-l">Nilai Hasil KPI</div>'+
        '<div class="cap-stat-v">'+kNow.toFixed(0)+'%</div><div class="cap-stat-s">'+growBadge(kNow,kLast)+' · lihat detail →</div></button>'+
      '</div>';
  } else {
    statsHtml='<div class="cap-stats">'+stat('Jumlah Order',jumlah+'')+stat('Total Omzet',rp(omzet))+stat('Rata-rata / Order',rp(avg))+'</div>';
  }
  const listCard=(title,arr,fmt)=>{
    if(!arr.length) return '<div class="cap-card"><div class="cap-card-t">'+title+'</div><div class="cap-empty">Belum ada data</div></div>';
    const max=arr[0].val||1;
    const body=arr.map((it,i)=>'<div class="cap-row"><span class="cap-rank">'+(i+1)+'</span>'+
      '<span class="cap-name" title="'+esc(it.k)+'">'+esc(it.k)+'</span>'+
      '<span class="cap-bar"><span style="width:'+Math.max(5,Math.round(it.val/max*100))+'%"></span></span>'+
      '<span class="cap-val">'+fmt(it.val)+'</span></div>').join('');
    return '<div class="cap-card"><div class="cap-card-t">'+title+'</div>'+body+'</div>';
  };

  let chart;
  if(days.length){
    const maxD=Math.max.apply(null, days.map(d=>byDay[d]))||1;
    const n=days.length, step=42, pad=26, H=190;
    const W=Math.max(n*step+pad*2, 300), bw=Math.min(30, step-10);
    const bars=days.map((d,i)=>{
      const x=pad+i*step+(step-bw)/2;
      const h=Math.round(byDay[d]/maxD*(H-pad*2));
      const lbl=d.slice(8,10)+'/'+d.slice(5,7);
      return '<g><rect x="'+x+'" y="'+(H-pad-h)+'" width="'+bw+'" height="'+h+'" rx="4" fill="var(--petrol)"><title>'+lbl+': '+rp(byDay[d])+'</title></rect>'+
        '<text x="'+(x+bw/2)+'" y="'+(H-pad+13)+'" text-anchor="middle" font-size="9" fill="var(--muted)">'+lbl+'</text></g>';
    }).join('');
    chart='<div class="cap-card"><div class="cap-card-t">Grafik Omzet Harian</div><div class="cap-chart">'+
      '<svg viewBox="0 0 '+W+' '+H+'" style="min-width:'+W+'px;height:'+H+'px">'+bars+'</svg></div></div>';
  }else{
    chart='<div class="cap-card"><div class="cap-card-t">Grafik Omzet Harian</div><div class="cap-empty">Tidak ada data pada filter ini.</div></div>';
  }

  const layananCard = v.financePie ? pieCard('Top 5 Layanan — omzet', top5Lay, rp)
                                   : listCard('Top 10 Layanan — omzet', top10Lay, rp);

  $('#panel').innerHTML =
    statsHtml+
    chart+
    '<div class="cap-grid">'+
      listCard('Top 5 Cabang — omzet', top5Cab, rp)+
      layananCard+
      listCard('Top 10 Alamat — jumlah order', top10Alm, x=>x+' order')+
    '</div>';
  const kb=$('#capKpi'); if(kb) kb.addEventListener('click', ()=>selectMenu('kpiCSView'));
  setCount(jumlah, 'order');
}

/* ============================================================
   OPERASIONAL — Laporan Omzet & Report KPI
   Periode bulanan memakai siklus TANGGAL 28 s/d 27.
   ============================================================ */
function omzetOf_(r){ return Number(moneyDigits(r['Total Akhir Setelah Diskon']||r['Total Akhir']||0))||0; }
function periodBounds(ref){
  const d = ref ? new Date(ref) : new Date();
  let y=d.getFullYear(), m=d.getMonth();
  if(d.getDate()<28){ m-=1; if(m<0){ m=11; y-=1; } }
  const start=new Date(y,m,28), end=new Date(y,m+1,27);
  return {start:ymd(start), end:ymd(end)};
}
function prevPeriodBounds(cur){
  const s=new Date(cur.start);
  const ps=new Date(s.getFullYear(), s.getMonth()-1, 28);
  const pe=new Date(s.getFullYear(), s.getMonth(),   27);
  return {start:ymd(ps), end:ymd(pe)};
}
/* Baris ORDER setelah filter Cabang + Status Order (TANPA rentang tanggal). */
function opsBaseRows(){
  let rows=state.rows.slice();
  const fc=state.filters['Cabang'], fs=state.filters['Status Order'];
  if(fc) rows=rows.filter(r=>String(r['Cabang']||'').toUpperCase()===String(fc).toUpperCase());
  if(fs) rows=rows.filter(r=>norm(r['Status Order'])===norm(fs));
  return rows;
}
function opsCabangList(){
  const v=state.view;
  if(v && v.branchLock && state.session && state.session.cabang) return [String(state.session.cabang).toUpperCase()];
  const fc=state.filters['Cabang'];
  if(fc) return [String(fc).toUpperCase()];
  return CABANG.filter(c=>c!=='OFFICE');
}
function inRange(d,a,b){ d=String(d||'').slice(0,10); return d && d>=a && d<=b; }
function growthHTML(now, prev){
  const diff=now-prev;
  const pct = prev>0 ? (diff/prev*100) : (now>0?100:0);
  const up = diff>=0;
  const arrow = up?'▲':'▼';
  const cls = diff===0?'g-flat':(up?'g-up':'g-down');
  return '<span class="grow '+cls+'">'+arrow+' '+rp(Math.abs(diff))+' · '+(up?'+':'−')+Math.abs(pct).toFixed(1)+'%</span>';
}
async function loadTargets(){
  try{ const r=await api({action:'list', sheet:'TARGET_OMZET'});
    const map={}; (r.data||[]).forEach(t=>{ if(t['Cabang']) map[String(t['Cabang']).toUpperCase()]=Number(moneyDigits(t['Target Omzet']))||0; });
    state.cache.targets=map; return map;
  }catch(e){ state.cache.targets={}; return {}; }
}

function renderLaporanOmzet(){
  const base=opsBaseRows();
  const cur=periodBounds(), prev=prevPeriodBounds(cur);
  // rentang tanggal manual (opsional) untuk bagian DETAIL
  const useRange = !!(state.dateStart||state.dateEnd);
  const dStart = state.dateStart||cur.start, dEnd = state.dateEnd||cur.end;
  const cabs=opsCabangList();

  let totNow=0, totPrev=0, totAds=0, totOrg=0, totLama=0;
  const rowsHtml = cabs.map(cab=>{
    const rc=base.filter(r=>String(r['Cabang']||'').toUpperCase()===cab);
    const now = rc.filter(r=>inRange(r['Tanggal Pengerjaan'],cur.start,cur.end)).reduce((s,r)=>s+omzetOf_(r),0);
    const pv  = rc.filter(r=>inRange(r['Tanggal Pengerjaan'],prev.start,prev.end)).reduce((s,r)=>s+omzetOf_(r),0);
    const nowRows = rc.filter(r=>inRange(r['Tanggal Pengerjaan'],cur.start,cur.end));
    const chan = k => nowRows.filter(r=>norm(r['Chat Dari'])===k).reduce((s,r)=>s+omzetOf_(r),0);
    const ads=chan('iklan'), org=chan('organik'), lama=chan('lama');
    // terakhir update = tanggal pengerjaan terbaru pd periode ini
    let last=''; nowRows.forEach(r=>{ const d=String(r['Tanggal Pengerjaan']||'').slice(0,10); if(d&&d>last) last=d; });
    totNow+=now; totPrev+=pv; totAds+=ads; totOrg+=org; totLama+=lama;
    return '<tr><td class="cab-cell">'+esc(cab)+'</td>'+
      '<td class="money">'+rp(now)+'</td>'+
      '<td class="money">'+rp(pv)+'</td>'+
      '<td>'+growthHTML(now,pv)+'</td>'+
      '<td>'+(last?esc(tglPanjangId(last)):'<span style="color:var(--faint)">—</span>')+'</td>'+
      '<td class="money">'+rp(ads)+'</td>'+
      '<td class="money">'+rp(org)+'</td>'+
      '<td class="money">'+rp(lama)+'</td></tr>';
  }).join('');

  // DETAIL omzet: per cabang → per layanan (jumlah transaksi & nominal)
  const detRows=[];
  cabs.forEach(cab=>{
    const rc=base.filter(r=>String(r['Cabang']||'').toUpperCase()===cab &&
      inRange(r['Tanggal Pengerjaan'], dStart, dEnd));
    const byLay={};
    rc.forEach(r=>{
      [1,2,3].forEach(i=>{
        const nm=String(r['Layanan '+i]||'').trim(); if(!nm) return;
        const val=Number(moneyDigits(r['Harga '+i]))||0;
        if(!byLay[nm]) byLay[nm]={n:0,val:0};
        byLay[nm].n++; byLay[nm].val+=val;
      });
    });
    const lays=Object.keys(byLay).sort((a,b)=>byLay[b].val-byLay[a].val);
    lays.forEach((nm,i)=>{
      detRows.push('<tr>'+(i===0?'<td class="cab-cell" rowspan="'+lays.length+'">'+esc(cab)+'</td>':'')+
        '<td>'+esc(nm)+'</td><td style="text-align:center">'+byLay[nm].n+'</td><td class="money">'+rp(byLay[nm].val)+'</td></tr>');
    });
    if(!lays.length) detRows.push('<tr><td class="cab-cell">'+esc(cab)+'</td><td colspan="3" style="color:var(--faint)">Tidak ada transaksi</td></tr>');
  });

  const periodeLbl = tglPanjangId(cur.start)+' – '+tglPanjangId(cur.end);
  const detLbl = useRange ? (tglPanjangId(dStart)+' – '+tglPanjangId(dEnd)) : periodeLbl;

  const stat=(l,val)=>'<div class="cap-stat"><div class="cap-stat-l">'+l+'</div><div class="cap-stat-v">'+val+'</div></div>';
  $('#panel').innerHTML =
    '<div class="ops-note">Periode bulan ini: <b>'+esc(periodeLbl)+'</b> (siklus tgl 28–27)</div>'+
    '<div class="cap-stats">'+stat('Omzet Bulan Ini',rp(totNow))+stat('Omzet Bulan Lalu',rp(totPrev))+stat('Growth','')+'</div>'+
    '<div class="grow-line">'+growthHTML(totNow,totPrev)+'</div>'+
    '<div class="cap-card"><div class="cap-card-t">Omzet per Cabang</div>'+
      '<div class="tbl-wrap"><table class="ops-tbl"><thead><tr>'+
        '<th class="l">Cabang</th><th class="r">Bulan Ini</th><th class="r">Bulan Lalu</th><th class="l">Growth</th><th class="l">Terakhir Update</th><th class="r">Ads</th><th class="r">Organik</th><th class="r">Lama</th>'+
      '</tr></thead><tbody>'+rowsHtml+
      '<tr class="ops-total"><td>TOTAL</td><td class="money">'+rp(totNow)+'</td><td class="money">'+rp(totPrev)+'</td>'+
        '<td>'+growthHTML(totNow,totPrev)+'</td><td>—</td><td class="money">'+rp(totAds)+'</td><td class="money">'+rp(totOrg)+'</td><td class="money">'+rp(totLama)+'</td></tr>'+
      '</tbody></table></div></div>'+
    '<div class="cap-card"><div class="cap-card-t">Detail Omzet per Layanan <span class="cap-sub2">('+esc(detLbl)+')</span></div>'+
      '<div class="tbl-wrap"><table class="ops-tbl"><thead><tr><th class="l">Cabang</th><th class="l">Layanan</th><th class="c">Transaksi</th><th class="r">Nominal</th></tr></thead>'+
      '<tbody>'+detRows.join('')+'</tbody></table></div></div>';
  setCount(base.filter(r=>inRange(r['Tanggal Pengerjaan'],cur.start,cur.end)).length, 'order');
}

function renderReportKPI(){
  const base=opsBaseRows();
  const targets=state.cache.targets||{};
  const cur=periodBounds(), prev=prevPeriodBounds(cur);
  // periode KPI = rentang tanggal manual bila diisi, jika tidak → periode berjalan
  const useRange=!!(state.dateStart||state.dateEnd);
  const pStart=state.dateStart||cur.start, pEnd=state.dateEnd||cur.end;
  // proporsi hari berjalan dalam periode (untuk "target aman")
  const today=ymd(new Date());
  const total=Math.max(1,(new Date(pEnd)-new Date(pStart))/86400000+1);
  const elapsedRaw=(new Date(Math.min(new Date(today),new Date(pEnd)))-new Date(pStart))/86400000+1;
  const elapsed=Math.min(total,Math.max(0,elapsedRaw));
  const safePct=Math.round(elapsed/total*100);
  const cabs=opsCabangList();

  const rowsHtml=cabs.map(cab=>{
    const rc=base.filter(r=>String(r['Cabang']||'').toUpperCase()===cab);
    const ach=rc.filter(r=>inRange(r['Tanggal Pengerjaan'],pStart,pEnd)).reduce((s,r)=>s+omzetOf_(r),0);
    const pv =rc.filter(r=>inRange(r['Tanggal Pengerjaan'],prev.start,prev.end)).reduce((s,r)=>s+omzetOf_(r),0);
    const tgt=targets[cab]||0;
    const kpi = tgt>0 ? (ach/tgt*100) : 0;
    // warna: >= target aman → hijau; sampai kurang 30% dari target aman → kuning; di bawah → merah
    let cls='k-red';
    if(tgt<=0) cls='k-none';
    else if(kpi>=safePct) cls='k-green';
    else if(kpi>=safePct-30) cls='k-yellow';
    const growth = pv>0 ? ((ach-pv)/pv*100) : (ach>0?100:0);
    const gcls = ach-pv>=0?'g-up':'g-down';
    return '<tr>'+
      '<td class="cab-cell l">'+esc(cab)+'</td>'+
      '<td class="c">'+safePct+'%</td>'+
      '<td class="c"><span class="kpi-badge '+cls+'">'+(tgt>0?kpi.toFixed(1)+'%':'—')+'</span></td>'+
      '<td class="grow '+gcls+' c">'+(ach-pv>=0?'+':'−')+Math.abs(growth).toFixed(1)+'%</td>'+
      '<td class="money">'+rp(tgt)+'</td>'+
      '<td class="money">'+rp(ach)+'</td></tr>';
  }).join('');

  const periodeLbl = useRange ? (tglPanjangId(pStart)+' – '+tglPanjangId(pEnd)) : (tglPanjangId(cur.start)+' – '+tglPanjangId(cur.end));
  const hasTarget=Object.keys(targets).length>0;
  $('#panel').innerHTML =
    '<div class="ops-note">Periode: <b>'+esc(periodeLbl)+'</b> · Target aman hari ini: <b>'+safePct+'%</b>'+
      (hasTarget?'':' · <span style="color:var(--danger)">Target omzet belum diatur (Pengaturan → Target Omzet)</span>')+'</div>'+
    '<div class="cap-card"><div class="cap-card-t">KPI Omzet per Cabang</div>'+
      '<div class="tbl-wrap"><table class="ops-tbl"><thead><tr>'+
        '<th class="l">Cabang</th><th class="c">Target Aman</th><th class="c">KPI Omzet</th><th class="c">Growth</th><th class="r">Target Omzet</th><th class="r">Omzet Dicapai</th>'+
      '</tr></thead><tbody>'+rowsHtml+'</tbody></table></div>'+
      '<div class="kpi-legend"><span class="kpi-badge k-green">Hijau</span> di atas target aman · '+
        '<span class="kpi-badge k-yellow">Kuning</span> kurang s/d 30% · '+
        '<span class="kpi-badge k-red">Merah</span> di bawah itu</div>'+
    '</div>';
  setCount(cabs.length, 'cabang');
}

/* ---------- KPI CS ---------- */
async function loadKpiCfg(){
  try{ const r=await api({action:'list', sheet:'KPI_CS'});
    const map={}; (r.data||[]).forEach(t=>{ if(t['Cabang']&&t['Periode'])
      map[String(t['Cabang']).toUpperCase()+'|'+String(t['Periode']).slice(0,7)]=t; });
    state.cache.kpiCfg=map; return map;
  }catch(e){ state.cache.kpiCfg={}; return {}; }
}
function kpiItems(){
  return [
    {key:'Omzet',        tKey:'Target Omzet',        bKey:'Bobot Omzet',        money:true, auto:true, defB:40},
    {key:'Closing Rate', tKey:'Target Closing Rate', bKey:'Bobot Closing Rate', nKey:'Nilai Closing Rate', pct:true, defB:20},
    {key:'Closing Chat', tKey:'Target Closing Chat', bKey:'Bobot Closing Chat', nKey:'Nilai Closing Chat', defB:20},
    {key:'Stock Opname', tKey:'Target Stock Opname', bKey:'Bobot Stock Opname', nKey:'Nilai Stock Opname', defB:10},
    {key:'Review Maps',  tKey:'Target Review Maps',  bKey:'Bobot Review Maps',  nKey:'Nilai Review Maps',  defB:10}
  ];
}
function kpiTotalFor(cab, ym){
  const cfg=(state.cache.kpiCfg||{})[String(cab).toUpperCase()+'|'+ym]||{};
  const omzet=kpiOmzet(cab, ym);
  const num=v=>Number(moneyDigits(v))||0;
  let total=0;
  kpiItems().forEach(it=>{
    const target=num(cfg[it.tKey]);
    const bobot=(cfg[it.bKey]!=null&&String(cfg[it.bKey]).trim()!=='')?num(cfg[it.bKey]):it.defB;
    const nilai=it.auto?omzet:num(cfg[it.nKey]);
    if(target>0) total+=(nilai/target)*bobot;
  });
  return total;
}
function kpiOmzet(cab, ym){
  const fs=state.filters['Status Order'];
  return state.rows.filter(r=>{
    if(String(r['Cabang']||'').toUpperCase()!==cab) return false;
    if(fs && norm(r['Status Order'])!==norm(fs)) return false;
    return String(r['Tanggal Pengerjaan']||'').slice(0,7)===ym;
  }).reduce((s,r)=>s+omzetOf_(r),0);
}
function renderKpiCS(){
  const ym = state.kpiMonth || ymd(new Date()).slice(0,7);
  state.kpiMonth = ym;
  const cabs = opsCabangList();
  const cfg = state.cache.kpiCfg || {};
  const monthLbl = monthLabel(ym);
  const isOps = state.session.role==='OPERASIONAL';
  const num = v => Number(moneyDigits(v))||0;

  const cards = cabs.map(cab=>{
    const c = cfg[cab+'|'+ym] || {};
    const omzet = kpiOmzet(cab, ym);
    let total=0;
    const rows = kpiItems().map((it,idx)=>{
      const target = num(c[it.tKey]);
      const bobot  = (c[it.bKey]!=null && String(c[it.bKey]).trim()!=='') ? num(c[it.bKey]) : it.defB;
      const nilai  = it.auto ? omzet : num(c[it.nKey]);
      const pros   = target>0 ? (nilai/target)*bobot : 0;
      total += pros;
      const fT = it.money?rp(target):(it.pct?target+'%':target);
      const fN = it.money?rp(nilai):(it.pct?nilai+'%':nilai);
      return '<tr>'+
        '<td class="c">'+(idx+1)+'</td>'+
        '<td class="l">'+it.key+(it.auto?' <span class="kpi-auto">auto</span>':'')+'</td>'+
        '<td class="r">'+fT+'</td>'+
        '<td class="c">'+bobot+'%</td>'+
        '<td class="l"></td>'+
        '<td class="r">'+fN+'</td>'+
        '<td class="r"><b>'+pros.toFixed(0)+'%</b></td></tr>';
    }).join('');
    const oT = num(c['Target Omzet']);
    const strat = [['Tgl 7','25%',oT*0.25],['Tgl 14','50%',oT*0.5],['Tgl 21','75%',oT*0.75],['Tgl 28','100%',oT]];

function renderDashboard(){
  const num=v=>Number(moneyDigits(v))||0;
  const rows=applyClientFilters(state.rows);           // ORDER: cabang + status + rentang tanggal
  const fc=state.filters['Cabang'];
  let omzet=0, omzetAdsTot=0; const byCab={}, byLay={}, byDay={};
  rows.forEach(r=>{
    const o=num(r['Total Akhir Setelah Diskon']||r['Total Akhir']); omzet+=o;
    const cab=String(r['Cabang']||'-').toUpperCase(); byCab[cab]=(byCab[cab]||0)+o;
    if(norm(r['Chat Dari'])==='iklan') omzetAdsTot+=o;
    [1,2,3].forEach(i=>{ const nm=String(r['Layanan '+i]||'').trim(); if(nm) byLay[nm]=(byLay[nm]||0)+num(r['Harga '+i]); });
    const d=String(r['Tanggal Pengerjaan']||'').slice(0,10); if(d) byDay[d]=(byDay[d]||0)+o;
  });

  // Karyawan
  let kar=(state.cache.karyawanAll||[]).slice();
  if(fc) kar=kar.filter(k=>String(k['Cabang']||'').toUpperCase()===String(fc).toUpperCase());
  const totKar=kar.length;

  // Spend iklan (per cabang) — hormati filter cabang
  let spend=(state.cache.spendAll||[]).slice();
  if(fc) spend=spend.filter(s=>String(s['Cabang']||'').toUpperCase()===String(fc).toUpperCase());
  let totSpend=0; const spendByCab={};
  spend.forEach(s=>{ const n=num(s['Nominal']); totSpend+=n; const c=String(s['Cabang']||'-').toUpperCase(); spendByCab[c]=(spendByCab[c]||0)+n; });

  const stat=(l,val,s)=>'<div class="cap-stat"><div class="cap-stat-l">'+l+'</div><div class="cap-stat-v">'+val+'</div>'+(s?'<div class="cap-stat-s">'+s+'</div>':'')+'</div>';
  const top=(obj,n)=>Object.keys(obj).map(k=>({k,val:obj[k]})).sort((a,b)=>b.val-a.val).slice(0,n);
  const listCard=(title,arr,fmt)=>{
    if(!arr.length) return '<div class="cap-card"><div class="cap-card-t">'+title+'</div><div class="cap-empty">Belum ada data</div></div>';
    const max=arr[0].val||1;
    return '<div class="cap-card"><div class="cap-card-t">'+title+'</div>'+arr.map((it,i)=>
      '<div class="cap-row"><span class="cap-rank">'+(i+1)+'</span><span class="cap-name" title="'+esc(it.k)+'">'+esc(it.k)+'</span>'+
      '<span class="cap-bar"><span style="width:'+Math.max(5,Math.round(it.val/max*100))+'%"></span></span>'+
      '<span class="cap-val">'+fmt(it.val)+'</span></div>').join('')+'</div>';
  };

  // Detail karyawan per cabang & jabatan
  const jabSet={}; kar.forEach(k=>{ const j=String(k['Jabatan']||'-').toUpperCase(); jabSet[j]=true; });
  const jabs=JABATAN.map(j=>j.toUpperCase()).filter(j=>jabSet[j]);
  const cabsK=[...new Set(kar.map(k=>String(k['Cabang']||'-').toUpperCase()))].sort();
  const karHead='<th class="l">Cabang</th>'+jabs.map(j=>'<th class="c">'+esc(j)+'</th>').join('')+'<th class="r">Total</th>';
  const karBody=cabsK.map(cab=>{
    const rc=kar.filter(k=>String(k['Cabang']||'-').toUpperCase()===cab);
    const cells=jabs.map(j=>'<td class="c">'+(rc.filter(k=>String(k['Jabatan']||'-').toUpperCase()===j).length||'')+'</td>').join('');
    return '<tr><td class="cab-cell l">'+esc(cab)+'</td>'+cells+'<td class="r"><b>'+rc.length+'</b></td></tr>';
  }).join('');

  // Detail spend vs omzet ads
  const cabsAll = fc ? [String(fc).toUpperCase()] : CABANG.filter(c=>c!=='OFFICE');
  const spendRows=cabsAll.map(cab=>{
    const sp=spendByCab[cab]||0;
    const oa=rows.filter(r=>String(r['Cabang']||'').toUpperCase()===cab && norm(r['Chat Dari'])==='iklan')
                 .reduce((s,r)=>s+num(r['Total Akhir Setelah Diskon']||r['Total Akhir']),0);
    const pct = oa>0 ? (sp/oa*100) : 0;
    const pcls = pct===0?'':(pct<=25?'g-up':(pct<=40?'':'g-down'));
    return '<tr><td class="cab-cell l">'+esc(cab)+'</td><td class="money">'+rp(sp)+'</td>'+
      '<td class="money">'+rp(oa)+'</td><td class="r '+pcls+'"><b>'+(oa>0?pct.toFixed(1)+'%':'—')+'</b></td></tr>';
  }).join('');

  // Grafik garis omzet harian
  const days=Object.keys(byDay).sort();
  let line;
  if(days.length){
    const maxD=Math.max.apply(null, days.map(d=>byDay[d]))||1;
    const W=Math.max(days.length*44+40, 320), H=200, pad=28;
    const X=i=>pad+i*((W-pad*2)/Math.max(1,days.length-1));
    const Y=v=>H-pad-(v/maxD)*(H-pad*2);
    const pts=days.map((d,i)=>X(i)+','+Y(byDay[d]).toFixed(1)).join(' ');
    const dots=days.map((d,i)=>'<circle cx="'+X(i).toFixed(1)+'" cy="'+Y(byDay[d]).toFixed(1)+'" r="3.2" fill="var(--petrol)"><title>'+d.slice(8,10)+'/'+d.slice(5,7)+': '+rp(byDay[d])+'</title></circle>').join('');
    const labs=days.map((d,i)=> (days.length<=16||i%2===0) ? '<text x="'+X(i).toFixed(1)+'" y="'+(H-8)+'" text-anchor="middle" font-size="9" fill="var(--muted)">'+d.slice(8,10)+'/'+d.slice(5,7)+'</text>':'').join('');
    line='<div class="cap-card"><div class="cap-card-t">Progres Omzet Harian</div><div class="cap-chart">'+
      '<svg viewBox="0 0 '+W+' '+H+'" style="min-width:'+W+'px;height:'+H+'px">'+
      '<polyline points="'+pts+'" fill="none" stroke="var(--petrol)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>'+
      dots+labs+'</svg></div></div>';
  } else line='<div class="cap-card"><div class="cap-card-t">Progres Omzet Harian</div><div class="cap-empty">Tidak ada data pada filter ini.</div></div>';

  const top10Lay=top(byLay,10);
  const top10Cab=Object.keys(byCab).map(k=>({k,val:byCab[k]})).sort((a,b)=>b.val-a.val);
  const top10Alm=clusterByAlamat(rows).slice(0,10);

  $('#panel').innerHTML =
    '<div class="cap-stats">'+
      stat('Total Omzet',rp(omzet))+
      stat('Total Karyawan',totKar+'')+
      stat('Total Spend Iklan',rp(totSpend))+
      stat('Total Chat','—','segera')+
    '</div>'+
    '<div class="cap-card"><div class="cap-card-t">Omzet per Cabang (tertinggi → terendah)</div>'+
      (top10Cab.length?'<div class="tbl-wrap"><table class="ops-tbl"><thead><tr><th class="l">Cabang</th><th class="r">Omzet</th></tr></thead><tbody>'+
        top10Cab.map(c=>'<tr><td class="cab-cell l">'+esc(c.k)+'</td><td class="money">'+rp(c.val)+'</td></tr>').join('')+
      '</tbody></table></div>':'<div class="cap-empty">Belum ada data</div>')+'</div>'+
    '<div class="cap-card"><div class="cap-card-t">Detail Karyawan per Cabang & Jabatan</div>'+
      (karBody?'<div class="tbl-wrap"><table class="ops-tbl"><thead><tr>'+karHead+'</tr></thead><tbody>'+karBody+'</tbody></table></div>':'<div class="cap-empty">Belum ada data karyawan</div>')+'</div>'+
    '<div class="cap-card"><div class="cap-card-t">Spend Iklan vs Omzet (Ads) per Cabang</div>'+
      '<div class="tbl-wrap"><table class="ops-tbl"><thead><tr><th class="l">Cabang</th><th class="r">Spend Iklan</th><th class="r">Omzet Ads</th><th class="r">Spend/Omzet</th></tr></thead><tbody>'+spendRows+
      '</tbody></table></div><div class="kpi-legend">Makin kecil % (spend ÷ omzet ads) makin efisien.</div></div>'+
    line+
    '<div class="cap-grid">'+
      listCard('Top 10 Layanan — omzet', top10Lay, rp)+
      listCard('Top 10 Alamat — jumlah order', top10Alm, x=>x+' order')+
    '</div>';
  setCount(rows.length,'order');
}

function cell(v,c,r){
  const val=r[c];
  if(c==='Foto Profil'){
    return val ? '<img class="avatar" src="'+esc(val)+'" onerror="this.replaceWith(Object.assign(document.createElement(\'div\'),{className:\'avatar\',textContent:\''+initials(r['Nama Lengkap'])+'\'}))">'
               : '<div class="avatar">'+initials(r['Nama Lengkap'])+'</div>';
  }
  if(/^Bukti/.test(c)){
    return val ? '<a class="flink" data-img="'+esc(val)+'" style="cursor:zoom-in">Lihat</a>' : '<span style="color:var(--faint)">—</span>';
  }
  if(/File|Invoice/.test(c)){
    return val ? '<a class="flink" href="'+esc(val)+'" target="_blank" rel="noopener">Lihat</a>' : '<span style="color:var(--faint)">—</span>';
  }
  if(c==='Status Order' && v.statusBadge){
    const s=norm(val)||'pending'; return '<span class="badge b-'+s+'"><span class="d"></span>'+s+'</span>';
  }
  if(c==='Take Home Pay') return '<span class="thp">'+rp(val)+'</span>';
  if(c==='Nama Cleaner'){
    const names=String(val||'').split(',').map(s=>s.trim()).filter(Boolean);
    if(!names.length) return '<span style="color:var(--faint)">—</span>';
    if(names.length===1) return esc(names[0]);
    return esc(names[0])+'<button class="lnk-more" data-cleaners="'+esc(names.join('|'))+'">+'+(names.length-1)+' lainnya</button>';
  }
  if(c==='Nama Customer'){
    const full=String(val||'').trim();
    if(!full) return '<span style="color:var(--faint)">—</span>';
    const words=full.split(/\s+/);
    if(words.length<=3) return esc(full);
    return esc(words.slice(0,3).join(' '))+'<button class="lnk-more" data-fulltext="'+esc(full)+'" data-fulltitle="Nama Customer">…</button>';
  }
  if(c==='Tanggal Pengerjaan' || c==='Tanggal Input'){
    return val!=null && val!=='' ? esc(tglHariId(val)) : '<span style="color:var(--faint)">—</span>';
  }
  if(/^Tanggal/.test(c)){
    return val!=null && val!=='' ? esc(tglPanjangId(val)) : '<span style="color:var(--faint)">—</span>';
  }
  if(c==='Periode Bulan'){
    const ym=String(val||'').slice(0,7);
    return /^\d{4}-\d{2}$/.test(ym) ? esc(monthLabel(ym)) : (val!=null&&val!==''?esc(val):'<span style="color:var(--faint)">—</span>');
  }
  if(c==='PPn'){
    return Number(moneyDigits(val))>0 ? '11%' : '<span style="color:var(--faint)">—</span>';
  }
  if(/^Waktu /.test(c)){
    return val!=null && val!=='' ? esc(fmtWaktu(val)) : '<span style="color:var(--faint)">—</span>';
  }
  if(isMoney(c)) return rp(val);
  return val!=null && val!=='' ? esc(val) : '<span style="color:var(--faint)">—</span>';
}
function emptyState(msg){
  return '<div class="empty">'+svg('inbox')+'<b>'+msg+'</b><span>Tambahkan data baru atau ubah filter.</span></div>';
}
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
/* Bersihkan spasi di nama kolom dari sheet (mis. "Nama Layanan " -> "Nama Layanan")
   supaya nilai tetap terbaca walau header di Google Sheet ada spasi tak sengaja. */
function trimKeys(rows){
  return (rows||[]).map(r=>{
    if(!r || typeof r!=='object') return r;
    const o={}; Object.keys(r).forEach(k=>{ o[String(k).trim()]=r[k]; }); return o;
  });
}

async function openForm(row){
  const v=state.view;
  state.editing = row; state.files={};
  const sv=$('#modalSave'); if(sv) sv.style.display='';
  const cc=$('#modalCancel'); if(cc){ cc.textContent='Batal'; cc.classList.remove('btn-danger'); }
  $('#modalTitle').textContent = (row?'Edit ':'Tambah ')+v.title;

  // Finance (tanpa branchLock): muat ulang daftar cleaner sesuai cabang order ini.
  if(!v.branchLock) state.cache.cleaner = undefined;

  // prefetch lists needed for datalists
  await ensureLists(v);

  const data = row ? Object.assign({}, row) : defaults(v);
  let html='<div class="form-grid">';
  v.form.forEach(fd=>{
    if(fd.sec){ html += '<div class="sec-title">'+fd.sec+'</div>'; return; }
    html += renderField(fd, data[fd.k]);
  });
  html+='</div>';
  $('#modalBody').innerHTML=html;
  wireFields(v);
  if(v.special==='gaji'){ populateKselect(); recomputeGaji(); }
  if(v.special==='order'){ recomputeOrder(); wireSvcRows(); if(row && row['Bukti Transfer']) showInvoiceBtn(); }
  openOverlay();
}
function defaults(v){
  const d={}; const today=ymd(new Date());
  if(v.sheet==='ORDER'){ d['Tanggal Input']=today; d['Status Order']='pending';
    d['Cabang']=state.session.cabang; d['CS Penanggung Jawab']=state.session.nama;
    d['PPn']=0; }
  if(v.sheet==='BONUS'){ d['Tanggal Input']=today; }
  if(v.sheet==='GAJI'){ d['Tanggal Cetak']=today; }
  if(v.sheet==='AGENDA'){ d['Jabatan']=state.session.role; d['Tipe']='Bulanan'; d['Periode']=today.slice(0,7); d['Status']='Rencana'; }
  return d;
}
function renderField(fd, val){
  if(fd.btn==='addSvc'){
    return '<div class="field full"><button type="button" class="btn btn-ghost btn-sm" id="addSvcBtn">'+svg('plus')+'Tambah layanan</button></div>';
  }
  const id='fld_'+fd.k.replace(/[^a-z0-9]/gi,'_');
  const full = fd.full || fd.t==='textarea' ? ' full':'';
  const comp = fd.computed ? ' computed':'';
  const svc = fd.svc ? (' svc-row svc-'+fd.svc+' hide') : '';
  let inner='';
  const ro = fd.ro || fd.computed ? ' readonly' : '';
  val = val==null?'':val;
  if(fd.t==='check'){
    const numv = Number(String(val).replace(/[^0-9-]/g,''))||0;
    const on = numv>0;
    const dc = (fd.k==='Premi BPJS') ? (on?numv:35000) : 11;
    return '<div class="field'+full+'"><label>&nbsp;</label>'+
      '<label class="chk"><input type="checkbox" data-k="'+esc(fd.k)+'" data-check="'+dc+'"'+(on?' checked':'')+'> '+
      '<span class="chk-label">'+esc(fd.label||fd.k)+'</span></label></div>';
  }
  if(fd.t==='select'){
    let opts=(fd.opts||[]).slice();
    // auto-baca nilai dari sheet meski beda huruf besar/kecil; jika tak ada, tampilkan apa adanya.
    if(val!=='' && !opts.some(o=>norm(o)===norm(val))) opts=[val].concat(opts);
    inner = '<select data-k="'+esc(fd.k)+'"'+ro+'>'+
      '<option value=""></option>'+
      opts.map(o=>'<option'+(norm(o)===norm(val)?' selected':'')+'>'+esc(o)+'</option>').join('')+'</select>';
  } else if(fd.t==='textarea'){
    inner = '<textarea data-k="'+esc(fd.k)+'"'+ro+'>'+esc(val)+'</textarea>';
  } else if(fd.t==='file'){
    const has = val ? '<a class="file-name" href="'+esc(val)+'" target="_blank">File tersimpan</a>' : '';
    inner = '<div class="file-row">'+
      '<img class="prev" data-prev="'+esc(fd.k)+'"'+(val?' src="'+esc(val)+'" style="display:block"':'')+'>'+
      '<label class="file-btn">'+svg('upload')+'Pilih file'+
      '<input type="file" data-file="'+esc(fd.k)+'" accept="'+(fd.accept||'')+'" style="display:none"></label>'+
      '<span class="file-name" data-fn="'+esc(fd.k)+'">'+has+'</span></div>';
  } else if(fd.t==='datalist'){
    inner = '<input data-k="'+esc(fd.k)+'" list="'+id+'_dl" autocomplete="off"'+ro+' value="'+esc(val)+'">'+
      '<datalist id="'+id+'_dl" data-dl="'+esc(fd.list)+'"></datalist>';
  } else if(fd.t==='ordersearch'){
    const o=(state.cache.order||[]).find(x=>String(x['ID Order'])===String(val));
    const label = o ? orderSearchLabel(o) : (val||'');
    inner = '<div class="os-wrap" data-oswrap="'+esc(fd.k)+'">'+
        '<input type="hidden" data-k="'+esc(fd.k)+'" value="'+esc(val)+'">'+
        '<input type="text" class="os-input" data-os-input autocomplete="off" placeholder="Ketik nama customer…" value="'+esc(label)+'">'+
        '<div class="os-list" data-os-list></div>'+
      '</div>';
  } else if(fd.t==='dynselect'){
    const items=(state.cache[fd.list]||[]);
    const field=DYN_FIELD[fd.list]||'Nama';
    let opts=items.map(e=>e[field]).filter(Boolean);
    if(val && opts.indexOf(val)<0) opts=[val].concat(opts);
    inner = '<select data-k="'+esc(fd.k)+'"'+ro+'><option value=""></option>'+
      opts.map(o=>'<option'+(String(o)===String(val)?' selected':'')+'>'+esc(o)+'</option>').join('')+'</select>';
  } else if(fd.t==='multidyn'){
    const items=(state.cache[fd.list]||[]);
    const field=DYN_FIELD[fd.list]||'Nama';
    let opts=items.map(e=>e[field]).filter(Boolean);
    const chosen=String(val||'').split(',').map(s=>s.trim()).filter(Boolean);
    chosen.forEach(c=>{ if(opts.indexOf(c)<0) opts.push(c); });
    const chips=opts.map(o=>'<button type="button" class="chip'+(chosen.indexOf(o)>-1?' on':'')+'" data-chip="'+esc(o)+'">'+esc(o)+'</button>').join('')
      || '<span class="bs-sub">Belum ada cleaner di cabang ini.</span>';
    inner = '<input type="hidden" data-k="'+esc(fd.k)+'" data-multi="1" value="'+esc(chosen.join(', '))+'">'+
      '<div class="chips" data-chips="'+esc(fd.k)+'">'+chips+'</div>';
  } else if(fd.t==='kselect'){
    inner = '<select data-k="'+esc(fd.k)+'" data-kselect="1"'+ro+'><option value=""></option></select>';
  } else if(fd.t==='money'){
    inner = '<input type="text" inputmode="numeric" data-k="'+esc(fd.k)+'" data-money="1"'+ro+' value="'+esc(fmtRp(val))+'">';
  } else {
    let type = fd.t==='num'?'number': fd.t==='date'?'date': fd.t==='month'?'month':'text';
    inner = '<input type="'+type+'" data-k="'+esc(fd.k)+'"'+ro+' value="'+esc(val)+'">';
  }
  return '<div class="field'+full+comp+svc+'"><label>'+esc(fd.k)+(fd.req?' <span class="req">*</span>':'')+'</label>'+inner+'</div>';
}

/* prefetch datalist sources */
async function ensureLists(v){
  const needs = new Set();
  v.form && v.form.forEach(fd=>{ if(fd.list) needs.add(fd.list); });
  if(needs.has('karyawan') && !state.cache.karyawan){
    state.cache.karyawan = trimKeys((await api({action:'list', sheet:'KARYAWAN'})).data||[]);
  }
  if(needs.has('cleaner') && !state.cache.cleaner){
    const cab = state.session.cabang || (state.editing && state.editing['Cabang']) || '';
    const r = await api({action:'list', sheet:'KARYAWAN', filters: cab?{'Cabang':cab}:{}});
    state.cache.cleaner = trimKeys(r.data||[]).filter(e=>String(e['Jabatan']).trim().toLowerCase()==='cleaner');
  }
  if(needs.has('order') && !state.cache.order){
    const r = await api({action:'list', sheet:'ORDER', filters:{'Cabang':state.session.cabang}});
    state.cache.order = trimKeys(r.data||[]);
  }
  if(needs.has('layanan') && !state.cache.layanan){
    state.cache.layanan = trimKeys((await api({action:'list', sheet:'LAYANAN'})).data||[]);
  }
}
function fillDatalists(){
  document.querySelectorAll('[data-dl]').forEach(dl=>{
    const src=dl.dataset.dl; let items=[];
    if(src==='karyawan') items=(state.cache.karyawan||[]).map(e=>({v:e['ID Karyawan'], t:e['Nama Lengkap']}));
    if(src==='cleaner') items=(state.cache.cleaner||[]).map(e=>({v:e['Nama Lengkap'], t:e['Jabatan']}));
    if(src==='order') items=(state.cache.order||[]).map(o=>({v:o['ID Order'], t:(o['Nama Customer']||'-')+' · '+tglPanjangId(o['Tanggal Pengerjaan'])}));
    dl.innerHTML = items.map(i=>'<option value="'+esc(i.v)+'">'+esc(i.t||'')+'</option>').join('');
  });
}
/* ---------- pencarian No Order (Input Bonus): ketik-cari berdasarkan nama customer,
   pilihan dibatasi sesuai filter Bulan/Tanggal/Kemarin-HariIni-Besok yang sedang aktif ---------- */
function orderSearchLabel(o){
  return o ? ((o['Nama Customer']||'-')+' · '+tglPanjangId(o['Tanggal Pengerjaan'])+' · '+o['ID Order']) : '';
}
function orderSearchCandidates(){
  let arr=(state.cache.order||[]).slice();
  if(state.dateStart||state.dateEnd){
    arr=arr.filter(o=>{
      const d=String(o['Tanggal Pengerjaan']||''); if(!d) return false;
      if(state.dateStart && d<state.dateStart) return false;
      if(state.dateEnd && d>state.dateEnd) return false;
      return true;
    });
  }
  return arr;
}
function wireOrderSearch(){
  document.querySelectorAll('[data-oswrap]').forEach(wrap=>{
    const key=wrap.dataset.oswrap;
    const hid=wrap.querySelector('[data-k="'+CSS.escape(key)+'"]');
    const inp=wrap.querySelector('[data-os-input]');
    const list=wrap.querySelector('[data-os-list]');
    if(!hid||!inp||!list) return;
    function renderList(q){
      const qq=norm(q||'');
      let arr=orderSearchCandidates();
      const curId=hid.value;
      if(curId && !arr.some(o=>String(o['ID Order'])===String(curId))){
        const cur=(state.cache.order||[]).find(o=>String(o['ID Order'])===String(curId));
        if(cur) arr=[cur].concat(arr);
      }
      if(qq) arr=arr.filter(o=>norm(o['Nama Customer']||'').includes(qq) || norm(o['ID Order']||'').includes(qq));
      arr=arr.slice(0,50);
      list.innerHTML = arr.length ? arr.map(o=>
        '<div class="os-item" data-os-id="'+esc(o['ID Order'])+'"><b>'+esc(o['Nama Customer']||'-')+'</b>'+
        '<span>'+esc(tglPanjangId(o['Tanggal Pengerjaan']))+' · '+esc(o['ID Order'])+'</span></div>'
      ).join('') : '<div class="os-empty">Tidak ada order cocok'+((state.dateStart||state.dateEnd)?' pada filter tanggal aktif':'')+'</div>';
      list.querySelectorAll('[data-os-id]').forEach(it=>{
        it.addEventListener('mousedown', e=>{
          e.preventDefault();
          const oid=it.dataset.osId;
          const o=arr.find(x=>String(x['ID Order'])===oid);
          hid.value=oid; inp.value=orderSearchLabel(o);
          list.classList.remove('open');
          onPickOrder();
        });
      });
    }
    inp.addEventListener('focus', ()=>{ inp.value=''; renderList(''); list.classList.add('open'); });
    inp.addEventListener('input', ()=>{ renderList(inp.value); });
    inp.addEventListener('blur', ()=>{
      setTimeout(()=>{
        list.classList.remove('open');
        const o=(state.cache.order||[]).find(x=>String(x['ID Order'])===String(hid.value));
        inp.value = o ? orderSearchLabel(o) : (hid.value||'');
      },150);
    });
  });
}

/* wire inputs: computed, file uploads, special lookups */
function wireFields(v){
  fillDatalists();

  // chips multi-pilih (Nama Cleaner)
  document.querySelectorAll('.chips').forEach(box=>{
    const hid=box.parentElement.querySelector('[data-multi]');
    box.querySelectorAll('[data-chip]').forEach(ch=>ch.addEventListener('click',()=>{
      ch.classList.toggle('on');
      const sel=[...box.querySelectorAll('.chip.on')].map(x=>x.dataset.chip);
      if(hid) hid.value=sel.join(', ');
    }));
  });
  // klik pratinjau gambar -> popup
  document.querySelectorAll('[data-prev]').forEach(im=>{
    im.style.cursor='zoom-in';
    im.addEventListener('click', ()=>{ if(im.getAttribute('src')) openImg(im.getAttribute('src')); });
  });
  // file inputs
  document.querySelectorAll('[data-file]').forEach(inp=>{
    inp.addEventListener('change', async e=>{
      const file=e.target.files[0]; if(!file) return;
      const key=inp.dataset.file;
      const fn=document.querySelector('[data-fn="'+CSS.escape(key)+'"]');
      fn.textContent='Mengunggah…';
      try{
        const up0 = await prepUpload(file);

        state.files[key]=r.url;
        fn.innerHTML='<a class="file-name" href="'+esc(r.url)+'" target="_blank">Tersimpan ✓</a>';
        const prev=document.querySelector('[data-prev="'+CSS.escape(key)+'"]');
        if(prev && /image/.test(up0.mime)){ prev.src=r.url; prev.style.display='block'; }
        // auto status order
        if(v.special==='order'){
          if(key==='Bukti Transfer'){ setVal('Status Order','done'); showInvoiceBtn(); state.files['Waktu Bukti Transfer']=nowStr_(); }
          if(key==='Bukti Cancel') setVal('Status Order','cancel');
        }
      }catch(err){ fn.textContent='Gagal'; toast(err.message,'err'); }
    });
  });
  // recompute triggers
  if(v.special==='order'){
    ['Qty 1','Harga 1','Qty 2','Harga 2','Qty 3','Harga 3','Diskon (%)','PPn'].forEach(k=>{
      const el=getEl(k); if(el){ el.addEventListener('input', recomputeOrder); el.addEventListener('change', recomputeOrder); }
    });
  }
  if(v.special==='gaji'){
    GAJI_BONUS_FIELDS.concat(GAJI_POTONGAN_FIELDS, GAJI_TUNJANGAN_FIELDS, ['Gaji Pokok']).forEach(k=>{
      const el=getEl(k); if(el){ el.addEventListener('input', recomputeGaji); el.addEventListener('change', recomputeGaji); }
    });
    const idk=getEl('ID Karyawan'); if(idk) idk.addEventListener('change', onPickKaryawan);
    const per=getEl('Periode Bulan'); if(per) per.addEventListener('change', onPickPeriode);
    const cab=getEl('Cabang'); if(cab) cab.addEventListener('change', populateKselect);
  }
  if(v.special==='bonus'){
    const no=getEl('No Order'); if(no) no.addEventListener('change', onPickOrder);
  }
  // format uang langsung (Rp + ribuan) untuk semua input uang
  document.querySelectorAll('[data-money]').forEach(el=>{
    if(el.readOnly) return;
    el.addEventListener('input', ()=>{ el.value=fmtRp(el.value); });
  });
}

/* ---------- field helpers ---------- */
function getEl(k){ return document.querySelector('[data-k="'+CSS.escape(k)+'"]'); }
function getVal(k){ const e=getEl(k); if(!e) return '';
  if(e.type==='checkbox') return e.checked ? (e.dataset.check||'11') : '0';
  return e.value;
}
function numVal(k){ const e=getEl(k);
  if(e && e.dataset && e.dataset.money) return Number(moneyDigits(e.value))||0;
  return Number(String(getVal(k)).replace(/[^0-9.\-]/g,''))||0;
}
function setVal(k,v){ const e=getEl(k); if(!e) return;
  if(e.type==='checkbox'){ e.checked = Number(String(v).replace(/[^0-9-]/g,''))>0; return; }
  if(e.dataset && e.dataset.money){ e.value = fmtRp(v); return; }
  e.value=(v==null?'':v);
}
function revealSvc(n){ document.querySelectorAll('.svc-'+n).forEach(el=>el.classList.remove('hide')); }
function wireSvcRows(){
  const btn=document.getElementById('addSvcBtn'); if(!btn) return;
  [2,3].forEach(n=>{ if(getVal('Layanan '+n) || numVal('Harga '+n)) revealSvc(n); });
  btn.addEventListener('click', ()=>{
    if(document.querySelector('.svc-2.hide')) revealSvc(2);
    else if(document.querySelector('.svc-3.hide')) revealSvc(3);
    if(!document.querySelector('.svc-row.hide')) btn.style.display='none';
  });
  if(!document.querySelector('.svc-row.hide')) btn.style.display='none';
}

/* kumpulkan nilai form order saat ini (untuk invoice) */
function collectOrderForm(){
  const v=state.view;
  const data = state.editing ? Object.assign({}, state.editing) : {};
  (v.form||[]).forEach(fd=>{
    if(fd.sec || fd.btn) return;
    if(fd.t==='file'){ if(state.files[fd.k]) data[fd.k]=state.files[fd.k]; }
    else if(fd.t==='money' || fd.t==='check'){ data[fd.k]=numVal(fd.k); }
    else data[fd.k]=getVal(fd.k);
  });
  data['Cabang'] = v.branchLock ? state.session.cabang : (data['Cabang']||state.session.cabang||'');
  return data;
}
/* tampilkan tombol unduh invoice di dalam form setelah bukti TF terunggah */
function showInvoiceBtn(){
  const fnEl=document.querySelector('[data-fn="Bukti Transfer"]');

  const b=document.createElement('button');
  b.type='button'; b.className='btn btn-gold btn-sm inv-btn'; b.style.marginLeft='8px';

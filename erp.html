/* ----- tampilan TAHUN (time schedule per pekan) ----- */
function agYearHTML(){
  const Y=Number(state.agYear);
  let ws=startOfWeek(new Date(Y,0,1));
  const yearEnd=new Date(Y,11,31);
  const weeks=[];
  while(ws<=yearEnd){
    const thu=new Date(ws); thu.setDate(ws.getDate()+3);
    let mo = thu.getFullYear()===Y ? thu.getMonth() : (ws<new Date(Y,0,1)?0:11);
    weeks.push({start:new Date(ws), month:mo});
    ws=new Date(ws); ws.setDate(ws.getDate()+7);
  }
  const rows=agRows();
  const spans=[]; weeks.forEach(w=>{ const last=spans[spans.length-1]; if(last&&last.m===w.month) last.n++; else spans.push({m:w.month,n:1}); });
  let mhead='<tr class="agy-mhead"><th class="agy-rolecol">Jabatan</th>';
  spans.forEach(s=>{ mhead+='<th colspan="'+s.n+'">'+BULAN_ID[s.m].slice(0,3)+'</th>'; });
  mhead+='</tr>';
  const body=AGENDA_ROLES.map(role=>{
    let tds='';
    weeks.forEach((w,wi)=>{
      const ws0=ymd(w.start); const we=new Date(w.start); we.setDate(w.start.getDate()+6); const we0=ymd(we);
      const has=rows.some(a=>String(a['Jabatan']||'').toUpperCase()===role && (function(){const d=String(a['Tanggal']||'').slice(0,10); return d>=ws0&&d<=we0;})());
      tds+='<td class="agy-cell'+(has?' on':'')+'" data-agweek="'+ws0+'" style="background:'+(has?AG_COLOR[role]:'transparent')+'" title="'+esc(role)+' · pekan '+(wi+1)+'"></td>';
    });
    return '<tr><td class="agy-rolecol"><span class="d" style="background:'+AG_COLOR[role]+'"></span>'+role+'</td>'+tds+'</tr>';
  }).join('');
  return '<div class="agy-wrap"><table class="agy-tbl"><thead>'+mhead+'</thead><tbody>'+body+'</tbody></table></div>'+
    '<div class="agy-hint">Setiap kolom = 1 pekan sepanjang tahun '+Y+'. Kotak berwarna = ada agenda jabatan tersebut pada pekan itu. Klik kotak untuk melihat rincian pekan.</div>'+
    '<div class="ag-detail" id="agDetail"></div>';
}
function agWireYear(){
  document.querySelectorAll('[data-agweek]').forEach(c=>c.addEventListener('click',()=>agShowWeek(c.dataset.agweek)));
}
function agShowWeek(ws0){
  const start=new Date(ws0); const ds0=ymd(start); const we=new Date(start); we.setDate(start.getDate()+6); const ds6=ymd(we);
  const rows=agRows().filter(a=>{ const d=String(a['Tanggal']||'').slice(0,10); return d>=ds0&&d<=ds6; })
    .sort((a,b)=>String(a['Tanggal']).localeCompare(String(b['Tanggal'])));
  const el=$('#agDetail'); if(!el) return;
  const listHtml = rows.length ? '<div class="ag-day-list">'+rows.map(a=>{
    const r=String(a['Jabatan']||'').toUpperCase();
    return '<div class="ag-item"><span class="ag-badge" style="background:'+(AG_COLOR[r]||'#888')+'">'+esc(r)+'</span>'+
      '<div class="ag-item-txt"><div>'+esc(a['Agenda']||'')+'</div><div class="ag-item-meta">'+esc(tglPanjangId(a['Tanggal']))+' · '+esc(a['Tipe']||'')+(a['Status']?(' · '+esc(a['Status'])):'')+'</div></div></div>';
  }).join('')+'</div>' : '<div class="cap-empty">Tidak ada agenda pada pekan ini.</div>';
  el.innerHTML='<div class="ag-detail-head"><div class="ag-detail-t">Pekan '+esc(tglPanjangId(ds0))+' – '+esc(tglPanjangId(ds6))+'</div></div>'+listHtml;
  el.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function shiftMonth(ym, delta){
  const [Y,M]=ym.split('-').map(Number); const d=new Date(Y, M-1+delta, 1);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
}
async function agSave(ds){
  const me=state.session.role;
  const text=($('#agText').value||'').trim(); if(!text){ toast('Agenda masih kosong','err'); return; }
  const rec={ Jabatan:me, Tanggal:ds, Tipe:$('#agTipe').value, Agenda:text, Status:$('#agStatus').value };
  showLoad(true);
  try{
    if(state._agEdit && state._agEdit.id){ await window.sb.from('AGENDA').update(rec).eq('id', state._agEdit.id); }
    else { await window.sb.from('AGENDA').insert(rec); }
    state._agEdit=null; state._agAddOpen=false; state._agSelDate=ds; state.agMode='bulan';
    state.agMonth=String(ds).slice(0,7);
    await loadList(true);
    toast('Agenda tersimpan','ok');
  }catch(e){ toast('Gagal simpan: '+(e.message||e),'err'); }
  finally{ showLoad(false); }
}
async function agDelete(id, ds){
  if(!confirm('Hapus agenda ini?')) return;
  showLoad(true);
  try{ await window.sb.from('AGENDA').delete().eq('id', id); state._agEdit=null; state._agAddOpen=false; state._agSelDate=ds; await loadList(true); toast('Agenda dihapus','ok'); }
  catch(e){ toast('Gagal hapus: '+(e.message||e),'err'); }
  finally{ showLoad(false); }
}

  const list=['Hampir kena!','Coba lagi 😜','Kabuurr!','Gesit dong~','Wuuush!','Nyaris!','Meleset!','Kejar teruus!','Ngga akan kena 😏'];

  const out=$('#btnDesignerOut'); if(out) out.addEventListener('click', logout);

function initFlyGame(){
  const arena=$('#flyArena'), fly=$('#fly'), hint=$('#flyHint');
  if(!arena||!fly) return;
  let fx=0, fy=0, attempts=0;
  function bounds(){ const r=arena.getBoundingClientRect(), fr=fly.getBoundingClientRect();
    return {r, fw:fr.width, fh:fr.height, maxX:Math.max(0,r.width-fr.width), maxY:Math.max(0,r.height-fr.height)}; }
  function place(x,y){ const b=bounds();
    fx=Math.max(0,Math.min(b.maxX,x)); fy=Math.max(0,Math.min(b.maxY,y));
    fly.style.left=fx+'px'; fly.style.top=fy+'px'; }
  setTimeout(()=>{ const b=bounds(); place(b.maxX/2, b.maxY/2); }, 40);
  function flee(clientX, clientY){
    const b=bounds();
    const cx=fx+b.fw/2, cy=fy+b.fh/2;              // titik tengah lalat (relatif arena)
    const mx=clientX-b.r.left, my=clientY-b.r.top; // kursor relatif arena
    const dx=cx-mx, dy=cy-my, dist=Math.hypot(dx,dy);
    if(dist<125){
      attempts++;
      const ang=Math.atan2(dy,dx)+(Math.random()-0.5)*1.6;
      const jump=150+Math.random()*140;
      let nx=cx+Math.cos(ang)*jump-b.fw/2, ny=cy+Math.sin(ang)*jump-b.fh/2;
      if(nx<0||nx>b.maxX||ny<0||ny>b.maxY){ nx=Math.random()*b.maxX; ny=Math.random()*b.maxY; }
      place(nx,ny);
      if(hint) hint.textContent=flyTaunt(attempts);
    }
  }
  arena.addEventListener('mousemove', e=>flee(e.clientX,e.clientY));
  arena.addEventListener('touchmove', e=>{ const t=e.touches[0]; if(t) flee(t.clientX,t.clientY); }, {passive:true});
  fly.addEventListener('click', ()=>{ const b=bounds(); place(Math.random()*b.maxX, Math.random()*b.maxY);
    if(hint) hint.textContent='Hampir! Tapi tetap ngga kena 😝'; });
  clearInterval(window._flyIdle);
  window._flyIdle=setInterval(()=>{ if(!document.getElementById('fly')){ clearInterval(window._flyIdle); return; }
    place(fx+(Math.random()-0.5)*46, fy+(Math.random()-0.5)*46); }, 1500);
}

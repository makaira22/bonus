/* ---------- special recompute ---------- */
function recomputeOrder(){
  const total = numVal('Harga 1') + numVal('Harga 2') + numVal('Harga 3');
  const disc = numVal('Diskon (%)'), ppn = numVal('PPn');
  const afterDisc = total*(1-disc/100);
  const final = Math.round(afterDisc*(1+ppn/100));
  setVal('Total Akhir', total);
  setVal('Total Akhir Setelah Diskon', final);
  setVal('Total Tagihan', final);
}
function recomputeGaji(){
  let bonus=0; GAJI_BONUS_FIELDS.forEach(k=>bonus+=numVal(k));
  let pot=0; GAJI_POTONGAN_FIELDS.forEach(k=>pot+=numVal(k));
  let tun=0; GAJI_TUNJANGAN_FIELDS.forEach(k=>tun+=numVal(k));
  const pokok=numVal('Gaji Pokok');
  const thp = pokok + bonus + tun - pot;
  setVal('Total Bonus', bonus);
  setVal('Total Potongan', pot);
  setVal('Take Home Pay', thp);
  setVal('Gaji Diterima', thp);
}
async function onPickKaryawan(){
  const id=getVal('ID Karyawan');
  const emp=(state.cache.karyawan||[]).find(e=>String(e['ID Karyawan'])===id);
  if(!emp) return;
  setVal('Nama Karyawan', emp['Nama Lengkap']);
  setVal('Cabang', emp['Cabang']); setVal('Jabatan', emp['Jabatan']); setVal('Status', emp['Status']);
  try{
    const gp=await api({action:'gajiPokok', cabang:emp['Cabang'], jabatan:emp['Jabatan'], status:emp['Status']});
    if(gp.found){
      setVal('Gaji Pokok', gp.gajiPokok);
      setVal('Bonus Bulanan', gp.bonusBulanan);
      setVal('Tunjangan Kos', gp.tunjanganKos);
      setVal('Tunjangan Kerja', gp.tunjanganKerja);
    }
    setPremiBpjs(gp.premiBpjs || 35000, true);
  }catch(e){}
  await onPickPeriode();
}
/* Atur nominal & status checkbox Premi BPJS. */
function setPremiBpjs(nominal, aktif){
  const el=getEl('Premi BPJS'); if(!el) return;
  el.dataset.check = String(Math.round(Number(nominal)||35000));
  if(aktif!=null) el.checked = !!aktif;
  const lab=el.parentElement && el.parentElement.querySelector('.chk-label');
  if(lab) lab.textContent='Premi BPJS aktif (+'+rp(el.dataset.check)+')';

/* Isi dropdown ID Karyawan berdasar Cabang yang dipilih (pilih cabang dulu, baru karyawan). */
function populateKselect(){
  const sel=getEl('ID Karyawan'); if(!sel || !sel.dataset.kselect) return;
  const cab=norm(getVal('Cabang'));
  const cur=state.editing ? String(state.editing['ID Karyawan']||'') : '';

  const list=(state.cache.karyawan||[]).filter(e=>norm(e['Cabang'])===cab);

    '<option value="'+esc(e['ID Karyawan'])+'"'+(String(e['ID Karyawan'])===cur?' selected':'')+'>'+

async function onPickPeriode(){
  const per=getVal('Periode Bulan'); const nama=getVal('Nama Karyawan');
  if(!per){ recomputeGaji(); return; }
  const [y,m]=per.split('-').map(Number);
  // Periode pengerjaan: 28 bulan sebelumnya s/d 27 bulan terpilih.
  const start=ymd(new Date(y, m-2, 28));
  const end=ymd(new Date(y, m-1, 27));
  try{
    const r=await api({action:'bonusSummary', namaCleaner:nama, start, end});
    Object.keys(r.totals||{}).forEach(k=>setVal(k, r.totals[k]));
    setVal('Awal Periode', start);
    setVal('Akhir Periode', end);
  }catch(e){ setVal('Awal Periode',start); setVal('Akhir Periode',end); }
  recomputeGaji();
}
function onPickOrder(){
  const id=getVal('No Order');
  const o=(state.cache.order||[]).find(x=>String(x['ID Order'])===id);
  if(!o) return;
  setVal('Nama Customer', o['Nama Customer']);
  setVal('Tanggal Pengerjaan', o['Tanggal Pengerjaan']);

/* ============================================================
   INVOICE PDF
   ============================================================ */
function fmtTgl(s){
  s=String(s||''); const m=s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  return m ? (m[3]+'/'+m[2]+'/'+m[1]) : (s||'-');
}
function buildInvoiceHTML(o){
  o=o||{};
  const info=branchInfo(o['Cabang']);
  let items=[1,2,3].map(i=>({nama:o['Layanan '+i]||'', qty:qtyNum(o['Qty '+i]), qtyText:String(o['Qty '+i]||''), harga:Number(o['Harga '+i]||0)}))
                   .filter(it=>it.nama||it.qtyText||it.harga);
  if(!items.length) items=[{nama:'',qty:0,qtyText:'',harga:0}];
  let subtotal=0; items.forEach(it=>subtotal+=it.harga);
  if(!subtotal && o['Total Akhir']) subtotal=Number(o['Total Akhir'])||0;
  const disc=Number(o['Diskon (%)']||0);
  const diskonNilai=Math.round(subtotal*disc/100);
  const afterDisc=subtotal-diskonNilai;
  const ppn=Number((o['PPn']!=null&&o['PPn']!=='')?o['PPn']:PPN_DEFAULT);
  const ppnNilai=Math.round(afterDisc*ppn/100);
  let grand=Number(o['Total Akhir Setelah Diskon']||0);
  if(!grand) grand=afterDisc+ppnNilai;

  const bd='1px solid #333';
  const cellL='padding:5px 8px;border:'+bd+';font-size:11px;';
  const lab='padding:5px 8px;border:'+bd+';font-size:11px;font-weight:bold;background:#f3f5f8;white-space:nowrap;';
  const money=n=>'Rp '+Number(n||0).toLocaleString('id-ID');

  const itemRows=items.map(it=>(
    '<tr>'+
      '<td style="'+cellL+'">'+esc(it.nama||'-')+'</td>'+
      '<td style="'+cellL+'text-align:center">'+esc(it.qtyText||'')+'</td>'+
      '<td style="'+cellL+'text-align:right">'+money(it.harga)+'</td>'+
    '</tr>'
  )).join('');

  const bankRows=INVOICE_BANK.map(b=>(
    '<tr><td style="font-size:11px;font-weight:bold;padding:2px 0;width:120px">'+esc(b.bank)+'</td>'+
    '<td style="font-size:11px;padding:2px 0">: '+esc(b.no)+' &nbsp;a.n. '+esc(b.an)+'</td></tr>'
  )).join('');

  return ''+
  '<div style="width:760px;background:#fff;color:#111;font-family:Arial,Helvetica,sans-serif;padding:28px 30px;box-sizing:border-box">'+
    // header
    '<table style="width:100%;border-collapse:collapse;margin-bottom:18px"><tr>'+

/* ---------- save ---------- */
async function saveForm(){
  const v=state.view;
  const data = state.editing ? Object.assign({}, state.editing) : {};
  // collect field values
  v.form.forEach(fd=>{
    if(fd.sec || fd.btn) return;
    if(fd.t==='file'){
      if(state.files[fd.k]) data[fd.k]=state.files[fd.k];
    }else if(fd.t==='money' || fd.t==='check'){
      data[fd.k]=numVal(fd.k);
    }else{
      data[fd.k]=getVal(fd.k);
    }
  });
  // enforce branch & cs
  if(v.sheet==='ORDER' && v.branchLock){ data['Cabang']=state.session.cabang; }
  if(v.sheet==='BONUS' && !data['Tanggal Input']) data['Tanggal Input']=new Date().toISOString().slice(0,10);
  // Pastikan bonus selalu membawa Cleaner/Customer/Tanggal dari order (agar tampil & terhitung).
  if(v.sheet==='BONUS' && data['No Order']){
    const o=(state.cache.order||[]).find(x=>String(x['ID Order'])===String(data['No Order']));
    if(o){
      if(!String(data['Nama Cleaner']||'').trim()) data['Nama Cleaner']=o['Nama Cleaner']||'';
      if(!String(data['Nama Customer']||'').trim()) data['Nama Customer']=o['Nama Customer']||'';
      if(!String(data['Tanggal Pengerjaan']||'').trim()) data['Tanggal Pengerjaan']=o['Tanggal Pengerjaan']||'';
    }
  }

  // validation
  const miss=[];
  v.form.forEach(fd=>{ if(fd.req && !String(data[fd.k]||'').trim()) miss.push(fd.k); });
  if(miss.length){ toast('Wajib diisi: '+miss.join(', '),'err'); return; }

  setSync(true);
  try{
    if(v.keyFields){
      await api({action:'upsert', sheet:(v.saveSheet||v.sheet), keyFields:v.keyFields, data});
      toast('Tersimpan','ok');
    }else if(state.editing){
      await api({action:'update', sheet:v.sheet, idField:v.idField, id:state.editing[v.idField], data});
      // Catat waktu upload bukti transfer bila baru diunggah lewat form (best-effort).
      if(v.sheet==='ORDER' && state.files['Waktu Bukti Transfer']){
        try{ await api({action:'update', sheet:'ORDER', id:state.editing[v.idField], data:{'Waktu Bukti Transfer':state.files['Waktu Bukti Transfer']}}); }catch(e){}
      }
      toast('Perubahan tersimpan','ok');
    }else{
      await api({action:'create', sheet:v.sheet, data});
      toast('Data ditambahkan','ok');
    }
    closeOverlay();
    state.cache[ {ORDER:'order', KARYAWAN:'karyawan'}[v.sheet] ] = undefined; // refresh caches
    if(v.sheet==='KARYAWAN'){ state.cache.cleaner=undefined; state.cache.karyawanMap=undefined; }
    invalidateLists();
    await loadList(true);
  }catch(err){ setSync(false); toast(err.message,'err'); }
}

function fileToB64(file){
  return new Promise((res,rej)=>{ const r=new FileReader();
    r.onload=()=>res(String(r.result).split(',')[1]); r.onerror=rej; r.readAsDataURL(file); });
}
/* Kompres gambar sebelum upload: resize maks 1400px + JPEG kualitas 0.62 (tetap terbaca). */
function prepUpload(file){
  return new Promise(resolve=>{
    const fallback=()=>{ const r=new FileReader(); r.onload=()=>resolve({base64:String(r.result).split(',')[1], mime:file.type, name:file.name}); r.readAsDataURL(file); };
    if(!/^image\//.test(file.type) || /gif|svg/.test(file.type)) return fallback();
    const url=URL.createObjectURL(file); const img=new Image();
    img.onload=()=>{
      let w=img.naturalWidth, h=img.naturalHeight; const maxDim=1400;
      if(Math.max(w,h)>maxDim){ const s=maxDim/Math.max(w,h); w=Math.round(w*s); h=Math.round(h*s); }
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      const ctx=c.getContext('2d'); ctx.fillStyle='#fff'; ctx.fillRect(0,0,w,h); ctx.drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      try{ const d=c.toDataURL('image/jpeg',0.62);
        resolve({base64:d.split(',')[1], mime:'image/jpeg', name:(file.name||'foto').replace(/\.[^.]+$/,'')+'.jpg'}); }
      catch(e){ fallback(); }
    };
    img.onerror=()=>{ URL.revokeObjectURL(url); fallback(); };
    img.src=url;
  });
}

function chatBubble(m, me){
  const mine=m.from_role===me;
  const t=(m.created_at||'').replace('T',' ').slice(0,16);
  return '<div class="cmsg '+(mine?'me':'them')+'">'+
    (mine?'':'<span class="cfrom">'+esc(m.from_role)+'</span>')+
    esc(m.message||'')+'<span class="cmeta">'+esc(t)+'</span></div>';
}
async function chatLoadThread(){
  const me=chatMe(), other=chatOther(); const body=$('#chatBody');
  if(!me||!other||!body) return;
  body.innerHTML='<div class="chat-empty">Memuat…</div>';
  let data=[];
  try{
    const r=await window.sb.from('CHAT').select('*')
      .or('and(from_role.eq.'+me+',to_role.eq.'+other+'),and(from_role.eq.'+other+',to_role.eq.'+me+')')
      .order('created_at',{ascending:true}).limit(300);
    data=r.data||[];
  }catch(e){ body.innerHTML='<div class="chat-empty">Gagal memuat obrolan.</div>'; return; }
  body.innerHTML = data.length ? data.map(m=>chatBubble(m,me)).join('') : '<div class="chat-empty">Belum ada pesan. Sapa '+esc(other)+' 👋</div>';
  body.scrollTop=body.scrollHeight;
  // tandai pesan dari "other" sebagai sudah dibaca
  try{ await window.sb.from('CHAT').update({read:true}).eq('to_role',me).eq('from_role',other).eq('read',false); }catch(e){}
  chatUpdateBadge();
}
async function chatSend(){
  const me=chatMe(), other=chatOther(); const inp=$('#chatMsg');
  if(!inp) return; const text=inp.value.trim(); if(!text||!other) return;
  inp.value='';
  const body=$('#chatBody');
  if(body){ if(body.querySelector('.chat-empty')) body.innerHTML='';
    body.insertAdjacentHTML('beforeend', chatBubble({from_role:me,to_role:other,message:text,created_at:new Date().toISOString()}, me));
    body.scrollTop=body.scrollHeight; }
  try{ await window.sb.from('CHAT').insert({from_role:me, to_role:other, message:text, read:false}); }
  catch(e){ toast('Gagal kirim pesan: '+(e.message||e),'err'); }
}
function chatOpen(){ const p=$('#chatPanel'); if(!p) return; p.classList.add('open'); chatLoadThread(); }
function chatClose(){ const p=$('#chatPanel'); if(p) p.classList.remove('open'); }
function initChat(){
  const me=chatMe(); if(!me) return;
  chatWeeklyCleanup();
  chatOptions({});
  const fab=$('#chatFab'), pnl=$('#chatPanel');
  if(fab && !fab._wired){ fab._wired=true;
    fab.addEventListener('click', ()=>{ if(pnl.classList.contains('open')) chatClose(); else chatOpen(); });
    $('#chatClose').addEventListener('click', chatClose);
    $('#chatRole').addEventListener('change', chatLoadThread);
    $('#chatSend').addEventListener('click', chatSend);
    $('#chatMsg').addEventListener('keydown', e=>{ if(e.key==='Enter') chatSend(); });
  }
  chatUpdateBadge();
  // realtime: pesan masuk untuk role saya
  if(state._chatCh){ try{ window.sb.removeChannel(state._chatCh); }catch(e){} state._chatCh=null; }
  state._chatCh = window.sb.channel('chat-'+me)
    .on('postgres_changes', {event:'INSERT', schema:'public', table:'CHAT', filter:'to_role=eq.'+me}, payload=>{
      const m=payload.new;
      const panelOpen=$('#chatPanel') && $('#chatPanel').classList.contains('open');
      if(panelOpen && m.from_role===chatOther()){ chatLoadThread(); }
      else { chatUpdateBadge(); toast('Pesan baru dari '+m.from_role,'ok'); }
    }).subscribe();
}

function csReminderCheck(){
  if(!state.session || state.session.role!=='CS') return;
  const now=new Date(); const hm=now.getHours()*60+now.getMinutes();
  const key='klinklin_rem_'+ymd(now);
  let done={}; try{ done=JSON.parse(localStorage.getItem(key)||'{}'); }catch(e){}
  [['pagi',510],['siang',750]].forEach(a=>{
    const slot=a[0], mins=a[1];
    if(hm>=mins && !done[slot]){ done[slot]=1; localStorage.setItem(key,JSON.stringify(done)); showCsReminder(); }
  });
}
function initCsReminder(){
  if(state.session && state.session.role==='CS'){
    showCsReminder();
    clearInterval(window._remTick);
    window._remTick=setInterval(csReminderCheck, 60000);
  }
}

/* ---------- AGENDA: wajib isi + pengingat Senin/Kamis ---------- */
async function agendaCheck(){
  const role=state.session && state.session.role;
  if(!AGENDA_ROLES.includes(role)) return;
  const ym=ymd(new Date()).slice(0,7), yy=ym.slice(0,4);
  let data=[];
  try{ const r=await window.sb.from('AGENDA').select('Tipe,Periode,Agenda').eq('Jabatan',role); data=r.data||[]; }
  catch(e){ return; }
  const hasBln=data.some(a=>a['Tipe']==='Bulanan' && String(a['Periode']).slice(0,7)===ym);
  const hasThn=data.some(a=>a['Tipe']==='Tahunan' && String(a['Periode']).slice(0,4)===yy);
  if(!hasBln || !hasThn){ showAgendaBlock(!hasBln,!hasThn); return; }
  agendaReminderMonThu(data);
}
function showAgendaBlock(needBln, needThn){
  const ov=$('#remOverlay'); if(!ov) return;
  state._remMode='block';
  const miss=[]; if(needBln) miss.push('Agenda Bulanan'); if(needThn) miss.push('Agenda Tahunan');
  $('#remBody').innerHTML='<div class="rem-emoji">🗓️</div><div class="rem-title">Isi Agenda Dulu</div>'+
    '<div class="rem-list"><div class="rem-item">Anda belum mengisi <b>'+miss.join('</b> &amp; <b>')+'</b> periode ini. Wajib diisi sebelum memakai menu lain.</div></div>'+
    '<button class="btn btn-primary rem-btn" id="remGoAgenda">Isi Agenda Sekarang</button>';
  $('#remClose').style.display='none';
  $('#remConfirm').style.display='none';
  $('#remMain').style.display='';
  ov.classList.add('open');
  const go=$('#remGoAgenda');
  if(go) go.addEventListener('click', ()=>{ ov.classList.remove('open'); $('#remClose').style.display='';
    selectMenu('agenda'); setTimeout(()=>{ if(VIEWS.agenda.canAdd) openForm(null); }, 350); });
}
function agendaReminderMonThu(data){
  const now=new Date(); const day=now.getDay(); // 1=Senin, 4=Kamis
  if(day!==1 && day!==4) return;
  const key='klinklin_agenda_'+ymd(now);
  if(localStorage.getItem(key)) return;
  localStorage.setItem(key,'1');
  const ym=ymd(now).slice(0,7), yy=ym.slice(0,4);
  const bln=data.filter(a=>a['Tipe']==='Bulanan' && String(a['Periode']).slice(0,7)===ym);
  const thn=data.filter(a=>a['Tipe']==='Tahunan' && String(a['Periode']).slice(0,4)===yy);
  const ov=$('#remOverlay'); if(!ov) return;
  state._remMode='agenda';
  const list = arr => arr.length? arr.map(a=>'<div class="rem-item">'+esc(a['Agenda']||'')+'</div>').join('') : '<div class="rem-item" style="color:var(--faint)">—</div>';
  $('#remBody').innerHTML='<div class="rem-emoji">📌</div><div class="rem-title">Agenda '+HARI_ID[day]+' Ini</div>'+
    '<div style="text-align:left;font-size:12px;font-weight:800;color:var(--faint);margin:2px 0 6px">BULANAN</div>'+
    '<div class="rem-list">'+list(bln)+'</div>'+
    (thn.length?'<div style="text-align:left;font-size:12px;font-weight:800;color:var(--faint);margin:12px 0 6px">TAHUNAN</div><div class="rem-list">'+list(thn)+'</div>':'');
  $('#remClose').style.display=''; $('#remClose').textContent='Oke, siap';
  $('#remConfirm').style.display='none'; $('#remMain').style.display='';
  ov.classList.add('open');
}

function flyTaunt(n){
  const list=['Hampir kena!','Coba lagi 😜','Kabuurr!','Gesit dong~','Wuuush!','Nyaris!','Meleset!','Kejar teruus!','Ngga akan kena 😏'];
  return list[n % list.length];
}
function renderDesigner(){
  document.querySelectorAll('.nav-item,.bn-item').forEach(b=>b.classList.remove('active'));
  $('#content').innerHTML =
    greetingHTML()+
    '<div class="page-head"><div><div class="page-title">Ruang Santai Designer</div>'+
      '<div class="page-sub">Tidak ada tugas di sini — coba tangkap si lalat kalau bisa 😄</div><div class="hairline"></div></div>'+
      '<div class="spacer"></div>'+
      '<button class="btn btn-danger" id="btnDesignerOut">'+svg('logout')+'Keluar</button>'+
    '</div>'+
    '<div class="fly-arena" id="flyArena">'+
      '<div class="fly-hint" id="flyHint">Gerakkan kursor ke arah lalat…</div>'+
      '<div class="fly" id="fly">'+FLY_SVG+'<span class="fly-label">Tangkap aku!</span></div>'+
    '</div>';
  const out=$('#btnDesignerOut'); if(out) out.addEventListener('click', logout);
  initFlyGame();
}
function initFlyGame(){
  const arena=$('#flyArena'), fly=$('#fly'), hint=$('#flyHint');
  if(!arena||!fly) return;
  let fx=0, fy=0, attempts=0;
  function bounds(){ const r=arena.getBoundingClientRect(), fr=fly.getBoundingClientRect();
    return {r, fw:fr.width, fh:fr.height, maxX:Math.max(0,r.width-fr.width), maxY:Math.max(0,r.height-fr.height)}; }
  function place(x,y){ const b=bounds();
    fx=Math.max(0,Math.min(b.maxX,x)); fy=Math.max(0,Math.min(b.maxY,y));
    fly.style.left=fx+'px'; fly.style.top=fy+'px'; }
  setTimeout(()=>{ const b=bounds(); place(b.maxX/2, b.maxY/2); }, 40);
  function flee(clientX, clientY){
    const b=bounds();
    const cx=fx+b.fw/2, cy=fy+b.fh/2;              // titik tengah lalat (relatif arena)
    const mx=clientX-b.r.left, my=clientY-b.r.top; // kursor relatif arena
    const dx=cx-mx, dy=cy-my, dist=Math.hypot(dx,dy);
    if(dist<125){
      attempts++;
      const ang=Math.atan2(dy,dx)+(Math.random()-0.5)*1.6;
      const jump=150+Math.random()*140;
      let nx=cx+Math.cos(ang)*jump-b.fw/2, ny=cy+Math.sin(ang)*jump-b.fh/2;
      if(nx<0||nx>b.maxX||ny<0||ny>b.maxY){ nx=Math.random()*b.maxX; ny=Math.random()*b.maxY; }
      place(nx,ny);
      if(hint) hint.textContent=flyTaunt(attempts);
    }
  }
  arena.addEventListener('mousemove', e=>flee(e.clientX,e.clientY));
  arena.addEventListener('touchmove', e=>{ const t=e.touches[0]; if(t) flee(t.clientX,t.clientY); }, {passive:true});
  fly.addEventListener('click', ()=>{ const b=bounds(); place(Math.random()*b.maxX, Math.random()*b.maxY);
    if(hint) hint.textContent='Hampir! Tapi tetap ngga kena 😝'; });
  clearInterval(window._flyIdle);
  window._flyIdle=setInterval(()=>{ if(!document.getElementById('fly')){ clearInterval(window._flyIdle); return; }
    place(fx+(Math.random()-0.5)*46, fy+(Math.random()-0.5)*46); }, 1500);
}

      '<span class="cap-bar"><span style="width:'+Math.max(5,Math.round(it.val/max*100))+'%"></span></span>'+
      '<span class="cap-val">'+fmt(it.val)+'</span></div>').join('');
    return '<div class="cap-card"><div class="cap-card-t">'+title+'</div>'+body+'</div>';
  };
  const listCardAlmt=(title,arr)=>{
    if(!arr.length) return '<div class="cap-card"><div class="cap-card-t">'+title+'</div><div class="cap-empty">Belum ada data</div></div>';
    const max=arr[0].val||1;
    const body=arr.map((it,i)=>{
      const full=String(it.k||'').trim(); const words=full.split(/\s+/);
      const shortTxt = words.length<=3 ? full : words.slice(0,3).join(' ');
      const more = words.length>3 ? '<button class="lnk-more" data-fulltext="'+esc(full)+'" data-fulltitle="Alamat lengkap">…</button>' : '';
      return '<div class="cap-row"><span class="cap-rank">'+(i+1)+'</span>'+
        '<span class="cap-name">'+esc(shortTxt)+more+'</span>'+
        '<span class="cap-bar"><span style="width:'+Math.max(5,Math.round(it.val/max*100))+'%"></span></span>'+
        '<span class="cap-val">'+it.val+' order</span></div>';
    }).join('');
    return '<div class="cap-card"><div class="cap-card-t">'+title+'</div>'+body+'</div>';
  };

  let chart;
  if(days.length){
    const maxD=Math.max.apply(null, days.map(d=>byDay[d]))||1;
    const n=days.length, step=42, pad=26, H=190;
    const W=Math.max(n*step+pad*2, 300), bw=Math.min(30, step-10);
    const bars=days.map((d,i)=>{
      const x=pad+i*step+(step-bw)/2;
      const h=Math.round(byDay[d]/maxD*(H-pad*2));
      const lbl=d.slice(8,10)+'/'+d.slice(5,7);
      return '<g><rect x="'+x+'" y="'+(H-pad-h)+'" width="'+bw+'" height="'+h+'" rx="4" fill="var(--petrol)"><title>'+lbl+': '+rp(byDay[d])+'</title></rect>'+
        '<text x="'+(x+bw/2)+'" y="'+(H-pad+13)+'" text-anchor="middle" font-size="9" fill="var(--muted)">'+lbl+'</text></g>';
    }).join('');
    chart='<div class="cap-card"><div class="cap-card-t">Grafik Omzet Harian</div><div class="cap-chart">'+
      '<svg viewBox="0 0 '+W+' '+H+'" style="min-width:'+W+'px;height:'+H+'px">'+bars+'</svg></div></div>';
  }else{
    chart='<div class="cap-card"><div class="cap-card-t">Grafik Omzet Harian</div><div class="cap-empty">Tidak ada data pada filter ini.</div></div>';
  }

  const layananCard = v.financePie ? pieCard('Top 5 Layanan — omzet', top5Lay, rp)
                                   : listCard('Top 10 Layanan — omzet', top10Lay, rp);

  $('#panel').innerHTML =
    statsHtml+
    chart+
    '<div class="cap-grid">'+
      listCard('Top 5 Cabang — omzet', top5Cab, rp)+
      layananCard+
      listCardAlmt('Top 10 Alamat — jumlah order', top10Alm)+
    '</div>';
  const kb=$('#capKpi'); if(kb) kb.addEventListener('click', ()=>selectMenu('kpiCSView'));
  document.querySelectorAll('#panel [data-fulltext]').forEach(b=>b.addEventListener('click',e=>{ e.stopPropagation();
    showNamePopup(b, b.dataset.fulltitle||'', b.dataset.fulltext||''); }));
  setCount(jumlah, 'order');
}

/* ============================================================
   OPERASIONAL — Laporan Omzet & Report KPI
   Periode bulanan memakai siklus TANGGAL 28 s/d 27.
   ============================================================ */
function omzetOf_(r){
  let v=Number(moneyDigits(r['Total Akhir Setelah Diskon']||r['Total Akhir']||0))||0;
  if(!v){ v=[1,2,3].reduce((s,i)=>s+(Number(moneyDigits(r['Harga '+i]))||0),0); }
  return v;
}
function periodBounds(ref){
  const d = ref ? new Date(ref) : new Date();
  let y=d.getFullYear(), m=d.getMonth();
  if(d.getDate()<28){ m-=1; if(m<0){ m=11; y-=1; } }
  const start=new Date(y,m,28), end=new Date(y,m+1,27);
  return {start:ymd(start), end:ymd(end)};
}
function prevPeriodBounds(cur){
  const s=new Date(cur.start);
  const ps=new Date(s.getFullYear(), s.getMonth()-1, 28);
  const pe=new Date(s.getFullYear(), s.getMonth(),   27);
  return {start:ymd(ps), end:ymd(pe)};
}
/* Baris ORDER setelah filter Cabang + Status Order (TANPA rentang tanggal). */
function opsBaseRows(){
  let rows=state.rows.slice();
  const fc=state.filters['Cabang'], fs=state.filters['Status Order'];
  if(fc) rows=rows.filter(r=>String(r['Cabang']||'').toUpperCase()===String(fc).toUpperCase());
  if(fs) rows=rows.filter(r=>norm(r['Status Order'])===norm(fs));
  else rows=rows.filter(r=>norm(r['Status Order'])!=='cancel');   // default: semua status kecuali cancel
  return rows;
}
function opsCabangList(){
  const v=state.view;
  if(v && v.branchLock && state.session && state.session.cabang) return [String(state.session.cabang).toUpperCase()];
  const fc=state.filters['Cabang'];
  if(fc) return [String(fc).toUpperCase()];
  return CABANG.filter(c=>c!=='OFFICE');
}
function inRange(d,a,b){ d=parseAnyDate(d); return d && d>=a && d<=b; }
function prevCalMonth(ym){ const m=String(ym||'').match(/^(\d{4})-(\d{2})/); if(!m) return ym;
  const d=new Date(+m[1],+m[2]-2,1); return d.getFullYear()+'-'+pad2_(d.getMonth()+1); }
function growthHTML(now, prev){
  const diff=now-prev;
  const pct = prev>0 ? (diff/prev*100) : (now>0?100:0);
  const up = diff>=0;
  const arrow = up?'▲':'▼';
  const cls = diff===0?'g-flat':(up?'g-up':'g-down');
  return '<span class="grow '+cls+'">'+arrow+' '+rp(Math.abs(diff))+' · '+(up?'+':'−')+Math.abs(pct).toFixed(1)+'%</span>';
}
async function loadTargets(){
  try{ const r=await api({action:'list', sheet:'TARGET_OMZET'});
    const map={}; (r.data||[]).forEach(t=>{ if(t['Cabang']) map[String(t['Cabang']).toUpperCase()]=Number(moneyDigits(t['Target Omzet']))||0; });
    state.cache.targets=map; return map;
  }catch(e){ state.cache.targets={}; return {}; }
}

function renderLaporanOmzet(){
  const base=opsBaseRows();
  const todayYmd = ymd(new Date());
  // Periode dari filter tanggal (rentang / hari / preset). Default: bulan berjalan tgl 1 s/d hari ini.
  let cur;
  if(state.dateStart || state.dateEnd){
    const s = state.dateStart || state.dateEnd;
    const e = state.dateEnd   || state.dateStart;
    cur = { start:(s<=e?s:e), end:(s<=e?e:s) };
  } else {
    const cmb=calMonthBounds(todayYmd.slice(0,7));
    cur = { start: cmb.start, end: todayYmd };
  }
  // Pembanding: rentang yang sama digeser mundur 1 bulan
  const backM=s=>{ const d=parseDate_(s); const lastPrev=new Date(d.getFullYear(), d.getMonth(), 0).getDate();
    return ymd(new Date(d.getFullYear(), d.getMonth()-1, Math.min(d.getDate(), lastPrev))); };
  const prev = { start: backM(cur.start), end: backM(cur.end) };
  const useRange = false;
  const dStart = cur.start, dEnd = cur.end;
  const cabs=opsCabangList();

  // Sumber chat → kanal (toleran terhadap ejaan: Iklan/Ads, Organik/Organic, Lama/Repeat)
  const chanKey=r=>{ const c=norm(r['Chat Dari']);
    if(c==='iklan'||c==='ads'||c==='iklan/ads'||c==='paid') return 'ads';
    if(c==='organik'||c==='organic'||c==='organ') return 'org';
    if(c==='lama'||c==='repeat'||c==='pelanggan lama'||c==='customer lama') return 'lama';
    return c; };

  let totNow=0, totPrev=0, totAds=0, totOrg=0, totLama=0;
  const rowsHtml = cabs.map(cab=>{
    const rc=base.filter(r=>cabangOf(r)===cab);
    const now = rc.filter(r=>inRange(r['Tanggal Pengerjaan'],cur.start,cur.end)).reduce((s,r)=>s+omzetOf_(r),0);
    const pv  = rc.filter(r=>inRange(r['Tanggal Pengerjaan'],prev.start,prev.end)).reduce((s,r)=>s+omzetOf_(r),0);
    const nowRows = rc.filter(r=>inRange(r['Tanggal Pengerjaan'],cur.start,cur.end));
    const chan = key => nowRows.filter(r=>chanKey(r)===key).reduce((s,r)=>s+omzetOf_(r),0);
    const ads=chan('ads'), org=chan('org'), lama=chan('lama');
    // terakhir update = tanggal pengerjaan terbaru pd periode ini
    let last=''; nowRows.forEach(r=>{ const d=parseAnyDate(r['Tanggal Pengerjaan']); if(d&&d>last) last=d; });
    totNow+=now; totPrev+=pv; totAds+=ads; totOrg+=org; totLama+=lama;
    return '<tr><td class="cab-cell">'+esc(cab)+'</td>'+
      '<td class="money">'+rp(now)+'</td>'+
      '<td class="money">'+rp(pv)+'</td>'+
      '<td>'+growthHTML(now,pv)+'</td>'+
      '<td>'+(last?esc(tglPanjangId(last)):'<span style="color:var(--faint)">—</span>')+'</td>'+
      '<td class="money">'+rp(ads)+'</td>'+
      '<td class="money">'+rp(org)+'</td>'+
      '<td class="money">'+rp(lama)+'</td></tr>';
  }).join('');

  // DETAIL omzet: matriks Cabang (baris) × Layanan (kolom) — transaksi & omzet
  const detMatrix={}; const layatSet=new Set();
  cabs.forEach(cab=>{ detMatrix[cab]={}; });
  cabs.forEach(cab=>{
    const rc=base.filter(r=>cabangOf(r)===cab &&
      inRange(r['Tanggal Pengerjaan'], dStart, dEnd));
    rc.forEach(r=>{
      [1,2,3].forEach(i=>{
        const nm=String(r['Layanan '+i]||'').trim(); if(!nm) return;
        const val=Number(moneyDigits(r['Harga '+i]))||0;
        layatSet.add(nm);
        if(!detMatrix[cab][nm]) detMatrix[cab][nm]={n:0,val:0};
        detMatrix[cab][nm].n++; detMatrix[cab][nm].val+=val;
      });
    });
  });
  const detLays=[...layatSet].sort((a,b)=>a.localeCompare(b,'id'));
  const colTot={}; detLays.forEach(l=>colTot[l]={n:0,val:0}); let grandN=0, grandVal=0;
  const detBodyRows=cabs.map(cab=>{
    let rowN=0, rowVal=0;
    // max/min per baris (hanya layanan yang ada transaksinya)
    const nz = detLays.map(l=>detMatrix[cab][l]).filter(Boolean);
    const multi = nz.length>=2;
    const maxN = multi?Math.max.apply(null,nz.map(c=>c.n)):-1;
    const minN = multi?Math.min.apply(null,nz.map(c=>c.n)):-1;
    const maxV = multi?Math.max.apply(null,nz.map(c=>c.val)):-1;
    const minV = multi?Math.min.apply(null,nz.map(c=>c.val)):-1;
    const cells=detLays.map(l=>{
      const c=detMatrix[cab][l];
      if(!c) return '<td class="detcell"><span class="dc-0">—</span></td>';
      rowN+=c.n; rowVal+=c.val; colTot[l].n+=c.n; colTot[l].val+=c.val;
      let cls='detcell';
      if(multi && c.val===maxV) cls+=' dc-hiV';
      else if(multi && c.val===minV) cls+=' dc-loV';
      const nMark = multi ? (c.n===maxN?' <span class="dc-mk up" title="Transaksi terbanyak">▲</span>'
                          : (c.n===minN?' <span class="dc-mk dn" title="Transaksi tersedikit">▼</span>':'')) : '';
      return '<td class="'+cls+'"><span class="dc-n">'+c.n+' trx'+nMark+'</span><span class="dc-v">'+rp(c.val)+'</span></td>';
    }).join('');
    grandN+=rowN; grandVal+=rowVal;
    return '<tr><td class="cab-cell l det-cabcol">'+esc(cab)+'</td>'+cells+
      '<td class="detcell dc-total"><span class="dc-n">'+rowN+' trx</span><span class="dc-v">'+rp(rowVal)+'</span></td></tr>';
  }).join('');
  const detHeadCols=detLays.map(l=>'<th class="c">'+esc(l)+'</th>').join('');
  const detFootCols=detLays.map(l=>'<td class="detcell dc-total"><span class="dc-n">'+colTot[l].n+' trx</span><span class="dc-v">'+rp(colTot[l].val)+'</span></td>').join('');

  const periodeLbl = tglPanjangId(cur.start)+' – '+tglPanjangId(cur.end);
  const detLbl = useRange ? (tglPanjangId(dStart)+' – '+tglPanjangId(dEnd)) : periodeLbl;

  const stat=(l,val)=>'<div class="cap-stat"><div class="cap-stat-l">'+l+'</div><div class="cap-stat-v">'+val+'</div></div>';
  // Jumlah order cancel pada periode & cabang terpilih (independen dari filter status)
  const cancelCount = state.rows.filter(r=> cabs.indexOf(cabangOf(r))>-1
      && norm(r['Status Order'])==='cancel'
      && inRange(r['Tanggal Pengerjaan'],cur.start,cur.end)).length;
  const growStat = '<div class="cap-stat"><div class="cap-stat-l">Growth vs periode lalu</div>'+
    '<div class="cap-grow">'+growthHTML(totNow,totPrev)+'</div></div>';
  $('#panel').innerHTML =
    '<div class="ops-note">Periode: <b>'+esc(tglPanjangId(cur.start)+' – '+tglPanjangId(cur.end))+'</b> vs Periode Sebelumnya (−1 bulan): <b>'+esc(tglPanjangId(prev.start)+' – '+tglPanjangId(prev.end))+'</b><br>Berdasarkan Tanggal Pengerjaan · semua status kecuali cancel'+(state.filters['Status Order']?(' · filter: '+esc(state.filters['Status Order'])):'')+'</div>'+
    '<div class="cap-stats cap-stats-4">'+stat('Omzet Periode Ini',rp(totNow))+stat('Omzet Periode Lalu',rp(totPrev))+growStat+stat('Jumlah Cancel',cancelCount+' order')+'</div>'+
    '<div class="cap-card"><div class="cap-card-t">Omzet per Cabang</div>'+
      '<div class="tbl-wrap"><table class="ops-tbl"><thead><tr>'+
        '<th class="l">Cabang</th><th class="r">Periode Ini</th><th class="r">Periode Lalu</th><th class="l">Growth</th><th class="l">Terakhir Update</th><th class="r">Ads</th><th class="r">Organik</th><th class="r">Lama</th>'+
      '</tr></thead><tbody>'+rowsHtml+
      '<tr class="ops-total"><td>TOTAL</td><td class="money">'+rp(totNow)+'</td><td class="money">'+rp(totPrev)+'</td>'+
        '<td>'+growthHTML(totNow,totPrev)+'</td><td>—</td><td class="money">'+rp(totAds)+'</td><td class="money">'+rp(totOrg)+'</td><td class="money">'+rp(totLama)+'</td></tr>'+
      '</tbody></table></div></div>'+
    '<div class="cap-card"><div class="cap-card-t">Detail Omzet per Layanan <span class="cap-sub2">('+esc(detLbl)+')</span></div>'+
      (detLays.length ?
        '<div class="tbl-wrap"><table class="ops-tbl det-tbl"><thead><tr>'+
          '<th class="l det-cabcol">Cabang</th>'+detHeadCols+'<th class="c">Total</th>'+
        '</tr></thead><tbody>'+detBodyRows+
          '<tr class="ops-total"><td class="l det-cabcol">TOTAL</td>'+detFootCols+
            '<td class="detcell dc-total"><span class="dc-n">'+grandN+' trx</span><span class="dc-v">'+rp(grandVal)+'</span></td></tr>'+
        '</tbody></table></div>'+
        '<div class="kpi-legend det-legend"><span class="dc-swatch dc-hiV"></span> Omzet tertinggi · '+
          '<span class="dc-swatch dc-loV"></span> Omzet terendah · '+
          '<span class="dc-mk up">▲</span> transaksi terbanyak · '+
          '<span class="dc-mk dn">▼</span> transaksi tersedikit <span style="color:var(--faint)">(per cabang)</span></div>'
      : '<div class="cap-empty">Tidak ada transaksi pada periode ini.</div>')+
    '</div>';
  setCount(base.filter(r=>inRange(r['Tanggal Pengerjaan'],cur.start,cur.end)).length, 'order');
}

function renderReportKPI(){
  const base=opsBaseRows();
  const targets=state.cache.targets||{};
  const todayYmd = ymd(new Date());
  // Periode dari filter tanggal (rentang / hari / preset). Default: bulan berjalan tgl 1 s/d hari ini.
  let cur;
  if(state.dateStart || state.dateEnd){
    const s = state.dateStart || state.dateEnd;
    const e = state.dateEnd   || state.dateStart;
    cur = { start:(s<=e?s:e), end:(s<=e?e:s) };
  } else {
    const cmb=calMonthBounds(todayYmd.slice(0,7));
    cur = { start: cmb.start, end: todayYmd };
  }
  // Pembanding: rentang yang SAMA digeser mundur 1 bulan (mis. 1–10 Jul → 1–10 Jun)
  const backM=s=>{ const d=parseDate_(s); const lastPrev=new Date(d.getFullYear(), d.getMonth(), 0).getDate();
    return ymd(new Date(d.getFullYear(), d.getMonth()-1, Math.min(d.getDate(), lastPrev))); };
  const prev = { start: backM(cur.start), end: backM(cur.end) };
  const pStart=cur.start, pEnd=cur.end;
  // "Target aman": proporsi lama rentang terhadap jumlah hari di bulan rentang tsb
  const dim = calMonthBounds(pStart.slice(0,7));
  const daysInMonth = Math.max(1,(new Date(dim.end)-new Date(dim.start))/86400000+1);
  const rangeDays = Math.max(1,(new Date(pEnd)-new Date(pStart))/86400000+1);
  const safePct = Math.min(100, Math.round(rangeDays/daysInMonth*100));
  const cabs=opsCabangList();

  let objs = cabs.map(cab=>{
    const rc=base.filter(r=>cabangOf(r)===cab);
    const ach=rc.filter(r=>inRange(r['Tanggal Pengerjaan'],pStart,pEnd)).reduce((s,r)=>s+omzetOf_(r),0);
    const pv =rc.filter(r=>inRange(r['Tanggal Pengerjaan'],prev.start,prev.end)).reduce((s,r)=>s+omzetOf_(r),0);
    const tgt=targets[cab]||0;
    const kpi = tgt>0 ? (ach/tgt*100) : 0;
    let cls='k-red';
    if(tgt<=0) cls='k-none';
    else if(kpi>=safePct) cls='k-green';
    else if(kpi>=safePct-30) cls='k-yellow';
    const growth = pv>0 ? ((ach-pv)/pv*100) : (ach>0?100:0);
    return {cab, ach, pv, tgt, kpi, cls, growth, hasT:tgt>0};
  });
  // Urutkan sesuai kolom yang diklik
  if(state.rkSort && state.rkSort.col){
    const c=state.rkSort.col, dir=state.rkSort.dir;
    objs.sort((a,b)=>(a[c]-b[c])*dir);
  }
  const rowsHtml = objs.map(o=>{
    const gcls = o.ach-o.pv>=0?'g-up':'g-down';
    return '<tr>'+
      '<td class="cab-cell l">'+esc(o.cab)+'</td>'+
      '<td class="c">'+safePct+'%</td>'+
      '<td class="c"><span class="kpi-badge '+o.cls+'">'+(o.hasT?o.kpi.toFixed(1)+'%':'—')+'</span></td>'+
      '<td class="grow '+gcls+' c">'+(o.ach-o.pv>=0?'+':'−')+Math.abs(o.growth).toFixed(1)+'%</td>'+
      '<td class="money">'+rp(o.ach)+'</td>'+
      '<td class="money">'+rp(o.tgt)+'</td></tr>';
  }).join('');

  const th=(label,col,cls)=>{
    const s=state.rkSort||{}; const on=s.col===col;
    const car=on?(s.dir>0?' ▲':' ▼'):' ⇅';
    return '<th class="'+(cls||'')+' rk-sort" data-rksort="'+col+'">'+label+'<span class="rk-car">'+car+'</span></th>';
  };
  const hasTarget=Object.keys(targets).length>0;
  $('#panel').innerHTML =
    '<div class="ops-note">Periode: <b>'+esc(tglPanjangId(cur.start)+' – '+tglPanjangId(cur.end))+'</b> · Pembanding (−1 bulan): <b>'+esc(tglPanjangId(prev.start)+' – '+tglPanjangId(prev.end))+'</b> · Target aman: <b>'+safePct+'%</b>'+
      (hasTarget?'':' · <span style="color:var(--danger)">Target omzet belum diatur (Pengaturan → Target Omzet)</span>')+'</div>'+
    '<div class="cap-card"><div class="cap-card-t">KPI Omzet per Cabang</div>'+
      '<div class="tbl-wrap"><table class="ops-tbl"><thead><tr>'+
        '<th class="l">Cabang</th><th class="c">Target Aman</th>'+
        th('KPI Omzet','kpi','c')+th('Growth','growth','c')+th('Omzet Dicapai','ach','r')+th('Target Omzet','tgt','r')+
      '</tr></thead><tbody>'+rowsHtml+'</tbody></table></div>'+
      '<div class="kpi-legend"><span class="kpi-badge k-green">Hijau</span> di atas target aman · '+
        '<span class="kpi-badge k-yellow">Kuning</span> kurang s/d 30% · '+
        '<span class="kpi-badge k-red">Merah</span> di bawah itu · <span style="color:var(--faint)">klik judul kolom untuk mengurutkan</span></div>'+
    '</div>'+
    '<div class="cap-card"><div class="cap-card-t">Semua Order (dibuat CS · semua cabang · semua status)</div>'+
      rkFilterBarHTML()+
      '<div id="rkOrders"></div></div>';
  // handler sort kolom
  document.querySelectorAll('[data-rksort]').forEach(t=>t.addEventListener('click',()=>{
    const col=t.dataset.rksort; const s=state.rkSort||{};
    state.rkSort = (s.col===col) ? {col, dir:-s.dir} : {col, dir:-1}; // klik pertama: terbesar→terkecil
    renderReportKPI();
  }));
  wireRkFilters();
  renderRkOrders();
  setCount(cabs.length, 'cabang');
}

  const cabOpts=CABANG.filter(c=>c!=='OFFICE').map(c=>'<option'+(f.cab===c?' selected':'')+'>'+esc(c)+'</option>').join('');
  const stOpts=STATUS_ORDER.map(s=>'<option'+(f.status===s?' selected':'')+'>'+esc(s)+'</option>').join('');
  const on=p=>((f.preset||'')===p?' on':'');

    '<div class="date-tabs" id="rkTabs">'+

function wireRkFilters(){
  const f=()=>state.rkFilter||(state.rkFilter={});
  const apply=()=>{ state.rkOrderPage=0; renderRkOrders(); };
  const q=$('#rkQ'); if(q) q.addEventListener('input',e=>{ f().q=e.target.value; apply(); });
  const cab=$('#rkCab'); if(cab) cab.addEventListener('change',e=>{ f().cab=e.target.value; apply(); });
  const st=$('#rkStatus'); if(st) st.addEventListener('change',e=>{ f().status=e.target.value; apply(); });
  const fr=$('#rkFrom'), to=$('#rkTo');
  const setRange=()=>{ f().start=fr&&fr.value?fr.value:''; f().end=to&&to.value?to.value:''; f().preset='';
    document.querySelectorAll('#rkTabs .dt').forEach(x=>x.classList.remove('on'));
    const semua=document.querySelector('#rkTabs .dt[data-rkday=""]'); if(!f().start && !f().end && semua) semua.classList.add('on');
    apply(); };
  if(fr) fr.addEventListener('change', setRange);
  if(to) to.addEventListener('change', setRange);
  document.querySelectorAll('#rkTabs .dt').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('#rkTabs .dt').forEach(x=>x.classList.remove('on')); b.classList.add('on');
    const val=b.dataset.rkday, now=new Date();
    if(val==='today'){ const t=ymd(now); f().start=t; f().end=t; }
    else if(val==='yesterday'){ const y=new Date(now); y.setDate(y.getDate()-1); const t=ymd(y); f().start=t; f().end=t; }
    else if(val==='tomorrow'){ const y=new Date(now); y.setDate(y.getDate()+1); const t=ymd(y); f().start=t; f().end=t; }
    else { f().start=''; f().end=''; }
    f().preset=val;
    if(fr) fr.value=''; if(to) to.value='';
    apply();
  }));
}

function renderRkOrders(){

  if(f.status) rows=rows.filter(r=>norm(r['Status Order'])===norm(f.status));
  if(f.start||f.end){ const s=f.start||f.end, e=f.end||f.start; const a=(s<=e?s:e), b=(s<=e?e:s);
    rows=rows.filter(r=>inRange(r['Tanggal Pengerjaan'],a,b)); }
  if(f.q){ const q=norm(f.q);
    rows=rows.filter(r=>[r['Nama Customer'],r['ID Order'],r['No WA Customer'],r['Nama Cleaner'],r['Cabang']]
      .some(x=>norm(x).indexOf(q)>-1)); }
  rows.sort((a,b)=>{ const da=parseAnyDate(a['Tanggal Pengerjaan'])||parseAnyDate(a['Tanggal Input'])||'';
    const db=parseAnyDate(b['Tanggal Pengerjaan'])||parseAnyDate(b['Tanggal Input'])||''; return da<db?1:(da>db?-1:0); });

  const pageRows=rows.slice(state.rkOrderPage*PAGE,(state.rkOrderPage+1)*PAGE);

      '<td class="l">'+esc(tglPanjangId(r['Tanggal Pengerjaan'])||'-')+'</td>'+
      '<td class="money">'+rp(r['Total Akhir Setelah Diskon']||r['Total Akhir']||0)+'</td></tr>';
  }).join('');
  const tbl='<div class="tbl-wrap desk-only"><table class="ops-tbl"><thead><tr>'+
    '<th class="l">ID Order</th><th class="l">Cabang</th><th class="c">Status</th><th class="l">Customer</th><th class="l">Tanggal Pengerjaan</th><th class="r">Total</th>'+
    '</tr></thead><tbody>'+(trs||'<tr><td colspan="6" style="text-align:center;color:var(--faint);padding:14px">Tidak ada order</td></tr>')+'</tbody></table></div>';
  const pager= total>PAGE ? '<div class="pager desk-only"><button class="btn btn-ghost btn-sm" id="rkPrev"'+(state.rkOrderPage<=0?' disabled':'')+'>‹ Sebelumnya</button>'+
    '<span class="pager-info">'+(state.rkOrderPage*PAGE+1)+'–'+Math.min(total,(state.rkOrderPage+1)*PAGE)+' dari '+total+'</span>'+
    '<button class="btn btn-ghost btn-sm" id="rkNext"'+(state.rkOrderPage>=maxPage?' disabled':'')+'>Selanjutnya ›</button></div>' : '';

    return '<div class="ocard" data-rkdetail="'+esc(r['ID Order'])+'">'+

    state.cache.kpiCfg=map; return map;
  }catch(e){ state.cache.kpiCfg={}; return {}; }
}
function kpiItems(){
  return [
    {key:'Omzet',        tKey:'Target Omzet',        bKey:'Bobot Omzet',        money:true, auto:true, defB:40},
    {key:'Closing Rate', tKey:'Target Closing Rate', bKey:'Bobot Closing Rate', nKey:'Nilai Closing Rate', pct:true, defB:20},
    {key:'Closing Chat', tKey:'Target Closing Chat', bKey:'Bobot Closing Chat', nKey:'Nilai Closing Chat', defB:20},
    {key:'Stock Opname', tKey:'Target Stock Opname', bKey:'Bobot Stock Opname', nKey:'Nilai Stock Opname', defB:10},
    {key:'Review Maps',  tKey:'Target Review Maps',  bKey:'Bobot Review Maps',  nKey:'Nilai Review Maps',  defB:10}
  ];
}
function kpiTotalFor(cab, ym){
  const cfg=(state.cache.kpiCfg||{})[String(cab).toUpperCase()+'|'+ym]||{};
  const omzet=kpiOmzet(cab, ym);
  const num=v=>Number(moneyDigits(v))||0;
  let total=0;
  kpiItems().forEach(it=>{
    const target=num(cfg[it.tKey]);
    const bobot=(cfg[it.bKey]!=null&&String(cfg[it.bKey]).trim()!=='')?num(cfg[it.bKey]):it.defB;
    const nilai=it.auto?omzet:num(cfg[it.nKey]);
    if(target>0) total+=(nilai/target)*bobot;
  });
  return total;
}
function cabangOf(r){
  const c=String(r['Cabang']||'').trim().toUpperCase(); if(c) return c;
  const code=(String(r['ID Order']||r['No Order']||'').split('-')[0]||'').trim().toUpperCase();
  return CODE_CABANG[code]||'';
}
function kpiOmzet(cab, ym){
  const fs=state.filters['Status Order'];
  return state.rows.filter(r=>{
    if(cabangOf(r)!==cab) return false;
    // status: jika ada filter pakai itu; jika tidak → hanya pending/done/complete (buang cancel & status kosong)
    if(fs){ if(norm(r['Status Order'])!==norm(fs)) return false; }
    else if(['pending','done','complete'].indexOf(norm(r['Status Order']))<0) return false;
    return parseAnyMonth(r['Tanggal Pengerjaan'])===ym;
  }).reduce((s,r)=>s+omzetOf_(r),0);
}

function dashInit(){
  if(!state.dash) state.dash={ cab:'',status:'',ds:'',de:'',preset:'',cmp:false,
    tab:'operasional', tcab:'',tds:'',tde:'', tsearch:'', tperiode:'', finPage:0, hrdGajiPage:0, hrdInsPage:0, opSort:null };
}
function shiftDays_(ymdStr,n){ const d=parseDate_(ymdStr)||new Date(); d.setDate(d.getDate()+n); return ymd(d); }
function backMonth_(x){ const d=parseDate_(x); const lp=new Date(d.getFullYear(),d.getMonth(),0).getDate();
  return ymd(new Date(d.getFullYear(),d.getMonth()-1,Math.min(d.getDate(),lp))); }
function dashRange(ds,de,preset){
  const today=ymd(new Date());
  if(preset==='kemarin'){ const y=shiftDays_(today,-1); return {s:y,e:y}; }
  if(preset==='hariini'){ return {s:today,e:today}; }
  if(preset==='besok'){ const t=shiftDays_(today,1); return {s:t,e:t}; }
  if(ds||de){ const a=ds||de,b=de||ds; return {s:(a<=b?a:b),e:(a<=b?b:a)}; }
  return {s:today.slice(0,7)+'-01', e:today};
}
function dashCmpRange(cur,preset){
  const today=ymd(new Date());
  if(preset==='kemarin'||preset==='hariini'){ const c=shiftDays_(cur.s,-1); return {s:c,e:c}; }
  if(preset==='besok'){ return {s:today,e:today}; }
  return { s:backMonth_(cur.s), e:backMonth_(cur.e) };
}
function dashOrders(range,cab,status){
  return state.rows.filter(r=>{
    if(cab && cabangOf(r)!==String(cab).toUpperCase()) return false;
    const d=parseAnyDate(r['Tanggal Pengerjaan']); if(!d||d<range.s||d>range.e) return false;
    if(status && norm(r['Status Order'])!==norm(status)) return false;
    return true;
  });
}
function dashMetrics(range,cab,status){
  const ords=dashOrders(range,cab,status);
  const nonCancel = status ? ords : ords.filter(r=>norm(r['Status Order'])!=='cancel');
  const omzet=nonCancel.reduce((s,r)=>s+omzetOf_(r),0);
  const cancel=dashOrders(range,cab,'cancel').length;
  let kar=(state.cache.karyawanAll||[]).filter(k=>['freelance','vendor'].indexOf(norm(k['Status']))<0);

function dashTabHRD(){
  const D=state.dash; const cur=dashTabRange(); const q=norm(D.tsearch||'');
  const perOk=v=>{ if(D.tperiode){ return parseAnyMonth(v)===D.tperiode; }
    const m=parseAnyMonth(v); return m && m>=cur.s.slice(0,7) && m<=cur.e.slice(0,7); };
  let gaji=(state.cache.gajiAll||[]).filter(g=>{
    if(D.tcab && String(g['Cabang']||'').toUpperCase()!==String(D.tcab).toUpperCase()) return false;
    if(!perOk(g['Periode Bulan'])) return false;
    if(q && norm(g['Nama Karyawan']).indexOf(q)<0) return false;
    return true;
  });
  let ins=(state.cache.bonusAll||[]).filter(b=>{
    if(D.tcab && cabangOf(b)!==String(D.tcab).toUpperCase()) return false;
    const d=parseAnyDate(b['Tanggal Pengerjaan']);
    if(D.tperiode){ if(parseAnyMonth(b['Tanggal Pengerjaan'])!==D.tperiode) return false; }
    else if(!(d && d>=cur.s && d<=cur.e)) return false;
    if(q && norm(b['Nama Cleaner']).indexOf(q)<0 && norm(b['Nama Customer']).indexOf(q)<0) return false;
    return true;
  });
  // urut bulan terbaru dulu
  gaji.sort((a,b)=>String(parseAnyMonth(b['Periode Bulan'])||'').localeCompare(String(parseAnyMonth(a['Periode Bulan'])||'')));

  const PAGE=15;
  const pg=(arr,page)=>{ const mx=Math.max(0,Math.ceil(arr.length/PAGE)-1); const p=Math.min(page,mx); return {rows:arr.slice(p*PAGE,(p+1)*PAGE), p, mx, total:arr.length}; };
  const gP=pg(gaji,D.hrdGajiPage||0); D.hrdGajiPage=gP.p;

  let clArr=Object.keys(clMap).map(k=>({k, n:clMap[k].n, val:clMap[k].val})).sort((a,b)=>b.val-a.val);
  const cP=pg(clArr,D.hrdInsPage||0); D.hrdInsPage=cP.p;
  const pager=(id,P)=> P.total>PAGE?'<div class="pager"><button class="btn btn-ghost btn-sm" id="'+id+'Prev"'+(P.p<=0?' disabled':'')+'>‹ Sebelumnya</button>'+
    '<span class="pager-info">'+(P.p*PAGE+1)+'–'+Math.min(P.total,(P.p+1)*PAGE)+' dari '+P.total+'</span>'+
    '<button class="btn btn-ghost btn-sm" id="'+id+'Next"'+(P.p>=P.mx?' disabled':'')+'>Selanjutnya ›</button></div>':'';
  const gajiRows=gP.rows.map(g=>'<tr class="rowclick" data-dgid="'+esc(g['ID Slip']||'')+'"><td class="l">'+esc(g['Nama Karyawan']||'-')+'</td><td>'+esc(g['Cabang']||'-')+'</td>'+
    '<td>'+esc(g['Periode Bulan']||'-')+'</td><td class="money">'+rp(g['Take Home Pay']||0)+'</td></tr>').join('');
  const insRows=cP.rows.map(c=>'<tr class="rowclick" data-dcleaner="'+esc(c.k)+'"><td class="l">'+esc(c.k)+'</td><td class="c">'+c.n+'</td><td class="money">'+rp(c.val)+'</td></tr>').join('');
  return '<div class="cap-card"><div class="cap-card-t">Gaji ('+gP.total+') — klik untuk detail</div>'+
    '<div class="tbl-wrap"><table class="ops-tbl"><thead><tr><th class="l">Nama</th><th>Cabang</th><th>Periode</th><th class="r">Take Home Pay</th></tr></thead>'+
    '<tbody>'+(gajiRows||'<tr><td colspan="4" class="cap-empty">Belum ada data</td></tr>')+'</tbody></table></div>'+pager('gj',gP)+'</div>'+

    '<div class="tbl-wrap"><table class="ops-tbl"><thead><tr><th class="l">Nama Cleaner</th><th class="c">Jml Bonus</th><th class="r">Total Bonus</th></tr></thead>'+
    '<tbody>'+(insRows||'<tr><td colspan="3" class="cap-empty">Belum ada data</td></tr>')+'</tbody></table></div>'+pager('in',cP)+'</div>';

function grafInit(){ if(!state.graf) state.graf={cab:'',ds:'',de:''}; }
function grafRange(){ const G=state.graf;
  if(G.ds||G.de){ const a=G.ds||G.de,b=G.de||G.ds; return {s:(a<=b?a:b),e:(a<=b?b:a)}; }
  const t=ymd(new Date()); return {s:t.slice(0,7)+'-01', e:t}; }
function grafBars(title, arr, fmt){
  if(!arr.length) return '<div class="cap-card"><div class="cap-card-t">'+title+'</div><div class="cap-empty">Belum ada data</div></div>';
  const max=arr[0].val||1;
  return '<div class="cap-card"><div class="cap-card-t">'+title+'</div>'+arr.map((it,i)=>
    '<div class="cap-row"><span class="cap-rank">'+(i+1)+'</span><span class="cap-name" title="'+esc(it.k)+'">'+esc(it.k)+'</span>'+
    '<span class="cap-bar"><span style="width:'+Math.max(5,Math.round(it.val/max*100))+'%"></span></span>'+
    '<span class="cap-val">'+fmt(it.val)+'</span></div>').join('')+'</div>';
}
function grafPie(title, arr){
  const tot=arr.reduce((s,a)=>s+a.val,0);
  if(!tot) return '<div class="cap-card"><div class="cap-card-t">'+title+'</div><div class="cap-empty">Belum ada data</div></div>';
  const COL=['#123A5E','#3E86B5','#C2A567','#5E9E8E','#B5635A','#8E7CC3','#D08C42','#6FA8DC','#93C47D','#E06666'];
  let a0=-Math.PI/2, segs='';
  arr.forEach((it,idx)=>{ const frac=it.val/tot; const a1=a0+frac*2*Math.PI;
    const x0=100+90*Math.cos(a0), y0=100+90*Math.sin(a0), x1=100+90*Math.cos(a1), y1=100+90*Math.sin(a1);
    const large=frac>0.5?1:0;
    segs+='<path d="M100,100 L'+x0.toFixed(1)+','+y0.toFixed(1)+' A90,90 0 '+large+' 1 '+x1.toFixed(1)+','+y1.toFixed(1)+' Z" fill="'+COL[idx%COL.length]+'"><title>'+esc(it.k)+': '+rp(it.val)+' ('+(frac*100).toFixed(1)+'%)</title></path>';
    a0=a1; });
  const legend=arr.map((it,idx)=>'<div class="pie-leg"><span class="pie-dot" style="background:'+COL[idx%COL.length]+'"></span>'+esc(it.k)+' · '+((it.val/tot)*100).toFixed(1)+'%</div>').join('');
  return '<div class="cap-card"><div class="cap-card-t">'+title+'</div><div class="pie-wrap">'+
    '<svg viewBox="0 0 200 200" class="pie-svg">'+segs+'<circle cx="100" cy="100" r="46" fill="var(--surface)"/></svg>'+
    '<div class="pie-legs">'+legend+'</div></div></div>';
}
function grafLine(title, pairs, fmtV){
  if(!pairs.length) return '<div class="cap-card"><div class="cap-card-t">'+title+'</div><div class="cap-empty">Belum ada data</div></div>';
  const max=Math.max.apply(null,pairs.map(p=>p.v))||1;
  const W=Math.max(pairs.length*44+40,320),H=200,pad=28;
  const X=i=>pad+i*((W-pad*2)/Math.max(1,pairs.length-1));
  const Y=v=>H-pad-(v/max)*(H-pad*2);
  const pts=pairs.map((p,i)=>X(i)+','+Y(p.v).toFixed(1)).join(' ');
  const dots=pairs.map((p,i)=>'<circle cx="'+X(i).toFixed(1)+'" cy="'+Y(p.v).toFixed(1)+'" r="3.2" fill="var(--petrol)"><title>'+esc(p.k)+': '+fmtV(p.v)+'</title></circle>').join('');
  const labs=pairs.map((p,i)=>(pairs.length<=16||i%2===0)?'<text x="'+X(i).toFixed(1)+'" y="'+(H-8)+'" text-anchor="middle" font-size="9" fill="var(--muted)">'+esc(p.k)+'</text>':'').join('');
  return '<div class="cap-card"><div class="cap-card-t">'+title+'</div><div class="cap-chart">'+
    '<svg viewBox="0 0 '+W+' '+H+'" style="min-width:'+W+'px;height:'+H+'px">'+
    '<polyline points="'+pts+'" fill="none" stroke="var(--petrol)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>'+
    dots+labs+'</svg></div></div>';
}
function renderGrafik(){
  grafInit(); const G=state.graf; const range=grafRange();
  const inRng=r=>{ const d=parseAnyDate(r['Tanggal Pengerjaan']); return d && d>=range.s && d<=range.e && (!G.cab||cabangOf(r)===String(G.cab).toUpperCase()); };
  const ords=state.rows.filter(r=>inRng(r) && norm(r['Status Order'])!=='cancel');
  const byLay={}, byCab={}, byDay={}, byJam={};
  ords.forEach(r=>{ const o=omzetOf_(r);
    byCab[cabangOf(r)||'-']=(byCab[cabangOf(r)||'-']||0)+o;
    [1,2,3].forEach(i=>{ const nm=String(r['Layanan '+i]||'').trim(); if(nm) byLay[nm]=(byLay[nm]||0)+(Number(moneyDigits(r['Harga '+i]))||0); });
    const d=parseAnyDate(r['Tanggal Pengerjaan']); if(d) byDay[d]=(byDay[d]||0)+1;
    const j=String(r['Waktu Pengerjaan']||'').trim(); if(j) byJam[j]=(byJam[j]||0)+1;
  });
  // top karyawan by bonus
  const byCleaner={};
  (state.cache.bonusAll||[]).forEach(b=>{ const d=parseAnyDate(b['Tanggal Pengerjaan']);
    if(d && d>=range.s && d<=range.e && (!G.cab||cabangOf(b)===String(G.cab).toUpperCase())){
      String(b['Nama Cleaner']||'').split(',').map(x=>x.trim()).filter(Boolean).forEach(nm=>{ byCleaner[nm]=(byCleaner[nm]||0)+(Number(moneyDigits(b['Nominal']))||0); });
    }});
  // chat harian
  const chatDay={};
  (state.cache.chatHarianAll||[]).forEach(c=>{ const d=parseAnyDate(c['Tanggal']);
    if(d && d>=range.s && d<=range.e && (!G.cab||String(c['Cabang']||'').toUpperCase()===String(G.cab).toUpperCase())){
      const tot=['Cust Baru Organik','Cust Baru Iklan','Cust Lama'].reduce((s,k)=>s+(Number(moneyDigits(c[k]))||0),0);
      chatDay[d]=(chatDay[d]||0)+tot;
    }});
  const top=(obj,n)=>Object.keys(obj).map(k=>({k,val:obj[k]})).sort((a,b)=>b.val-a.val).slice(0,n);
  const dayPairs=Object.keys(byDay).sort().map(d=>({k:d.slice(8,10)+'/'+d.slice(5,7), v:byDay[d]}));
  const chatPairs=Object.keys(chatDay).sort().map(d=>({k:d.slice(8,10)+'/'+d.slice(5,7), v:chatDay[d]}));
  const jamArr=top(byJam,10);
  const cabOpts='<option value="">Semua Cabang</option>'+CABANG.filter(c=>c!=='OFFICE').map(c=>'<option'+(G.cab===c?' selected':'')+'>'+c+'</option>').join('');

  $('#panel').innerHTML=
    '<div class="dash-filter">'+
      '<select id="gCab" class="dash-sel">'+cabOpts+'</select>'+
      '<input type="date" id="gDs" class="dash-sel" value="'+esc(G.ds)+'">'+
      '<input type="date" id="gDe" class="dash-sel" value="'+esc(G.de)+'">'+
      '<span class="dash-hint">'+esc(tglPanjangId(range.s)+' – '+tglPanjangId(range.e))+'</span>'+
    '</div>'+
    grafPie('Komposisi Omzet per Cabang', top(byCab,10))+
    grafLine('Order Harian', dayPairs, v=>v+' order')+
    grafLine('Chat Harian (customer masuk)', chatPairs, v=>v+' chat')+
    '<div class="cap-grid">'+
      grafBars('Top 10 Layanan — omzet', top(byLay,10), rp)+
      grafBars('Top 10 Alamat — jumlah order', clusterByAlamat(ords).slice(0,10), x=>x+' order')+
    '</div>'+
    '<div class="cap-grid">'+
      grafBars('Top 10 Karyawan — bonus tertinggi', top(byCleaner,10), rp)+
      grafBars('Jam Pengerjaan Tersibuk', jamArr, x=>x+' order')+
    '</div>';
  const gv=id=>document.getElementById(id);
  gv('gCab').onchange=e=>{ G.cab=e.target.value; renderGrafik(); };
  gv('gDs').onchange=e=>{ G.ds=e.target.value; renderGrafik(); };
  gv('gDe').onchange=e=>{ G.de=e.target.value; renderGrafik(); };
  setCount(ords.length,'order');
}

  if(c==='Foto Profil'){
    return val ? '<img class="avatar" src="'+esc(val)+'" onerror="this.replaceWith(Object.assign(document.createElement(\'div\'),{className:\'avatar\',textContent:\''+initials(r['Nama Lengkap'])+'\'}))">'
               : '<div class="avatar">'+initials(r['Nama Lengkap'])+'</div>';
  }
  if(/^Bukti/.test(c)){
    return val ? '<a class="flink" data-img="'+esc(val)+'" style="cursor:zoom-in">Lihat</a>' : '<span style="color:var(--faint)">—</span>';
  }
  if(c==='Gambar'){
    return val ? '<a class="flink" data-img="'+esc(val)+'" style="cursor:zoom-in">Lihat</a>' : '<span style="color:var(--faint)">—</span>';
  }
  if(/File|Invoice/.test(c)){
    return val ? '<a class="flink" href="'+esc(val)+'" target="_blank" rel="noopener">Lihat</a>' : '<span style="color:var(--faint)">—</span>';
  }
  if(c==='Status Order' && v.statusBadge){
    const s=norm(val)||'pending'; return '<span class="badge b-'+s+'"><span class="d"></span>'+s+'</span>';
  }
  if(c==='Take Home Pay') return '<span class="thp">'+rp(val)+'</span>';
  if(c==='Nama Cleaner'){
    const names=String(val||'').split(',').map(s=>s.trim()).filter(Boolean);
    if(!names.length) return '<span style="color:var(--faint)">—</span>';
    if(names.length===1) return esc(names[0]);
    return esc(names[0])+'<button class="lnk-more" data-cleaners="'+esc(names.join('|'))+'">+'+(names.length-1)+' lainnya</button>';
  }
  if(c==='Nama Customer'){
    const full=String(val||'').trim();
    if(!full) return '<span style="color:var(--faint)">—</span>';
    const words=full.split(/\s+/);
    if(words.length<=3) return esc(full);
    return esc(words.slice(0,3).join(' '))+'<button class="lnk-more" data-fulltext="'+esc(full)+'" data-fulltitle="Nama Customer">…</button>';
  }
  if(c==='Tanggal Pengerjaan' || c==='Tanggal Input'){
    return val!=null && val!=='' ? esc(tglHariId(val)) : '<span style="color:var(--faint)">—</span>';
  }
  if(/^Tanggal/.test(c)){
    return val!=null && val!=='' ? esc(tglPanjangId(val)) : '<span style="color:var(--faint)">—</span>';
  }
  if(c==='Periode Bulan'){
    const ym=String(val||'').slice(0,7);
    return /^\d{4}-\d{2}$/.test(ym) ? esc(monthLabel(ym)) : (val!=null&&val!==''?esc(val):'<span style="color:var(--faint)">—</span>');
  }
  if(c==='PPn'){
    return Number(moneyDigits(val))>0 ? '11%' : '<span style="color:var(--faint)">—</span>';
  }
  if(/^Waktu /.test(c)){
    return val!=null && val!=='' ? esc(fmtWaktu(val)) : '<span style="color:var(--faint)">—</span>';
  }
  if(isMoney(c)) return rp(val);
  return val!=null && val!=='' ? esc(val) : '<span style="color:var(--faint)">—</span>';
}
function emptyState(msg){
  return '<div class="empty">'+svg('inbox')+'<b>'+msg+'</b><span>Tambahkan data baru atau ubah filter.</span></div>';
}
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
/* Bersihkan spasi di nama kolom dari sheet (mis. "Nama Layanan " -> "Nama Layanan")
   supaya nilai tetap terbaca walau header di Google Sheet ada spasi tak sengaja. */
function trimKeys(rows){
  return (rows||[]).map(r=>{
    if(!r || typeof r!=='object') return r;
    const o={}; Object.keys(r).forEach(k=>{ o[String(k).trim()]=r[k]; }); return o;
  });
}

   ============================================================ */
async function approveOrder(id){
  if(!confirm('Approve order '+id+' menjadi complete?')) return;
  setSync(true);
  try{ await api({action:'approveOrder', id}); toast('Order '+id+' disetujui','ok'); invalidateLists(); await loadList(true); }
  catch(err){ setSync(false); toast(err.message,'err'); }
}

/* ============================================================
   FORM (ADD / EDIT)
   ============================================================ */
async function openForm(row, pre){
  const v=state.view;
  state.editing = row; state.files={};
  const sv=$('#modalSave'); if(sv){ sv.style.display=''; sv.textContent = (v.keepOpen && !row) ? 'Simpan & lanjut' : 'Simpan'; }
  const dn=$('#modalDone'); if(dn) dn.style.display = (v.keepOpen && !row) ? '' : 'none';
  const cc=$('#modalCancel'); if(cc){ cc.textContent='Batal'; cc.classList.remove('btn-danger'); }
  $('#modalTitle').textContent = (row?'Edit ':'Tambah ')+v.title;

  // Finance (tanpa branchLock): muat ulang daftar cleaner sesuai cabang order ini.
  if(!v.branchLock) state.cache.cleaner = undefined;

  // prefetch lists needed for datalists
  await ensureLists(v);

  const data = row ? Object.assign({}, row) : Object.assign(defaults(v), pre||{});
  let html='<div class="form-grid">';
  v.form.forEach(fd=>{
    if(fd.sec){ html += '<div class="sec-title">'+fd.sec+'</div>'; return; }
    html += renderField(fd, data[fd.k]);
  });
  html+='</div>';
  $('#modalBody').innerHTML=html;
  wireFields(v);
  if(v.special==='gaji'){ populateKselect(); recomputeGaji(); }
  if(v.special==='order'){ recomputeOrder(); wireSvcRows(); if(row && row['Bukti Transfer']) showInvoiceBtn(); }
  openOverlay();
}
function defaults(v){
  const d={}; const today=ymd(new Date());
  if(v.sheet==='ORDER'){ d['Tanggal Input']=today; d['Status Order']='pending';
    d['Cabang']=state.session.cabang; d['CS Penanggung Jawab']=state.session.nama;
    d['PPn']=0; }
  if(v.sheet==='BONUS'){ d['Tanggal Input']=today; }
  if(v.sheet==='GAJI'){ d['Tanggal Cetak']=today; }
  if(v.sheet==='TODO'){ d['Jabatan']=state.session.role; d['Tanggal']=today; d['Status']='Belum'; d['Warna']='Biru'; }
  if(v.sheet==='CHAT_HARIAN'){ d['Cabang']=state.session.cabang; d['Tanggal']=today; }
  if(v.sheet==='REMINDER'){ d['Aktif']=1; d['Tujuan']='SEMUA'; }
  return d;
}
function renderField(fd, val){
  if(fd.btn==='addSvc'){
    return '<div class="field full"><button type="button" class="btn btn-ghost btn-sm" id="addSvcBtn">'+svg('plus')+'Tambah layanan</button></div>';
  }
  const id='fld_'+fd.k.replace(/[^a-z0-9]/gi,'_');
  const full = fd.full || fd.t==='textarea' ? ' full':'';
  const comp = fd.computed ? ' computed':'';
  const svc = fd.svc ? (' svc-row svc-'+fd.svc+' hide') : '';
  const hidden = (state.view && state.view.hideFormFields && state.view.hideFormFields.indexOf(fd.k)>-1) ? ' form-hidden' : '';
  let inner='';
  const ro = fd.ro || fd.computed ? ' readonly' : '';
  val = val==null?'':val;
  if(fd.t==='check'){
    const numv = Number(String(val).replace(/[^0-9-]/g,''))||0;
    const on = numv>0;
    const dc = (fd.k==='Premi BPJS') ? (on?numv:35000) : 11;
    return '<div class="field'+full+'"><label>&nbsp;</label>'+
      '<label class="chk"><input type="checkbox" data-k="'+esc(fd.k)+'" data-check="'+dc+'"'+(on?' checked':'')+'> '+
      '<span class="chk-label">'+esc(fd.label||fd.k)+'</span></label></div>';
  }
  if(fd.t==='select'){
    let opts=(fd.opts||[]).slice();
    // auto-baca nilai dari sheet meski beda huruf besar/kecil; jika tak ada, tampilkan apa adanya.
    if(val!=='' && !opts.some(o=>norm(o)===norm(val))) opts=[val].concat(opts);
    inner = '<select data-k="'+esc(fd.k)+'"'+ro+'>'+
      '<option value=""></option>'+
      opts.map(o=>'<option'+(norm(o)===norm(val)?' selected':'')+'>'+esc(o)+'</option>').join('')+'</select>';
  } else if(fd.t==='textarea'){
    inner = '<textarea data-k="'+esc(fd.k)+'"'+ro+'>'+esc(val)+'</textarea>';
  } else if(fd.t==='file'){
    const has = val ? '<a class="file-name" href="'+esc(val)+'" target="_blank">File tersimpan</a>' : '';
    inner = '<div class="file-row">'+
      '<img class="prev" data-prev="'+esc(fd.k)+'"'+(val?' src="'+esc(val)+'" style="display:block"':'')+'>'+
      '<label class="file-btn">'+svg('upload')+'Pilih file'+
      '<input type="file" data-file="'+esc(fd.k)+'" accept="'+(fd.accept||'')+'" style="display:none"></label>'+
      '<span class="file-name" data-fn="'+esc(fd.k)+'">'+has+'</span></div>';
  } else if(fd.t==='datalist'){
    inner = '<input data-k="'+esc(fd.k)+'" list="'+id+'_dl" autocomplete="off"'+ro+' value="'+esc(val)+'">'+
      '<datalist id="'+id+'_dl" data-dl="'+esc(fd.list)+'"></datalist>';
  } else if(fd.t==='ordersearch'){
    const o=(state.cache.order||[]).find(x=>String(x['ID Order'])===String(val));
    const label = o ? orderSearchLabel(o) : (val||'');
    inner = '<div class="os-wrap" data-oswrap="'+esc(fd.k)+'">'+
        '<input type="hidden" data-k="'+esc(fd.k)+'" value="'+esc(val)+'">'+
        '<input type="text" class="os-input" data-os-input autocomplete="off" placeholder="Ketik nama customer…" value="'+esc(label)+'">'+
        '<div class="os-list" data-os-list></div>'+
      '</div>';
  } else if(fd.t==='dynselect'){
    const items=(state.cache[fd.list]||[]);
    const field=DYN_FIELD[fd.list]||'Nama';
    let opts=items.map(e=>e[field]).filter(Boolean);
    if(val && opts.indexOf(val)<0) opts=[val].concat(opts);
    inner = '<select data-k="'+esc(fd.k)+'"'+ro+'><option value=""></option>'+
      opts.map(o=>'<option'+(String(o)===String(val)?' selected':'')+'>'+esc(o)+'</option>').join('')+'</select>';
  } else if(fd.t==='multidyn'){
    const items=(state.cache[fd.list]||[]);
    const field=DYN_FIELD[fd.list]||'Nama';
    let opts=items.map(e=>e[field]).filter(Boolean);
    const chosen=String(val||'').split(',').map(s=>s.trim()).filter(Boolean);
    chosen.forEach(c=>{ if(opts.indexOf(c)<0) opts.push(c); });
    const chips=opts.map(o=>'<button type="button" class="chip'+(chosen.indexOf(o)>-1?' on':'')+'" data-chip="'+esc(o)+'">'+esc(o)+'</button>').join('')
      || '<span class="bs-sub">Belum ada cleaner di cabang ini.</span>';
    inner = '<input type="hidden" data-k="'+esc(fd.k)+'" data-multi="1" value="'+esc(chosen.join(', '))+'">'+
      '<div class="chips" data-chips="'+esc(fd.k)+'">'+chips+'</div>';
  } else if(fd.t==='kselect'){
    inner = '<select data-k="'+esc(fd.k)+'" data-kselect="1"'+ro+'><option value=""></option></select>';
  } else if(fd.t==='money'){
    inner = '<input type="text" inputmode="numeric" data-k="'+esc(fd.k)+'" data-money="1"'+ro+' value="'+esc(fmtRp(val))+'">';
  } else {
    let type = fd.t==='num'?'number': fd.t==='date'?'date': fd.t==='month'?'month':'text';
    let ival = val;
    if(fd.t==='date') ival = parseAnyDate(val)||'';
    else if(fd.t==='month') ival = parseAnyMonth(val)||'';
    inner = '<input type="'+type+'" data-k="'+esc(fd.k)+'"'+ro+' value="'+esc(ival)+'">';
  }
  return '<div class="field'+full+comp+svc+hidden+'"><label>'+esc(fd.k)+(fd.req?' <span class="req">*</span>':'')+'</label>'+inner+'</div>';
}

/* prefetch datalist sources */
async function ensureLists(v){
  const needs = new Set();
  v.form && v.form.forEach(fd=>{ if(fd.list) needs.add(fd.list); });
  if(needs.has('karyawan') && !state.cache.karyawan){
    state.cache.karyawan = trimKeys((await api({action:'list', sheet:'KARYAWAN'})).data||[]);
  }
  if(needs.has('cleaner') && !state.cache.cleaner){
    const cab = state.session.cabang || (state.editing && state.editing['Cabang']) || '';
    const r = await api({action:'list', sheet:'KARYAWAN', filters: cab?{'Cabang':cab}:{}});
    state.cache.cleaner = trimKeys(r.data||[]).filter(e=>String(e['Jabatan']).trim().toLowerCase()==='cleaner');
  }
  if(needs.has('order') && !state.cache.order){
    const r = await api({action:'list', sheet:'ORDER', filters:{'Cabang':state.session.cabang}});
    state.cache.order = trimKeys(r.data||[]);
  }
  if(needs.has('layanan') && !state.cache.layanan){
    state.cache.layanan = trimKeys((await api({action:'list', sheet:'LAYANAN'})).data||[]);
  }
}
function fillDatalists(){
  document.querySelectorAll('[data-dl]').forEach(dl=>{
    const src=dl.dataset.dl; let items=[];
    if(src==='karyawan') items=(state.cache.karyawan||[]).map(e=>({v:e['ID Karyawan'], t:e['Nama Lengkap']}));
    if(src==='cleaner') items=(state.cache.cleaner||[]).map(e=>({v:e['Nama Lengkap'], t:e['Jabatan']}));
    if(src==='order') items=(state.cache.order||[]).map(o=>({v:o['ID Order'], t:(o['Nama Customer']||'-')+' · '+tglPanjangId(o['Tanggal Pengerjaan'])}));
    dl.innerHTML = items.map(i=>'<option value="'+esc(i.v)+'">'+esc(i.t||'')+'</option>').join('');
  });
}
/* ---------- pencarian No Order (Input Bonus): ketik-cari berdasarkan nama customer,
   pilihan dibatasi sesuai filter Bulan/Tanggal/Kemarin-HariIni-Besok yang sedang aktif ---------- */
function orderSearchLabel(o){
  return o ? ((o['Nama Customer']||'-')+' · '+tglPanjangId(o['Tanggal Pengerjaan'])+' · '+o['ID Order']) : '';
}
function orderSearchCandidates(){
  let arr=(state.cache.order||[]).slice();
  if(state.dateStart||state.dateEnd){
    arr=arr.filter(o=>{
      const d=String(o['Tanggal Pengerjaan']||''); if(!d) return false;
      if(state.dateStart && d<state.dateStart) return false;
      if(state.dateEnd && d>state.dateEnd) return false;
      return true;
    });
  }
  return arr;
}
function wireOrderSearch(){
  document.querySelectorAll('[data-oswrap]').forEach(wrap=>{
    const key=wrap.dataset.oswrap;
    const hid=wrap.querySelector('[data-k="'+CSS.escape(key)+'"]');
    const inp=wrap.querySelector('[data-os-input]');
    const list=wrap.querySelector('[data-os-list]');
    if(!hid||!inp||!list) return;
    function renderList(q){
      const qq=norm(q||'');
      let arr=orderSearchCandidates();
      const curId=hid.value;
      if(curId && !arr.some(o=>String(o['ID Order'])===String(curId))){
        const cur=(state.cache.order||[]).find(o=>String(o['ID Order'])===String(curId));
        if(cur) arr=[cur].concat(arr);
      }
      if(qq) arr=arr.filter(o=>norm(o['Nama Customer']||'').includes(qq) || norm(o['ID Order']||'').includes(qq));
      arr=arr.slice(0,50);
      list.innerHTML = arr.length ? arr.map(o=>
        '<div class="os-item" data-os-id="'+esc(o['ID Order'])+'"><b>'+esc(o['Nama Customer']||'-')+'</b>'+
        '<span>'+esc(tglPanjangId(o['Tanggal Pengerjaan']))+' · '+esc(o['ID Order'])+'</span></div>'
      ).join('') : '<div class="os-empty">Tidak ada order cocok'+((state.dateStart||state.dateEnd)?' pada filter tanggal aktif':'')+'</div>';
      list.querySelectorAll('[data-os-id]').forEach(it=>{
        it.addEventListener('mousedown', e=>{
          e.preventDefault();
          const oid=it.dataset.osId;
          const o=arr.find(x=>String(x['ID Order'])===oid);
          hid.value=oid; inp.value=orderSearchLabel(o);
          list.classList.remove('open');
          onPickOrder();
        });
      });
    }
    inp.addEventListener('focus', ()=>{ inp.value=''; renderList(''); list.classList.add('open'); });
    inp.addEventListener('input', ()=>{ renderList(inp.value); });
    inp.addEventListener('blur', ()=>{
      setTimeout(()=>{
        list.classList.remove('open');
        const o=(state.cache.order||[]).find(x=>String(x['ID Order'])===String(hid.value));
        inp.value = o ? orderSearchLabel(o) : (hid.value||'');
      },150);
    });
  });
}

/* wire inputs: computed, file uploads, special lookups */
function wireFields(v){
  fillDatalists();
  wireOrderSearch();
  // chips multi-pilih (Nama Cleaner)
  document.querySelectorAll('.chips').forEach(box=>{
    const hid=box.parentElement.querySelector('[data-multi]');
    box.querySelectorAll('[data-chip]').forEach(ch=>ch.addEventListener('click',()=>{
      ch.classList.toggle('on');
      const sel=[...box.querySelectorAll('.chip.on')].map(x=>x.dataset.chip);
      if(hid) hid.value=sel.join(', ');
    }));
  });
  // klik pratinjau gambar -> popup
  document.querySelectorAll('[data-prev]').forEach(im=>{
    im.style.cursor='zoom-in';
    im.addEventListener('click', ()=>{ if(im.getAttribute('src')) openImg(im.getAttribute('src')); });
  });
  // file inputs
  document.querySelectorAll('[data-file]').forEach(inp=>{
    inp.addEventListener('change', async e=>{
      const file=e.target.files[0]; if(!file) return;
      const key=inp.dataset.file;
      const fn=document.querySelector('[data-fn="'+CSS.escape(key)+'"]');
      fn.textContent='Mengunggah…';
      try{
        const up0 = await prepUpload(file);
        const r = await api({action:'uploadFile', base64:up0.base64, mime:up0.mime, name:up0.name});
        state.files[key]=r.url;
        fn.innerHTML='<a class="file-name" href="'+esc(r.url)+'" target="_blank">Tersimpan ✓</a>';
        const prev=document.querySelector('[data-prev="'+CSS.escape(key)+'"]');
        if(prev && /image/.test(up0.mime)){ prev.src=r.url; prev.style.display='block'; }
        // auto status order
        if(v.special==='order'){
          if(key==='Bukti Transfer'){ setVal('Status Order','done'); showInvoiceBtn(); state.files['Waktu Bukti Transfer']=nowStr_(); }
          if(key==='Bukti Cancel') setVal('Status Order','cancel');
        }
      }catch(err){ fn.textContent='Gagal'; toast(err.message,'err'); }
    });
  });
  // recompute triggers
  if(v.special==='order'){
    ['Qty 1','Harga 1','Qty 2','Harga 2','Qty 3','Harga 3','Diskon (%)','PPn'].forEach(k=>{
      const el=getEl(k); if(el){ el.addEventListener('input', recomputeOrder); el.addEventListener('change', recomputeOrder); }
    });
  }
  if(v.special==='gaji'){
    GAJI_BONUS_FIELDS.concat(GAJI_POTONGAN_FIELDS, GAJI_TUNJANGAN_FIELDS, ['Gaji Pokok']).forEach(k=>{
      const el=getEl(k); if(el){ el.addEventListener('input', recomputeGaji); el.addEventListener('change', recomputeGaji); }
    });
    const idk=getEl('ID Karyawan'); if(idk) idk.addEventListener('change', onPickKaryawan);
    const per=getEl('Periode Bulan'); if(per) per.addEventListener('change', onPickPeriode);
    const cab=getEl('Cabang'); if(cab) cab.addEventListener('change', populateKselect);
  }
  if(v.special==='bonus'){
    const no=getEl('No Order'); if(no) no.addEventListener('change', onPickOrder);
  }
  // format uang langsung (Rp + ribuan) untuk semua input uang
  document.querySelectorAll('[data-money]').forEach(el=>{
    if(el.readOnly) return;
    el.addEventListener('input', ()=>{ el.value=fmtRp(el.value); });
  });
}

/* ---------- field helpers ---------- */
function getEl(k){ return document.querySelector('[data-k="'+CSS.escape(k)+'"]'); }
function getVal(k){ const e=getEl(k); if(!e) return '';
  if(e.type==='checkbox') return e.checked ? (e.dataset.check||'11') : '0';
  return e.value;
}
function numVal(k){ const e=getEl(k);
  if(e && e.dataset && e.dataset.money) return Number(moneyDigits(e.value))||0;
  return Number(String(getVal(k)).replace(/[^0-9.\-]/g,''))||0;
}
function setVal(k,v){ const e=getEl(k); if(!e) return;
  if(e.type==='checkbox'){ e.checked = Number(String(v).replace(/[^0-9-]/g,''))>0; return; }
  if(e.dataset && e.dataset.money){ e.value = fmtRp(v); return; }
  if(e.type==='date'){ e.value = parseAnyDate(v)||''; return; }
  if(e.type==='month'){ e.value = parseAnyMonth(v)||''; return; }
  e.value=(v==null?'':v);
}
function revealSvc(n){ document.querySelectorAll('.svc-'+n).forEach(el=>el.classList.remove('hide')); }
function wireSvcRows(){
  const btn=document.getElementById('addSvcBtn'); if(!btn) return;
  [2,3].forEach(n=>{ if(getVal('Layanan '+n) || numVal('Harga '+n)) revealSvc(n); });
  btn.addEventListener('click', ()=>{
    if(document.querySelector('.svc-2.hide')) revealSvc(2);
    else if(document.querySelector('.svc-3.hide')) revealSvc(3);
    if(!document.querySelector('.svc-row.hide')) btn.style.display='none';
  });
  if(!document.querySelector('.svc-row.hide')) btn.style.display='none';
}

/* kumpulkan nilai form order saat ini (untuk invoice) */
function collectOrderForm(){
  const v=state.view;
  const data = state.editing ? Object.assign({}, state.editing) : {};
  (v.form||[]).forEach(fd=>{
    if(fd.sec || fd.btn) return;
    if(fd.t==='file'){ if(state.files[fd.k]) data[fd.k]=state.files[fd.k]; }
    else if(fd.t==='money' || fd.t==='check'){ data[fd.k]=numVal(fd.k); }
    else data[fd.k]=getVal(fd.k);
  });
  data['Cabang'] = v.branchLock ? state.session.cabang : (data['Cabang']||state.session.cabang||'');
  return data;
}
/* tampilkan tombol unduh invoice di dalam form setelah bukti TF terunggah */
function showInvoiceBtn(){
  const fnEl=document.querySelector('[data-fn="Bukti Transfer"]');
  if(!fnEl || fnEl.querySelector('.inv-btn')) return;
  const b=document.createElement('button');
  b.type='button'; b.className='btn btn-gold btn-sm inv-btn'; b.style.marginLeft='8px';
  b.innerHTML=svg('file')+'Invoice PDF';
  b.addEventListener('click', ()=>downloadInvoice(collectOrderForm()));
  fnEl.appendChild(b);
}

/* ---------- special recompute ---------- */
function recomputeOrder(){
  const total = numVal('Harga 1') + numVal('Harga 2') + numVal('Harga 3');
  const disc = numVal('Diskon (%)'), ppn = numVal('PPn');
  const afterDisc = total*(1-disc/100);
  const final = Math.round(afterDisc*(1+ppn/100));
  setVal('Total Akhir', total);
  setVal('Total Akhir Setelah Diskon', final);
  setVal('Total Tagihan', final);
}
function recomputeGaji(){

function fmtTgl(s){
  s=String(s||''); const m=s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  return m ? (m[3]+'/'+m[2]+'/'+m[1]) : (s||'-');
}
/* Terbilang Rupiah (Bahasa Indonesia). 300000 -> "Tiga Ratus Ribu Rupiah" */
function terbilang(n){
  n=Math.floor(Math.abs(Number(moneyDigits(n))||0));
  if(n===0) return 'Nol Rupiah';
  const sat=['','Satu','Dua','Tiga','Empat','Lima','Enam','Tujuh','Delapan','Sembilan','Sepuluh','Sebelas'];
  function w(x){
    x=Math.floor(x);
    if(x<12) return sat[x];
    if(x<20) return w(x-10)+' Belas';
    if(x<100) return w(Math.floor(x/10))+' Puluh'+(x%10?' '+sat[x%10]:'');
    if(x<200) return 'Seratus'+(x-100?' '+w(x-100):'');
    if(x<1000) return sat[Math.floor(x/100)]+' Ratus'+(x%100?' '+w(x%100):'');
    if(x<2000) return 'Seribu'+(x-1000?' '+w(x-1000):'');
    if(x<1000000) return w(Math.floor(x/1000))+' Ribu'+(x%1000?' '+w(x%1000):'');
    if(x<1000000000) return w(Math.floor(x/1000000))+' Juta'+(x%1000000?' '+w(x%1000000):'');
    if(x<1000000000000) return w(Math.floor(x/1000000000))+' Miliar'+(x%1000000000?' '+w(x%1000000000):'');
    return w(Math.floor(x/1000000000000))+' Triliun'+(x%1000000000000?' '+w(x%1000000000000):'');
  }
  return w(n).replace(/\s+/g,' ').trim()+' Rupiah';
}
function _terbilang(x){
  x=Math.floor(Math.abs(Number(x)||0));
  const sat=['','satu','dua','tiga','empat','lima','enam','tujuh','delapan','sembilan','sepuluh','sebelas'];
  function w(n){
    if(n<12) return sat[n];
    if(n<20) return w(n-10)+' belas';
    if(n<100) return w(Math.floor(n/10))+' puluh'+(n%10?' '+w(n%10):'');
    if(n<200) return 'seratus'+(n%100?' '+w(n%100):'');
    if(n<1000) return w(Math.floor(n/100))+' ratus'+(n%100?' '+w(n%100):'');
    if(n<2000) return 'seribu'+(n%1000?' '+w(n%1000):'');
    if(n<1000000) return w(Math.floor(n/1000))+' ribu'+(n%1000?' '+w(n%1000):'');
    if(n<1000000000) return w(Math.floor(n/1000000))+' juta'+(n%1000000?' '+w(n%1000000):'');
    if(n<1000000000000) return w(Math.floor(n/1000000000))+' miliar'+(n%1000000000?' '+w(n%1000000000):'');
    return w(Math.floor(n/1000000000000))+' triliun'+(n%1000000000000?' '+w(n%1000000000000):'');
  }
  if(x===0) return 'nol';
  return w(x).replace(/\s+/g,' ').trim();
}

/* Render invoice ke canvas SEKALI — dipakai untuk unduh & cetak agar hasilnya identik. */
async function invoiceToCanvas(o){
  const canRender = (typeof html2pdf!=='undefined') || (typeof window.html2canvas!=='undefined');
  if(!canRender) return null;
  const html=buildInvoiceHTML(o);
  const holder=document.createElement('div');
  // ABSOLUTE (bukan fixed) di pojok kiri-atas DOKUMEN. Fixed membuat html2canvas menggeser
  // hasil capture sebesar posisi scroll daftar → invoice makin ke bawah / kosong. Absolute menghindarinya.
  holder.style.cssText='position:absolute;left:0;top:0;width:760px;background:#fff;z-index:-1;opacity:1';
  holder.innerHTML=html;
  document.body.appendChild(holder);
  const el=holder.firstElementChild;
  const prevX=window.pageXOffset||0, prevY=window.pageYOffset||0;
  try{
    window.scrollTo(0,0); // mulai dari atas agar capture tidak ikut tergeser
    if(document.fonts && document.fonts.ready){ try{ await Promise.race([document.fonts.ready, new Promise(r=>setTimeout(r,1200))]); }catch(e){} }
    await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));
    // Lebar TETAP = lebar kartu (760). Jangan pakai scrollWidth: watermark besar yang di-clip
    // oleh overflow:hidden membuat scrollWidth membengkak → sisi kanan (nominal & tanda tangan) terpotong.
    const capW=el.offsetWidth||760;
    const capH=Math.max(el.scrollHeight, el.offsetHeight);
    const opt={ scale:2, useCORS:true, backgroundColor:'#ffffff', logging:false,
      width:capW, height:capH, windowWidth:capW, windowHeight:capH,
      scrollX:0, scrollY:0, x:0, y:0 };
    let canvas;
    if(typeof window.html2canvas!=='undefined'){ canvas=await window.html2canvas(el, opt); }
    else { canvas=await html2pdf().set({html2canvas:opt}).from(el).toCanvas().get('canvas'); }
    return canvas;
  }catch(e){ return null; }
  finally{ holder.remove(); window.scrollTo(prevX, prevY); }
}

async function downloadInvoice(o){
  if(!o){ toast('Data order tidak ditemukan','err'); return; }
  if(!state.cache.kantor){ try{ await loadKantor(); }catch(e){} }
  const fname='Invoice-'+String(o['ID Order']||'KLINKLIN').replace(/[^A-Za-z0-9]+/g,'_')+'.pdf';
  setSync(true,'Membuat invoice…');
  try{
    const canvas=await invoiceToCanvas(o);
    if(!canvas || !canvas.width || !canvas.height){ setSync(false); invoicePrintWindow(o); return; }
    let JsPDF=(window.jspdf && window.jspdf.jsPDF) || window.jsPDF || null;
    if(!JsPDF){ setSync(false); printInvoiceImage(o, canvas); return; } // cetak pakai gambar yg sama (identik & muat 1 halaman)
    const pdf=new JsPDF({ unit:'mm', format:'a4', orientation:'portrait' });
    const pageW=pdf.internal.pageSize.getWidth(), pageH=pdf.internal.pageSize.getHeight();
    const margin=10, availW=pageW-margin*2, availH=pageH-margin*2;
    const ratio=Math.min(availW/canvas.width, availH/canvas.height);   // FIT: tidak akan terpotong (lebar & tinggi)
    const imgW=canvas.width*ratio, imgH=canvas.height*ratio;
    const x=(pageW-imgW)/2, y=margin;                                  // di tengah horizontal, margin atas sama
    pdf.addImage(canvas.toDataURL('image/jpeg',0.96),'JPEG', x, y, imgW, imgH);
    pdf.save(fname);
    toast('Invoice diunduh','ok');
  }catch(e){ invoicePrintWindow(o); }
  finally{ setSync(false); }
}

/* ID Insentif unik (tabel BONUS tidak punya default/sequence di DB). Format: INS-YYYYMMDD-HHMMSS-XXX */
function genInsentifId(){
  const d=new Date(), p=n=>String(n).padStart(2,'0');
  const rnd=Math.random().toString(36).slice(2,5).toUpperCase();
  return 'INS-'+d.getFullYear()+p(d.getMonth()+1)+p(d.getDate())+'-'+p(d.getHours())+p(d.getMinutes())+p(d.getSeconds())+'-'+rnd;
}
function genId(prefix){
  const d=new Date(), p=n=>String(n).padStart(2,'0');
  const rnd=Math.random().toString(36).slice(2,5).toUpperCase();
  return prefix+'-'+d.getFullYear()+p(d.getMonth()+1)+p(d.getDate())+'-'+p(d.getHours())+p(d.getMinutes())+p(d.getSeconds())+'-'+rnd;
}
async function saveForm(){
  const v=state.view;
  const data = state.editing ? Object.assign({}, state.editing) : {};
  // collect field values
  v.form.forEach(fd=>{
    if(fd.sec || fd.btn) return;
    if(fd.t==='file'){
      if(state.files[fd.k]) data[fd.k]=state.files[fd.k];
    }else if(fd.t==='money' || fd.t==='check'){
      data[fd.k]=numVal(fd.k);
    }else{
      data[fd.k]=getVal(fd.k);
    }
  });
  // enforce branch & cs
  if(v.sheet==='ORDER' && v.branchLock){ data['Cabang']=state.session.cabang; }
  if(v.sheet==='BONUS' && !data['Tanggal Input']) data['Tanggal Input']=new Date().toISOString().slice(0,10);
  // BONUS: ID Insentif tidak di-generate otomatis oleh database (NOT NULL) → buat di sisi klien.
  if(v.sheet==='BONUS' && !state.editing && !String(data['ID Insentif']||'').trim()){
    data['ID Insentif']=genInsentifId();
  }
  // GAJI: ID Slip juga NOT NULL tanpa default → buat di sisi klien.
  if(v.sheet==='GAJI' && !state.editing && !String(data['ID Slip']||'').trim()){
    data['ID Slip']=genId('SLIP');
  }
  // CHAT_HARIAN: ID Laporan dibuat di sisi klien.
  if(v.sheet==='CHAT_HARIAN' && !state.editing && !String(data['ID Laporan']||'').trim()){
    data['ID Laporan']=genId('CH');
  }
  // KARYAWAN: ID Karyawan NOT NULL tanpa default → buat di sisi klien.
  if(v.sheet==='KARYAWAN' && !state.editing && !String(data['ID Karyawan']||'').trim()){
    data['ID Karyawan']=genId('KRY');
  }
  // Pastikan bonus selalu membawa Cleaner/Customer/Tanggal dari order (agar tampil & terhitung).
  if(v.sheet==='BONUS' && data['No Order']){
    const o=(state.cache.order||[]).find(x=>String(x['ID Order'])===String(data['No Order']));
    if(o){
      if(!String(data['Nama Cleaner']||'').trim()) data['Nama Cleaner']=o['Nama Cleaner']||'';
      if(!String(data['Nama Customer']||'').trim()) data['Nama Customer']=o['Nama Customer']||'';
      if(!String(data['Tanggal Pengerjaan']||'').trim()) data['Tanggal Pengerjaan']=o['Tanggal Pengerjaan']||'';
    }
  }

  // validation
  const miss=[];
  v.form.forEach(fd=>{ if(fd.req && !String(data[fd.k]||'').trim()) miss.push(fd.k); });
  if(miss.length){ toast('Wajib diisi: '+miss.join(', '),'err'); return; }

  setSync(true);
  try{
    if(v.keyFields){
      await api({action:'upsert', sheet:(v.saveSheet||v.sheet), keyFields:v.keyFields, data});
      toast('Tersimpan','ok');
    }else if(state.editing){
      await api({action:'update', sheet:v.sheet, idField:v.idField, id:state.editing[v.idField], data});
      // Catat waktu upload bukti transfer bila baru diunggah lewat form (best-effort).
      if(v.sheet==='ORDER' && state.files['Waktu Bukti Transfer']){
        try{ await api({action:'update', sheet:'ORDER', id:state.editing[v.idField], data:{'Waktu Bukti Transfer':state.files['Waktu Bukti Transfer']}}); }catch(e){}
      }
      toast('Perubahan tersimpan','ok');
    }else{
      await api({action:'create', sheet:v.sheet, data});
      toast('Data ditambahkan','ok');
      if(v.keepOpen && !state.editing){
        // Simpan & lanjut: biarkan pop up terbuka, kosongkan field bonus untuk input berikutnya
        ['Jenis','Nominal','Nama Cleaner'].forEach(k=>{ const el=getEl(k); if(el){ el.value=''; } });
        state.cache[ {ORDER:'order', KARYAWAN:'karyawan'}[v.sheet] ] = undefined;
        invalidateLists(); loadList(true); setSync(false);
        const jn=getEl('Jenis'); if(jn) jn.focus();
        return;
      }
    }
    closeOverlay();
    state.cache[ {ORDER:'order', KARYAWAN:'karyawan'}[v.sheet] ] = undefined; // refresh caches
    if(v.sheet==='KARYAWAN'){ state.cache.cleaner=undefined; state.cache.karyawanMap=undefined; }
    invalidateLists();
    await loadList(true);
  }catch(err){ setSync(false); toast(err.message,'err'); }
}

function fileToB64(file){
  return new Promise((res,rej)=>{ const r=new FileReader();
    r.onload=()=>res(String(r.result).split(',')[1]); r.onerror=rej; r.readAsDataURL(file); });
}
/* Kompres gambar sebelum upload: resize maks 1400px + JPEG kualitas 0.62 (tetap terbaca). */
function prepUpload(file){
  return new Promise(resolve=>{
    const fallback=()=>{ const r=new FileReader(); r.onload=()=>resolve({base64:String(r.result).split(',')[1], mime:file.type, name:file.name}); r.readAsDataURL(file); };
    if(!/^image\//.test(file.type) || /gif|svg/.test(file.type)) return fallback();
    const url=URL.createObjectURL(file); const img=new Image();
    img.onload=()=>{
      let w=img.naturalWidth, h=img.naturalHeight; const maxDim=1400;
      if(Math.max(w,h)>maxDim){ const s=maxDim/Math.max(w,h); w=Math.round(w*s); h=Math.round(h*s); }
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      const ctx=c.getContext('2d'); ctx.fillStyle='#fff'; ctx.fillRect(0,0,w,h); ctx.drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      try{ const d=c.toDataURL('image/jpeg',0.62);
        resolve({base64:d.split(',')[1], mime:'image/jpeg', name:(file.name||'foto').replace(/\.[^.]+$/,'')+'.jpg'}); }
      catch(e){ fallback(); }
    };
    img.onerror=()=>{ URL.revokeObjectURL(url); fallback(); };
    img.src=url;
  });
}

function fmtChatTime(iso){
  if(!iso) return '';
  const d=new Date(iso), now=new Date(); const p=n=>String(n).padStart(2,'0');
  if(d.toDateString()===now.toDateString()) return p(d.getHours())+':'+p(d.getMinutes());
  const y=new Date(now); y.setDate(now.getDate()-1);
  if(d.toDateString()===y.toDateString()) return 'Kmrn';
  return p(d.getDate())+'/'+p(d.getMonth()+1);
}

function chatIsForMe(m){
  const me=chatMe(), cab=chatMyCab();
  if(m.from_role===me && (me!=='CS' || String(m.from_cabang||'').toUpperCase()===cab)) return false; // dari saya sendiri
  if(m.to_role==='ALL') return true;
  if(m.to_role!==me) return false;
  if(me==='CS') return !m.to_cabang || String(m.to_cabang).toUpperCase()===cab;
  return true;
}
function chatParty(role,cab){ return role==='CS' ? ('CS:'+String(cab||'').toUpperCase()) : role; }
function chatThread(){
  const me=chatMe(), myCab=chatMyCab(), other=chatOther(), otherCab=chatOtherCab();
  if(!other) return [];
  const myP=chatParty(me,myCab), tP=chatParty(other,otherCab);
  return (state._chatAll||[]).filter(m=>{
    if(m.kind==='announce') return false;
    const sP=chatParty(m.from_role,m.from_cabang), rP=chatParty(m.to_role,m.to_cabang);
    return (sP===myP && rP===tP) || (sP===tP && rP===myP);
  });
}

function chatSaveSeen(m){ try{ localStorage.setItem(chatSeenKey(), JSON.stringify(m)); }catch(e){} }
function chatMarkSeen(otherKey){ if(!otherKey) return; const m=chatSeenMap(); m[otherKey]=new Date().toISOString(); chatSaveSeen(m); }
/* Bangun daftar percakapan (inbox) — siapa yang mengirim & pesan terakhir. */
function chatConversations(){
  const me=chatMe(), myCab=chatMyCab(); const myP=chatParty(me,myCab);
  const seen=chatSeenMap(); const map={};
  (state._chatAll||[]).forEach(m=>{
    if(m.kind==='announce') return;
    const sP=chatParty(m.from_role,m.from_cabang), rP=chatParty(m.to_role,m.to_cabang);
    let key,role,cab,incoming;
    if(sP===myP){ key=rP; role=m.to_role; cab=m.to_cabang||''; incoming=false; }
    else if(rP===myP){ key=sP; role=m.from_role; cab=m.from_cabang||''; incoming=true; }
    else return;
    if(!key||!role) return;
    if(!map[key]) map[key]={key, role, cab, last:'', lastTime:'', unread:0};
    const e=map[key]; const ct=m.created_at||'';
    if(ct>=e.lastTime){ e.lastTime=ct; e.last=(incoming?'':'Anda: ')+(m.message||''); }
    if(incoming && ct>(seen[key]||'1970-01-01')) e.unread++;
  });
  return Object.keys(map).map(k=>map[k]).sort((a,b)=>(b.lastTime||'').localeCompare(a.lastTime||''));
}

/* Tandai pesan masuk dari lawan bicara sebagai dibaca (read-receipt). */
async function chatMarkThreadRead(role, cab){
  const me=chatMe(), myCab=chatMyCab();
  const otherP=chatParty(role, cab), myP=chatParty(me, myCab);
  const ids=(state._chatAll||[]).filter(m=>{
    if(m.kind==='announce') return false;
    if(m.read===true) return false;
    const sP=chatParty(m.from_role,m.from_cabang), rP=chatParty(m.to_role,m.to_cabang);
    return sP===otherP && rP===myP;
  }).map(m=>m.id).filter(x=>x!=null);
  if(!ids.length) return;
  (state._chatAll||[]).forEach(m=>{ if(ids.indexOf(m.id)>-1) m.read=true; });
  try{ await window.sb.from('CHAT').update({read:true}).in('id', ids); }catch(e){}
}

/* Pengumuman */
function localISO(d){ d=d||new Date(); const p=n=>String(n).padStart(2,'0');
  return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+'T'+p(d.getHours())+':'+p(d.getMinutes()); }
function annActive(m){
  if(!m || m.kind!=='announce') return true;
  const now=localISO();
  if(m.start_at && now < String(m.start_at).slice(0,16)) return false;
  if(m.end_at && now > String(m.end_at).slice(0,16)) return false;
  return true;
}
function annLinkFix(u){ u=String(u||'').trim(); if(!u) return ''; return /^https?:\/\//i.test(u)?u:('https://'+u); }

      if(!chatIsForMe(m)) return;
      const panelOpen=$('#chatPanel') && $('#chatPanel').classList.contains('open');
      if(m.kind==='announce'){
        // Pengumuman → pop up ke jabatan tujuan seketika (bila tidak ada popup lain terbuka)

      else { chatUpdateBadge(); toast('Pesan baru dari '+m.from_role+(m.from_role==='CS'&&m.from_cabang?(' '+m.from_cabang):''),'ok'); }
    })
    .on('postgres_changes', {event:'UPDATE', schema:'public', table:'CHAT'}, payload=>{
      const u=payload.new; if(!u||u.id==null) return;
      const arr=state._chatAll||[]; const idx=arr.findIndex(x=>x.id===u.id);
      if(idx>-1) arr[idx]=u; else return;
      // bila sedang membuka thread, perbarui tanda mata (read-receipt)
      const panelOpen=$('#chatPanel') && $('#chatPanel').classList.contains('open');
      if(panelOpen && state._chatActive){
        const body=$('#chatBody'); const sc=body?body.scrollTop:0;
        const me=chatMe(); const thread=chatThread();
        if(body){ body.innerHTML=thread.map(x=>chatBubble(x,me)).join(''); body.scrollTop=sc; }
      }
    }).subscribe();
}

/* ---------- Contoh Form (CSV) ---------- */
function csvEsc(v){ v=String(v==null?'':v); return /[",\n\r]/.test(v)? '"'+v.replace(/"/g,'""')+'"' : v; }
function csvFields(form){ return (form||[]).filter(fd=>fd && fd.k && !fd.sec && !fd.btn && fd.t!=='file' && !fd.computed); }
function csvExample(fd){
  const k=fd.k||'';
  if(fd.opts && fd.opts.length) return String(fd.opts[0]);
  if(fd.t==='money') return '100000';
  if(fd.t==='num') return '10';
  if(fd.t==='date') return ymd(new Date());
  if(fd.t==='month') return ymd(new Date()).slice(0,7);
  if(fd.t==='check') return '0';
  if(/no ?wa|whatsapp/i.test(k)) return '6281234567890';
  if(/alamat/i.test(k)) return 'Jl. Contoh No. 1';
  if(/tanggal/i.test(k)) return ymd(new Date());
  if(/periode/i.test(k)) return ymd(new Date()).slice(0,7);
  if(/nama cleaner/i.test(k)) return 'Andi, Budi';
  if(/nama/i.test(k)) return 'Contoh Nama';
  if(/email/i.test(k)) return 'contoh@email.com';
  if(/^pin$/i.test(k)) return '1234';
  if(/qty/i.test(k)) return '1';
  return 'Contoh';
}
function buildFormCsv(form){
  const fields=csvFields(form);
  const header=fields.map(fd=>csvEsc(fd.k)).join(',');
  const row=fields.map(fd=>csvEsc(csvExample(fd))).join(',');
  return header+'\r\n'+row+'\r\n';
}
function downloadCsv(name, text){
  const blob=new Blob(['\ufeff'+text],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download=name; document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); }, 120);
}
function csvFormList(){
  const keys=['order','inputBonus','karyawan','layanan','gaji','gajiPokok','targetOmzet','kantor','kpiCS','spendAds','progres'];
  const list=keys.filter(k=>VIEWS[k]&&VIEWS[k].form)
    .map(k=>({title:VIEWS[k].title, sheet:VIEWS[k].saveSheet||VIEWS[k].sheet, form:VIEWS[k].form}));
  list.push({title:'Agenda', sheet:'AGENDA', form:[
    f('Jabatan','select',{opts:AGENDA_ROLES}), f('Tanggal','date'), f('Tipe','select',{opts:['Bulanan','Tahunan']}),
    f('Agenda','text'), f('Status','select',{opts:['Rencana','Berjalan','Selesai']}), f('Keterangan','text')]});
  return list;
}
function renderFormCsv(){
  const list=csvFormList();
  const rows=list.map((t,i)=>{
    const cols=csvFields(t.form).length;
    return '<div class="csv-row">'+
      '<span class="set-ic">'+svg('file')+'</span>'+

  $('#panel').innerHTML =

      'Cocok sebagai template pengisian / impor massal ke Supabase.</div>'+
    '<div class="csv-list">'+rows+'</div>'+
    '<button class="btn btn-ghost" id="csvAll" style="margin-top:14px">'+svg('file')+'Unduh Semua</button>';
  document.querySelectorAll('[data-csv]').forEach(b=>b.addEventListener('click',()=>{
    const t=list[+b.dataset.csv]; downloadCsv('Template-'+t.sheet+'.csv', buildFormCsv(t.form));
  }));
  const all=$('#csvAll'); if(all) all.addEventListener('click',()=>{
    list.forEach((t,i)=>setTimeout(()=>downloadCsv('Template-'+t.sheet+'.csv', buildFormCsv(t.form)), i*300));
  });

/* ============================================================
   ORKESTRASI POP-UP SAAT LOGIN
   Urutan: (1) info pertama (CS: follow/story · 5 jabatan: agenda)
           (2) pop-up PENGUMUMAN untuk jabatan tujuan
   ============================================================ */
async function runLoginPopups(){
  const role = state.session && state.session.role;
  initCsReminder();       // pasang ticker pengingat CS (popup awal masuk antrian)
  // Siapkan pengumuman yang belum dilihat (async)
  await annLoadPending();
  const queue=[];
  if(role==='CS') queue.push(cb=>showCsReminder(cb));
  if(AGENDA_ROLES.includes(role)) queue.push(cb=>agendaShowIfNeeded(cb));
  if(['CEO','FINANCE','MARKETING','DESIGNER','HRD'].indexOf(role)>=0) queue.push(cb=>todoShow(cb));
  queue.push(cb=>reminderShow(cb));   // pengingat custom dari MARKETING
  queue.push(cb=>{ annShowPopup(cb); });   // pengumuman selalu jadi antrian terakhir
  runPopupQueue(queue,0);
}
function runPopupQueue(queue,i){
  if(i>=queue.length) return;
  let advanced=false;
  const next=()=>{ if(advanced) return; advanced=true; runPopupQueue(queue,i+1); };
  try{ queue[i](next); }catch(e){ next(); }
}

  const ys=$('#agYearSel'); if(ys) ys.addEventListener('change',()=>{
    if(state.agMode==='tahun'){ state.agYear=ys.value; }
    else { const M=state.agMonth.split('-')[1]; state.agMonth=ys.value+'-'+M; }
    state._agSelDate=null; state._agAddOpen=false; renderAgenda();
  });
  const pv=$('#agPrev'), nx=$('#agNext');
  if(pv) pv.addEventListener('click',()=>agShift(-1));
  if(nx) nx.addEventListener('click',()=>agShift(1));

  });
}
function agShift(delta){
  if(state.agMode==='tahun'){ state.agYear=String(+state.agYear+delta); }
  else { state.agMonth=shiftMonth(state.agMonth,delta); }
  state._agSelDate=null; state._agAddOpen=false; renderAgenda();

  let cells='';
  for(let i=0;i<startDow;i++) cells+='<div class="ag-cell ag-empty"></div>';
  for(let d=1; d<=daysInMonth; d++){
    const ds=Y+'-'+String(M).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const items=agForDate(ds);
    const roles=[...new Set(items.map(a=>String(a['Jabatan']||'').toUpperCase()))];
    const labels=roles.slice(0,3).map(r=>'<span class="ag-role" style="background:'+(AG_COLOR[r]||'#888')+'">'+esc(agRoleShort(r))+'</span>').join('');
    const more=roles.length>3?'<span class="ag-role" style="background:#8A9A97">+'+(roles.length-3)+'</span>':'';
    cells+='<button class="ag-cell'+(ds===todayStr?' ag-today':'')+(items.length?' ag-has':'')+(ds===sel?' ag-sel':'')+'" data-agday="'+ds+'">'+
      '<span class="ag-num">'+d+'</span>'+
      (items.length?'<span class="ag-roles">'+labels+more+'</span>':'')+
    '</button>';
  }
  const legend=AGENDA_ROLES.map(r=>'<span class="ag-leg"><span class="ag-dot" style="background:'+AG_COLOR[r]+'"></span>'+r+'</span>').join('');
  return '<div class="ag-legend">'+legend+'</div>'+
    '<div class="ag-grid ag-head">'+HARI.map(h=>'<div class="ag-dow">'+h+'</div>').join('')+'</div>'+
    '<div class="ag-grid">'+cells+'</div>'+
    '<div class="ag-detail" id="agDetail">'+(sel?agDetailHTML(sel):'<div class="ag-hint">Klik salah satu tanggal untuk melihat rincian agenda hari itu. Anda hanya bisa mengubah agenda <b>'+esc(state.session.role)+'</b>.</div>')+'</div>';

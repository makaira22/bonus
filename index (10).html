<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Awas... Jangan Klik! 😈</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-1:#160a22;
    --bg-2:#2b0f2e;
    --ember:#ff6a3d;
    --ember-hot:#ffb84d;
    --devil:#d1223a;
    --devil-dark:#8c1226;
    --cream:#fff3e0;
    --muted:#c9b8d6;
  }

  *{box-sizing:border-box;}
  html,body{
    margin:0;
    height:100%;
    overflow-x:hidden;
  }
  body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:radial-gradient(ellipse at 50% 20%, var(--bg-2), var(--bg-1) 70%);
    font-family:'Nunito', sans-serif;
    color:var(--cream);
    position:relative;
    padding:24px;
  }

  /* ambient floating embers */
  .embers{
    position:fixed;
    inset:0;
    overflow:hidden;
    pointer-events:none;
    z-index:0;
  }
  .ember{
    position:absolute;
    bottom:-20px;
    width:6px;
    height:6px;
    border-radius:50%;
    background:radial-gradient(circle, var(--ember-hot), var(--ember) 60%, transparent 100%);
    opacity:0.8;
    animation:rise linear infinite;
    filter:blur(0.3px);
  }
  @keyframes rise{
    0%{transform:translateY(0) translateX(0) scale(1); opacity:0.9;}
    100%{transform:translateY(-110vh) translateX(var(--drift,20px)) scale(0.3); opacity:0;}
  }

  .stage{
    position:relative;
    z-index:1;
    width:100%;
    max-width:560px;
    text-align:center;
  }

  /* ---------- SCENE 1: teaser ---------- */
  #scene-teaser{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
    transition:opacity .35s ease, transform .35s ease;
  }

  .headline{
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size:clamp(28px, 6vw, 42px);
    line-height:1.15;
    color:var(--cream);
    text-shadow:0 0 24px rgba(255,106,61,0.35);
    margin:0;
  }
  .headline .accent{
    color:var(--ember-hot);
  }
  .sub{
    color:var(--muted);
    font-size:clamp(14px,2.4vw,17px);
    margin:0 0 6px;
    max-width:380px;
  }

  .arrow-wrap{
    width:150px;
    height:110px;
    margin-top:4px;
  }
  .arrow-wrap svg{
    width:100%;
    height:100%;
    overflow:visible;
  }
  .arrow-path{
    stroke:var(--ember-hot);
    stroke-width:5;
    fill:none;
    stroke-linecap:round;
    stroke-dasharray:6 10;
    animation:dash 1.1s linear infinite, wiggle 2.6s ease-in-out infinite;
    filter:drop-shadow(0 0 6px rgba(255,184,77,0.6));
  }
  @keyframes dash{
    to{ stroke-dashoffset:-160; }
  }
  @keyframes wiggle{
    0%,100%{ transform:translateY(0) rotate(0deg); }
    50%{ transform:translateY(4px) rotate(-3deg); }
  }

  .btn{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:clamp(18px,3.4vw,22px);
    letter-spacing:0.5px;
    color:#2a060f;
    background:linear-gradient(180deg, var(--ember-hot), var(--ember));
    border:none;
    border-radius:100px;
    padding:16px 40px;
    cursor:pointer;
    box-shadow:0 8px 0 var(--devil-dark), 0 14px 30px rgba(255,106,61,0.35);
    transition:transform .12s ease, box-shadow .12s ease;
    animation:pulse 1.8s ease-in-out infinite;
  }
  .btn:hover{ transform:translateY(-2px); }
  .btn:active{
    transform:translateY(6px);
    box-shadow:0 2px 0 var(--devil-dark), 0 6px 16px rgba(255,106,61,0.3);
  }
  @keyframes pulse{
    0%,100%{ box-shadow:0 8px 0 var(--devil-dark), 0 14px 30px rgba(255,106,61,0.35);}
    50%{ box-shadow:0 8px 0 var(--devil-dark), 0 14px 42px rgba(255,106,61,0.6);}
  }

  .hidden{
    opacity:0;
    transform:scale(.94);
    pointer-events:none;
    position:absolute;
    inset:0;
  }

  /* ---------- SCENE 2: reveal ---------- */
  #scene-reveal{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
    opacity:0;
    transform:scale(0.7);
  }
  #scene-reveal.show{
    animation:popIn .55s cubic-bezier(.2,1.4,.4,1) forwards;
  }
  @keyframes popIn{
    0%{ opacity:0; transform:scale(0.4) rotate(-6deg); }
    60%{ opacity:1; transform:scale(1.08) rotate(2deg); }
    100%{ opacity:1; transform:scale(1) rotate(0deg); }
  }

  .devil-card{
    width:220px;
    filter:drop-shadow(0 10px 26px rgba(209,34,58,0.55));
    animation:float 3s ease-in-out infinite;
  }
  @keyframes float{
    0%,100%{ transform:translateY(0) rotate(-1deg); }
    50%{ transform:translateY(-8px) rotate(1deg); }
  }

  .reveal-text{
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size:clamp(24px,5vw,34px);
    margin:0;
    color:var(--ember-hot);
    text-shadow:0 0 20px rgba(255,106,61,0.5);
  }
  .reveal-sub{
    color:var(--muted);
    font-size:15px;
    margin:0 0 10px;
  }

  .again-btn{
    font-family:'Nunito', sans-serif;
    font-weight:700;
    font-size:14px;
    color:var(--cream);
    background:rgba(255,255,255,0.08);
    border:1.5px solid rgba(255,255,255,0.25);
    border-radius:100px;
    padding:10px 22px;
    cursor:pointer;
    transition:background .2s ease, transform .12s ease;
  }
  .again-btn:hover{ background:rgba(255,255,255,0.16); transform:translateY(-1px); }

  footer{
    position:fixed;
    bottom:14px;
    left:0;
    right:0;
    text-align:center;
    font-size:12px;
    color:rgba(201,184,214,0.5);
    z-index:1;
  }

  @media (prefers-reduced-motion: reduce){
    .arrow-path, .btn, .devil-card, #scene-reveal.show, .ember{ animation:none !important; }
  }
</style>
</head>
<body>

<div class="embers" id="embers"></div>

<div class="stage">

  <!-- SCENE 1 -->
  <div id="scene-teaser">
    <p class="sub">Ada sesuatu yang menunggu di baliknya...</p>
    <h1 class="headline">Klik tombol <span class="accent">ini</span>!</h1>

    <div class="arrow-wrap">
      <svg viewBox="0 0 150 110">
        <path class="arrow-path" d="M20 15 C 10 55, 60 70, 100 68" />
        <path class="arrow-path" d="M84 55 L100 68 L112 50" stroke-dasharray="none" />
      </svg>
    </div>

    <button class="btn" id="revealBtn">KLIK AKU 👉</button>
  </div>

  <!-- SCENE 2 -->
  <div id="scene-reveal">
    <svg class="devil-card" viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="faceGrad" cx="35%" cy="30%" r="75%">
          <stop offset="0%" stop-color="#ff5169"/>
          <stop offset="100%" stop-color="#b81730"/>
        </radialGradient>
        <linearGradient id="hornGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#ffe0a3"/>
          <stop offset="100%" stop-color="#ffb84d"/>
        </linearGradient>
      </defs>

      <!-- tail -->
      <path d="M60 195 C 30 205, 25 180, 45 175" stroke="#b81730" stroke-width="8" fill="none" stroke-linecap="round"/>
      <path d="M44 172 L52 168 L50 180 Z" fill="#b81730"/>

      <!-- horns -->
      <path d="M62 55 C 50 25, 60 5, 78 18 C 70 30, 66 45, 68 58 Z" fill="url(#hornGrad)"/>
      <path d="M138 55 C 150 25, 140 5, 122 18 C 130 30, 134 45, 132 58 Z" fill="url(#hornGrad)"/>

      <!-- ears -->
      <ellipse cx="48" cy="95" rx="10" ry="16" fill="#b81730"/>
      <ellipse cx="152" cy="95" rx="10" ry="16" fill="#b81730"/>

      <!-- face -->
      <ellipse cx="100" cy="105" rx="62" ry="58" fill="url(#faceGrad)"/>

      <!-- eyebrows -->
      <path d="M62 82 Q78 68 96 80" stroke="#4a0713" stroke-width="6" fill="none" stroke-linecap="round"/>
      <path d="M138 82 Q122 68 104 80" stroke="#4a0713" stroke-width="6" fill="none" stroke-linecap="round"/>

      <!-- eyes -->
      <ellipse cx="78" cy="103" rx="14" ry="17" fill="#fff3e0"/>
      <ellipse cx="122" cy="103" rx="14" ry="17" fill="#fff3e0"/>
      <circle cx="81" cy="107" r="6.5" fill="#20040a"/>
      <circle cx="119" cy="107" r="6.5" fill="#20040a"/>
      <circle cx="83" cy="104" r="2" fill="#fff3e0"/>
      <circle cx="121" cy="104" r="2" fill="#fff3e0"/>

      <!-- grin -->
      <path d="M68 132 Q100 158 132 132 Q100 148 68 132 Z" fill="#4a0713"/>
      <path d="M74 133 Q100 150 126 133 Q100 142 74 133 Z" fill="#ff8a9b"/>
      <path d="M92 133 L98 145 L104 133 Z" fill="#fff3e0"/>

      <!-- goatee -->
      <path d="M90 156 Q100 172 110 156 Q100 164 90 156 Z" fill="#8c1226"/>

      <!-- blush -->
      <ellipse cx="60" cy="122" rx="9" ry="6" fill="#ff8a9b" opacity="0.55"/>
      <ellipse cx="140" cy="122" rx="9" ry="6" fill="#ff8a9b" opacity="0.55"/>
    </svg>

    <p class="reveal-text">Muncul deh! 👹</p>
    <p class="reveal-sub">Wkwkwk, kena prank iseng~</p>
    <button class="again-btn" id="againBtn">Ulangi lagi</button>
  </div>

</div>

<footer>dibuat cuma buat iseng-isengan 😄</footer>

<script>
  // ambient embers
  const emberHost = document.getElementById('embers');
  const EMBER_COUNT = 22;
  for(let i=0;i<EMBER_COUNT;i++){
    const e = document.createElement('div');
    e.className = 'ember';
    const left = Math.random()*100;
    const size = 3 + Math.random()*5;
    const dur = 5 + Math.random()*6;
    const delay = Math.random()*6;
    const drift = (Math.random()*60-30) + 'px';
    e.style.left = left + 'vw';
    e.style.width = size + 'px';
    e.style.height = size + 'px';
    e.style.animationDuration = dur + 's';
    e.style.animationDelay = delay + 's';
    e.style.setProperty('--drift', drift);
    emberHost.appendChild(e);
  }

  const teaser = document.getElementById('scene-teaser');
  const reveal = document.getElementById('scene-reveal');
  const revealBtn = document.getElementById('revealBtn');
  const againBtn = document.getElementById('againBtn');

  revealBtn.addEventListener('click', () => {
    teaser.classList.add('hidden');
    reveal.classList.add('show');
  });

  againBtn.addEventListener('click', () => {
    reveal.classList.remove('show');
    teaser.classList.remove('hidden');
  });
</script>

</body>
</html>

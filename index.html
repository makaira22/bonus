<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Sederhana - Semut Real & Stickman Lari</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, #a1c4fd, #c2e9fb, #e0c3fc, #8ec5fc);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }
        
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Latar Belakang Semut (Diperkecil) */
        .background-ant {
            position: absolute;
            width: 15px; 
            height: 15px;
            pointer-events: none;
            opacity: 0.85;
            filter: drop-shadow(1px 1px 1px rgba(0,0,0,0.4));
        }

        .quiz-container {
            position: relative; 
            overflow: hidden; 
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            /* Padding bawah diperlebar sedikit sebagai 'jalan' untuk stickman */
            padding: 40px 40px 65px 40px; 
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            text-align: center;
            max-width: 450px;
            width: 90%;
            z-index: 10;
        }
        
        .quiz-content {
            position: relative;
            z-index: 12;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 26px;
            font-weight: 600;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .quiz-btn {
            position: relative;
            z-index: 12;
            background-color: rgba(255, 255, 255, 0.8);
            color: #2c3e50;
            border: 1px solid rgba(255, 255, 255, 0.9);
            padding: 16px 24px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            text-align: left;
            padding-left: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .quiz-btn:hover {
            background-color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }
        .quiz-btn:active {
            transform: translateY(0);
        }
        
        /* Anak Lari (Stickman - Diperkecil & Posisi Bawah) */
        #kid-container {
            position: absolute;
            bottom: 12px; /* Diletakkan di bawah tombol */
            width: 30px; 
            height: 40px; 
            pointer-events: none;
            z-index: 11;
        }
        
        #kid-sprite {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            transform-origin: center;
        }

        /* Animasi Berlari Nyata */
        @keyframes runLeg {
            0% { transform: rotate(-45deg); }
            100% { transform: rotate(45deg); }
        }

        .back-leg, .front-leg { transform-origin: 25px 38px; }
        .back-arm, .front-arm { transform-origin: 25px 23px; }

        .back-leg { animation: runLeg 0.4s infinite alternate ease-in-out; }
        .front-leg { animation: runLeg 0.4s infinite alternate-reverse ease-in-out; }
        .back-arm { animation: runLeg 0.4s infinite alternate-reverse ease-in-out; }
        .front-arm { animation: runLeg 0.4s infinite alternate ease-in-out; }

        /* Popup Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .modal.show {
            display: flex;
            opacity: 1;
        }
        .modal-content {
            max-width: 85%;
            max-height: 80vh;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            transform: scale(0.8);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            object-fit: contain;
        }
        .modal.show .modal-content {
            transform: scale(1);
        }
        .close-btn {
            position: absolute;
            top: 25px;
            right: 35px;
            color: #ffffff;
            font-size: 45px;
            font-weight: 300;
            cursor: pointer;
            line-height: 1;
            transition: color 0.2s;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .close-btn:hover {
            color: #ff7675;
        }
    </style>
</head>
<body>

    <!-- Area untuk 3 Semut Latar Belakang -->
    <div id="ants-container"></div>

    <div class="quiz-container" id="main-box">
        <div class="quiz-content">
            <h1>10 + 6 berapa?</h1>
            <div class="btn-container">
                <button class="quiz-btn" onclick="tampilkanPopup('A')">a. 17</button>
                <button class="quiz-btn" onclick="tampilkanPopup('B')">b. 16</button>
            </div>
        </div>
        
        <!-- Area Stickman Lari di bagian bawah container -->
        <div id="kid-container">
            <div id="kid-sprite">
                <!-- SVG Stickman yang dianimasikan -->
                <svg viewBox="0 0 50 60" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
                    <circle cx="25" cy="12" r="7" stroke="#2c3e50" stroke-width="3" fill="transparent"/>
                    <line x1="25" y1="19" x2="25" y2="38" stroke="#2c3e50" stroke-width="3" stroke-linecap="round"/>
                    
                    <!-- Lengan Kiri (Belakang) -->
                    <line class="back-arm" x1="25" y1="23" x2="15" y2="35" stroke="#2c3e50" stroke-width="3" stroke-linecap="round"/>
                    <!-- Kaki Kiri (Belakang) -->
                    <line class="back-leg" x1="25" y1="38" x2="15" y2="55" stroke="#2c3e50" stroke-width="3" stroke-linecap="round"/>
                    
                    <!-- Kaki Kanan (Depan) -->
                    <line class="front-leg" x1="25" y1="38" x2="35" y2="55" stroke="#2c3e50" stroke-width="3" stroke-linecap="round"/>
                    <!-- Lengan Kanan (Depan) -->
                    <line class="front-arm" x1="25" y1="23" x2="35" y2="35" stroke="#2c3e50" stroke-width="3" stroke-linecap="round"/>
                </svg>
            </div>
        </div>
    </div>

    <!-- Elemen Audio -->
    <audio id="suara-klik" preload="auto">
        <source src="link_suara_github_anda_disini.mp3" type="audio/mpeg">
        Browser Anda tidak mendukung elemen audio.
    </audio>

    <!-- Popup Gambar Besar (Modal) -->
    <div id="popup-modal" class="modal" onclick="tutupPopup()">
        <span class="close-btn" onclick="tutupPopup()">&times;</span>
        <img class="modal-content" id="gambar-popup" src="" alt="Popup Tampilan">
    </div>

    <script>
        // --- Fungsi Semut Real Berkeliaran ---
        function initAnts() {
            const container = document.getElementById('ants-container');
            for (let i = 0; i < 3; i++) {
                const ant = document.createElement('div');
                ant.className = 'background-ant';
                
                // SVG Semut
                ant.innerHTML = `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <g stroke="#1a0f00" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M48,46 Q30,20 15,25" />
                        <path d="M52,46 Q50,15 45,10" />
                        <path d="M56,46 Q70,20 85,30" />
                        <path d="M48,54 Q30,80 15,75" />
                        <path d="M52,54 Q50,85 45,90" />
                        <path d="M56,54 Q70,80 85,70" />
                        <path d="M78,45 Q90,30 100,35" />
                        <path d="M78,55 Q90,70 100,65" />
                    </g>
                    <ellipse cx="25" cy="50" rx="18" ry="12" fill="#1a0f00"/> 
                    <ellipse cx="52" cy="50" rx="10" ry="8" fill="#1a0f00"/> 
                    <circle cx="75" cy="50" r="7" fill="#1a0f00"/> 
                </svg>`;
                
                container.appendChild(ant);
                moveElementRandomly(ant);
            }
        }

        function moveElementRandomly(el) {
            const maxSpeed = 1; 
            let x = Math.random() * (window.innerWidth - 20);
            let y = Math.random() * (window.innerHeight - 20);
            let angle = Math.random() * 360;
            let isMoving = true;

            function animate() {
                // Perilaku Semut Nyata: Kadang berhenti (pause) lalu jalan lagi
                if (Math.random() < 0.015) isMoving = !isMoving; 
                
                // Semut sering berbelok arah secara tiba-tiba
                if (Math.random() < 0.03) angle += (Math.random() - 0.5) * 120; 

                if (isMoving) {
                    angle += (Math.random() - 0.5) * 15; // Berbelok halus saat bergerak
                    x += Math.cos(angle * Math.PI / 180) * maxSpeed;
                    y += Math.sin(angle * Math.PI / 180) * maxSpeed;
                }

                if (x < 0) { x = 0; angle = 180 - angle; }
                if (x > window.innerWidth - 20) { x = window.innerWidth - 20; angle = 180 - angle; }
                if (y < 0) { y = 0; angle = -angle; }
                if (y > window.innerHeight - 20) { y = window.innerHeight - 20; angle = -angle; }

                el.style.left = `${x}px`;
                el.style.top = `${y}px`;
                el.style.transform = `rotate(${angle}deg)`; 

                requestAnimationFrame(animate);
            }
            animate();
        }

        // --- Fungsi Stickman Berlarian Ke Kanan Kiri (Nyata) ---
        function initKidAnimation() {
            const mainBox = document.getElementById('main-box');
            const kidContainer = document.getElementById('kid-container');
            
            let kidWidth = 30; // Sesuai dengan width di CSS
            let posX = Math.random() * (mainBox.clientWidth - kidWidth);
            
            let speedX = 1.2; // Kecepatan diperlambat
            let isMovingRight = Math.random() > 0.5;

            function animateKid() {
                const boxWidth = mainBox.clientWidth;

                if (isMovingRight) {
                    posX += speedX;
                    if (posX >= boxWidth - kidWidth - 10) { 
                        posX = boxWidth - kidWidth - 10;
                        isMovingRight = false;
                        flipKid(true); // Hadap Kiri
                    }
                } else {
                    posX -= speedX;
                    if (posX <= 10) {
                        posX = 10;
                        isMovingRight = true;
                        flipKid(false); // Hadap Kanan
                    }
                }

                kidContainer.style.left = `${posX}px`;
                requestAnimationFrame(animateKid);
            }

            function flipKid(isLeft) {
                const sprite = document.getElementById('kid-sprite');
                if (isLeft) {
                    sprite.style.transform = 'scaleX(-1)';
                } else {
                    sprite.style.transform = 'scaleX(1)';
                }
            }

            flipKid(!isMovingRight); // Sesuaikan hadap awal
            animateKid();
        }

        window.onload = function() {
            initAnts();
            initKidAnimation();
        };

        // --- Fungsi Kuis & Popup ---
        function tampilkanPopup(pilihan) {
            const audio = document.getElementById('suara-klik');
            audio.currentTime = 0; 
            audio.play().catch(error => {
                console.log("Audio diblokir browser:", error);
            });

            const gambar = document.getElementById('gambar-popup');
            
            if (pilihan === 'A') {
                gambar.src = "LINK_GAMBAR_UNTUK_JAWABAN_A"; 
            } else if (pilihan === 'B') {
                gambar.src = "LINK_GAMBAR_UNTUK_JAWABAN_B"; 
            }

            const modal = document.getElementById('popup-modal');
            modal.style.display = "flex";
            setTimeout(() => {
                modal.classList.add('show');
            }, 10);
        }

        function tutupPopup() {
            const modal = document.getElementById('popup-modal');
            modal.classList.remove('show');
            setTimeout(() => {
                modal.style.display = "none";
            }, 400); 
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0E3B3A" />
<title>KLINKLIN ERP</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="icon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" defer></script>
<style>
:root{
  --bg:#EEF2F1; --surface:#FFFFFF; --surface-2:#F7FAF9;
  --ink:#15211F; --muted:#5E6F6C; --faint:#8A9A97;
  --line:#E2E8E6; --line-2:#D2DBD9;
  --petrol:#0E3B3A; --petrol-2:#17524F; --petrol-3:#0a2b2a;
  --gold:#C2A567; --gold-deep:#A6863F; --gold-soft:#F0E7D2;
  --success:#1F7A5E; --warn:#B9842B; --danger:#B23A3A; --info:#2F6F8F;
  --radius:16px; --radius-sm:11px;
  --shadow:0 1px 2px rgba(15,40,38,.05), 0 8px 28px -14px rgba(15,40,38,.22);
  --shadow-lg:0 24px 60px -28px rgba(10,43,42,.5);
  --display:"Fraunces", Georgia, serif;
  --ui:"Plus Jakarta Sans", system-ui, -apple-system, sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:var(--ui); color:var(--ink); background:var(--bg);
  font-size:14.5px; line-height:1.5; -webkit-font-smoothing:antialiased;
  min-height:100vh; min-height:100dvh;
}
button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit}
input,select,textarea{font-family:inherit; font-size:14.5px; color:var(--ink)}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:#cfd9d7;border-radius:9px}
.hide{display:none !important}

/* ---------- LOGIN ---------- */
#login{
  position:fixed; inset:0; display:grid; place-items:center; padding:24px;
  background:
    radial-gradient(1200px 600px at 12% -10%, rgba(194,165,103,.18), transparent 55%),
    radial-gradient(900px 600px at 110% 110%, rgba(23,82,79,.55), transparent 50%),
    linear-gradient(160deg, var(--petrol-3), var(--petrol) 60%, #093332);
  overflow:auto;
}
.login-card{
  width:min(380px,100%); background:var(--surface); border-radius:24px;
  padding:34px 30px 30px; box-shadow:var(--shadow-lg);
  border:1px solid rgba(255,255,255,.5);
}
.brand{display:flex; align-items:center; gap:12px; justify-content:center; margin-bottom:6px}
.brand .mark{width:46px;height:46px;flex:none}
.brand .name{font-family:var(--display); font-weight:600; font-size:25px; letter-spacing:.4px}
.brand .name b{color:var(--gold-deep); font-weight:600}
.login-card .sub{text-align:center; color:var(--muted); font-size:13px; margin:2px 0 22px;
  letter-spacing:.18em; text-transform:uppercase; font-weight:600}
.pin-wrap{position:relative; margin-bottom:14px}
.pin-input{
  width:100%; text-align:center; letter-spacing:.32em; font-weight:700;
  padding:15px 44px 15px 16px; border:1.5px solid var(--line-2); border-radius:14px;
  background:var(--surface-2); outline:none; transition:.18s; font-size:17px;
}
.pin-input:focus{border-color:var(--petrol); background:#fff; box-shadow:0 0 0 4px rgba(14,59,58,.08)}
.pin-eye{position:absolute; right:8px; top:50%; transform:translateY(-50%); padding:8px; color:var(--faint)}
.keypad{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:6px 0 4px}
.key{
  padding:15px 0; border-radius:13px; font-weight:600; font-size:18px;
  background:var(--surface-2); border:1px solid var(--line); transition:.12s;
}
.key:active{transform:scale(.96); background:var(--gold-soft); border-color:var(--gold)}
.key.fn{font-size:13px; color:var(--muted); font-weight:600}
.btn-login{
  width:100%; margin-top:14px; padding:15px; border-radius:14px; font-weight:700; font-size:15px;
  background:linear-gradient(180deg,var(--petrol-2),var(--petrol)); color:#fff;
  letter-spacing:.02em; transition:.15s; box-shadow:0 10px 24px -12px rgba(14,59,58,.7);
}
.btn-login:active{transform:translateY(1px)}
.login-err{color:var(--danger); font-size:13px; text-align:center; min-height:18px; margin-top:10px; font-weight:600}
.login-foot{text-align:center; margin-top:18px; font-size:12px; color:var(--faint)}
.login-foot a{color:var(--gold-deep); text-decoration:none; font-weight:600; cursor:pointer}

/* ---------- APP SHELL ---------- */
#app{display:none; min-height:100vh; min-height:100dvh}
.topbar{
  position:sticky; top:0; z-index:30; display:flex; align-items:center; gap:14px;
  padding:12px 18px; background:var(--petrol);
  color:#fff; box-shadow:0 2px 18px -6px rgba(10,43,42,.6);
}
.topbar .mark{width:34px;height:34px;flex:none}
.topbar .tt{font-family:var(--display); font-weight:600; font-size:19px; letter-spacing:.3px}
.topbar .tt b{color:var(--gold)}
.role-chip{
  margin-left:auto; display:flex; align-items:center; gap:8px; font-size:12.5px; font-weight:600;
  background:rgba(255,255,255,.1); padding:7px 12px; border-radius:30px; letter-spacing:.04em;
}
.role-chip .dot{width:7px;height:7px;border-radius:50%;background:var(--gold)}
.icon-btn{width:38px;height:38px;display:grid;place-items:center;border-radius:11px;
  background:rgba(255,255,255,.1);transition:.15s}
.icon-btn:active{background:rgba(255,255,255,.22)}

.layout{display:flex; min-height:calc(100dvh - 58px)}
.sidebar{
  width:230px; flex:none; padding:20px 14px; background:var(--surface);
  border-right:1px solid var(--line); position:sticky; top:58px; height:calc(100dvh - 58px);
  overflow:auto;
}
.side-label{font-size:11px;font-weight:700;letter-spacing:.16em;color:var(--faint);
  text-transform:uppercase; padding:4px 12px 10px}
.nav-item{
  display:flex; align-items:center; gap:12px; padding:12px 14px; border-radius:12px;
  color:var(--muted); font-weight:600; transition:.13s; margin-bottom:4px; width:100%; text-align:left;
}
.nav-item svg{width:19px;height:19px;flex:none;opacity:.8}
.nav-item:hover{background:var(--surface-2); color:var(--ink)}
.nav-item.active{background:var(--petrol); color:#fff; box-shadow:0 8px 18px -10px rgba(14,59,58,.7)}
.nav-item.active svg{opacity:1}
.main{flex:1; padding:26px 30px 60px; overflow:auto; max-width:100%}
.bottom-nav{display:none}

/* ---------- PAGE HEAD ---------- */
.page-head{display:flex; align-items:flex-end; gap:16px; flex-wrap:wrap; margin-bottom:20px}
.page-title{font-family:var(--display); font-size:30px; font-weight:600; letter-spacing:.2px; line-height:1.1}
.page-sub{color:var(--muted); font-size:13px; margin-top:3px}
.hairline{height:1px;background:linear-gradient(90deg,var(--gold),transparent);width:60px;margin:9px 0 0;border-radius:2px}
.spacer{flex:1}
.btn{
  display:inline-flex; align-items:center; gap:8px; padding:11px 16px; border-radius:12px;
  font-weight:600; font-size:13.5px; transition:.14s; white-space:nowrap;
}
.btn svg{width:17px;height:17px}
.btn-primary{background:linear-gradient(180deg,var(--petrol-2),var(--petrol));color:#fff;
  box-shadow:0 10px 22px -12px rgba(14,59,58,.7)}
.btn-primary:active{transform:translateY(1px)}
.btn-ghost{background:var(--surface); border:1px solid var(--line-2); color:var(--ink)}
.btn-ghost:hover{border-color:var(--petrol)}
.btn-gold{background:linear-gradient(180deg,#d4b878,var(--gold-deep)); color:#3a2e10;
  box-shadow:0 10px 22px -12px rgba(166,134,63,.8)}
.btn-sm{padding:8px 12px; font-size:12.5px; border-radius:10px}

/* ---------- TOOLBAR / FILTERS ---------- */
.toolbar{display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:18px}
.search{position:relative; flex:1; min-width:210px}
.search svg{position:absolute; left:13px; top:50%; transform:translateY(-50%); width:17px; color:var(--faint)}
.search input{width:100%; padding:11px 13px 11px 38px; border:1px solid var(--line-2);
  border-radius:12px; background:var(--surface); outline:none; transition:.15s}
.search input:focus{border-color:var(--petrol); box-shadow:0 0 0 4px rgba(14,59,58,.07)}
.fl{display:flex; align-items:center; gap:6px}
.fl select,.fl input{padding:10px 12px; border:1px solid var(--line-2); border-radius:11px;
  background:var(--surface); outline:none; transition:.15s; max-width:170px}
.fl select:focus,.fl input:focus{border-color:var(--petrol)}
.fl .lbl{font-size:11px; font-weight:700; color:var(--faint); text-transform:uppercase; letter-spacing:.08em}

/* ---------- TABLE / CARDS ---------- */
.panel{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
  box-shadow:var(--shadow); overflow:hidden}
.tbl-wrap{overflow-x:auto}
table{width:100%; border-collapse:collapse; min-width:640px}
th{font-size:11px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--faint);
  text-align:left; padding:14px 16px; background:var(--surface-2); border-bottom:1px solid var(--line);
  white-space:nowrap; position:sticky; top:0}
td{padding:13px 16px; border-bottom:1px solid var(--line); vertical-align:middle; white-space:nowrap}
tr:last-child td{border-bottom:none}
tbody tr{transition:.1s}
tbody tr:hover{background:var(--surface-2)}
td.money{font-variant-numeric:tabular-nums; font-weight:600}
.thp{font-family:var(--display); font-weight:600; color:var(--petrol); font-size:15.5px; font-variant-numeric:tabular-nums}
.avatar{width:38px;height:38px;border-radius:50%;object-fit:cover;background:var(--gold-soft);
  border:2px solid var(--gold-soft); display:grid; place-items:center; font-weight:700; color:var(--gold-deep)}
.thumb{width:38px;height:38px;border-radius:9px;object-fit:cover;border:1px solid var(--line)}
.flink{color:var(--info); font-weight:600; text-decoration:none; font-size:12.5px}
.badge{display:inline-flex; align-items:center; gap:6px; padding:5px 11px; border-radius:30px;
  font-size:11.5px; font-weight:700; letter-spacing:.02em; text-transform:capitalize}
.badge .d{width:6px;height:6px;border-radius:50%}
.b-pending{background:#FBF1DD;color:var(--warn)} .b-pending .d{background:var(--warn)}
.b-done{background:#E2EEF4;color:var(--info)} .b-done .d{background:var(--info)}
.b-complete{background:#E1F1EA;color:var(--success)} .b-complete .d{background:var(--success)}
.b-cancel{background:#F6E3E3;color:var(--danger)} .b-cancel .d{background:var(--danger)}
.row-act{display:flex;gap:6px;justify-content:flex-end}
.act-ic{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;
  background:var(--surface-2);border:1px solid var(--line);transition:.13s}
.act-ic:hover{border-color:var(--petrol);color:var(--petrol)}
.act-ic svg{width:16px;height:16px}
.empty{padding:60px 24px; text-align:center; color:var(--muted)}
.empty svg{width:46px;height:46px;color:var(--line-2);margin-bottom:12px}
.empty b{display:block;color:var(--ink);font-size:16px;margin-bottom:4px;font-family:var(--display);font-weight:600}
.count{font-size:12.5px;color:var(--muted);margin:14px 2px 0;font-weight:600}

/* ---------- MODAL ---------- */
.overlay{position:fixed; inset:0; background:rgba(10,30,29,.5); backdrop-filter:blur(3px);
  z-index:60; display:none; align-items:flex-start; justify-content:center; padding:30px 16px; overflow:auto}
.overlay.open{display:flex}
.modal{width:min(720px,100%); background:var(--surface); border-radius:20px;
  box-shadow:var(--shadow-lg); overflow:hidden; animation:rise .22s ease}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.modal-head{display:flex;align-items:center;gap:12px;padding:20px 24px;
  border-bottom:1px solid var(--line); background:var(--surface-2)}
.modal-head h3{margin:0;font-family:var(--display);font-weight:600;font-size:21px}
.modal-head .x{margin-left:auto;width:36px;height:36px;border-radius:10px;display:grid;place-items:center}
.modal-head .x:hover{background:var(--line)}
.modal-body{padding:22px 24px; max-height:66vh; overflow:auto}
.form-grid{display:grid; grid-template-columns:1fr 1fr; gap:14px 16px}
.field{display:flex;flex-direction:column;gap:6px}
.field.full{grid-column:1 / -1}
.field label{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.02em}
.field label .req{color:var(--danger)}
.field input,.field select,.field textarea{
  padding:11px 12px; border:1px solid var(--line-2); border-radius:11px;
  background:var(--surface); outline:none; transition:.15s; width:100%;
}
.field input:focus,.field select:focus,.field textarea:focus{
  border-color:var(--petrol); box-shadow:0 0 0 4px rgba(14,59,58,.07)}
.field input[readonly],.field.computed input{background:var(--surface-2); color:var(--muted); font-weight:600}
.field.computed input{color:var(--petrol)}
.field textarea{resize:vertical;min-height:62px}
.file-row{display:flex;align-items:center;gap:10px}
.file-row .prev{width:42px;height:42px;border-radius:10px;object-fit:cover;border:1px solid var(--line);display:none}
.file-btn{display:inline-flex;align-items:center;gap:7px;padding:10px 13px;border:1px dashed var(--line-2);
  border-radius:11px;background:var(--surface-2);font-size:12.5px;font-weight:600;color:var(--muted)}
.file-btn:hover{border-color:var(--petrol);color:var(--petrol)}
.file-name{font-size:12px;color:var(--info);font-weight:600;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.modal-foot{display:flex;gap:10px;justify-content:flex-end;padding:18px 24px;border-top:1px solid var(--line);background:var(--surface-2)}
.sec-title{grid-column:1/-1;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:var(--gold-deep);margin:6px 0 -2px;display:flex;align-items:center;gap:10px}
.sec-title::after{content:"";flex:1;height:1px;background:var(--line)}

/* ---------- TOAST ---------- */
#toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(40px);
  background:var(--ink);color:#fff;padding:13px 20px;border-radius:13px;font-weight:600;font-size:13.5px;
  z-index:90;opacity:0;transition:.25s;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:9px}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.err{background:var(--danger)} #toast.ok{background:var(--success)}
.spin{width:34px;height:34px;border:3px solid rgba(255,255,255,.25);border-top-color:#fff;
  border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* ---------- SYNC CHIP (kecil, pojok) ---------- */
#sync{position:fixed;left:18px;bottom:18px;z-index:85;display:none;align-items:center;gap:9px;
  background:var(--petrol);color:#fff;padding:9px 14px;border-radius:30px;font-size:12.5px;font-weight:600;
  box-shadow:0 12px 30px -14px rgba(10,43,42,.7);border:1px solid rgba(255,255,255,.12);
  letter-spacing:.01em;max-width:80vw}
#sync.show{display:inline-flex;animation:rise .2s ease}
#sync .s{width:14px;height:14px;border:2.5px solid rgba(255,255,255,.3);border-top-color:var(--gold);
  border-radius:50%;animation:sp .7s linear infinite;flex:none}
#sync.done .s{display:none}
#sync.done{background:var(--success)}
@media (max-width:880px){ #sync{bottom:78px} }

/* ---------- IMAGE POPUP ---------- */
#imgPop{position:fixed;inset:0;z-index:95;display:none;align-items:center;justify-content:center;
  padding:24px;background:rgba(8,24,23,.82);backdrop-filter:blur(4px);cursor:zoom-out}
#imgPop.show{display:flex;animation:rise .18s ease}
#imgPop img{max-width:92vw;max-height:88vh;border-radius:14px;background:#fff;
  box-shadow:var(--shadow-lg);object-fit:contain}

/* ---------- SETTINGS ---------- */
.settings{max-width:560px}
.settings .note{background:var(--surface-2);border:1px solid var(--line);border-radius:12px;
  padding:14px 16px;color:var(--muted);font-size:13px;line-height:1.6;margin-top:14px}
.settings code{background:#e7eeec;padding:2px 6px;border-radius:6px;font-size:12px;color:var(--petrol)}

/* ---------- RESPONSIVE ---------- */
@media (max-width:880px){
  .sidebar{display:none}
  .main{padding:20px 16px 96px}
  .page-title{font-size:25px}
  table{min-width:560px}
  .bottom-nav{display:flex; position:fixed; bottom:0; left:0; right:0; z-index:40;
    background:var(--surface); border-top:1px solid var(--line); padding:8px 8px calc(8px + env(safe-area-inset-bottom));
    box-shadow:0 -8px 24px -16px rgba(10,43,42,.4)}
  .bn-item{flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; padding:6px 4px;
    color:var(--faint); font-size:10.5px; font-weight:600; border-radius:10px}
  .bn-item svg{width:21px;height:21px}
  .bn-item.active{color:var(--petrol)}
  .bn-item.active svg{color:var(--petrol)}
  .form-grid{grid-template-columns:1fr}
  .modal-body{max-height:72vh}
  .fl select,.fl input{max-width:46vw}
}
@media (max-width:520px){
  .role-chip .txt{display:none}
}
</style>
</head>
<body>

<!-- ===================== LOGIN ===================== -->
<div id="login">
  <div class="login-card">
    <div class="brand">
      <span class="mark" id="markLogin"></span>
      <span class="name">KLIN<b>KLIN</b></span>
    </div>
    <div class="sub">Sistem ERP</div>
    <div class="pin-wrap">
      <input id="pin" class="pin-input" type="password" inputmode="text" autocomplete="off"
             placeholder="• • • • • •" />
      <button class="pin-eye" id="togglePin" title="Tampilkan PIN" aria-label="Tampilkan PIN"></button>
    </div>
    <button class="btn-login" id="btnLogin">Masuk</button>
    <div class="login-err" id="loginErr"></div>
    <div class="login-foot">
      Belum terhubung? <a id="openSetupLogin">Atur alamat server</a>
    </div>
  </div>
</div>

<!-- ===================== APP ===================== -->
<div id="app">
  <div class="topbar">
    <span class="mark" id="markTop"></span>
    <span class="tt">KLIN<b>KLIN</b></span>
    <div class="role-chip">
      <span class="dot"></span><span class="txt" id="roleLabel"></span>
    </div>
    <button class="icon-btn" id="btnSettings" title="Pengaturan" aria-label="Pengaturan"></button>
    <button class="icon-btn" id="btnLogout" title="Keluar" aria-label="Keluar"></button>
  </div>

  <div class="layout">
    <aside class="sidebar">
      <div class="side-label">Menu</div>
      <nav id="navDesktop"></nav>
    </aside>
    <main class="main" id="content"></main>
  </div>

  <nav class="bottom-nav" id="navMobile"></nav>
</div>

<!-- ===================== MODAL ===================== -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modalTitle">Form</h3>
      <button class="x" id="modalClose" aria-label="Tutup"></button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-foot">
      <button class="btn btn-ghost" id="modalCancel">Batal</button>
      <button class="btn btn-primary" id="modalSave">Simpan</button>
    </div>
  </div>
</div>

<div id="sync"><span class="s"></span><span class="t"></span></div>
<div id="imgPop"><img id="imgPopImg" src="" alt="Bukti"></div>
<div id="toast"></div>

<script>
/* ============================================================
   KLINKLIN ERP — Frontend
   ============================================================ */
const CABANG = ['SURABAYA','MALANG','GRESIK','KEDIRI','BOJONEGORO',
                'SAMARINDA','BALIKPAPAN','DENPASAR','TABANAN','MAKASSAR'];
const JABATAN = ['Cleaner','CS','Supervisor','Admin','Driver','HRD','Finance'];
const STATUS_KARYAWAN = ['Tetap','Kontrak','Harian','Magang'];
const STATUS_ORDER = ['pending','done','complete','cancel'];
const CHAT_DARI = ['organik','iklan','lama'];
const METODE = ['BCA','MANDIRI','CASH','QRIS'];
const JENIS_BONUS = ['Kilometer','Bonus Deepclean','Bonus Salon','Tips','Parkir','Lembur','Uang Makan','Bonus Lainnya'];

const PPN_DEFAULT = 11; // PPn otomatis 11%

/* Info per cabang untuk kop invoice. Surabaya sesuai contoh; cabang lain
   silakan lengkapi alamat & telepon. Email otomatis pola klinklin.<cabang>. */
const BRANCH_INFO = {
  SURABAYA:{ alamat:'Jl. Mojo Kidul No. 23, Mojo, Gubeng, Surabaya, Jawa Timur 62085', phone:'(+62) 89-7747-5656' }
};
function branchInfo(cabang){
  const c = String(cabang||'').toUpperCase();
  const base = BRANCH_INFO[c] || { alamat:'-', phone:'-' };
  return { cabang:c, alamat:base.alamat, phone:base.phone,
           email:'klinklin.'+c.toLowerCase()+'@gmail.com' };
}
const INVOICE_BANK = [
  { bank:'Bank Mandiri', no:'1780022255554', an:'KlinKlin Indonesia Group' },
  { bank:'Bank BCA',     no:'8640679949',    an:'KlinKlin Indonesia Group' }

function getApiUrl(){ return localStorage.getItem('klinklin_api') || ''; }
function setApiUrl(u){ localStorage.setItem('klinklin_api', u.trim()); }

/* ---------- API ---------- */
async function api(payload){
  const url = getApiUrl();
  if(!url) throw new Error('Alamat server belum diatur.');
  const res = await fetch(url, {
    method:'POST', redirect:'follow',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify(payload)
  });
  const txt = await res.text();
  let data; try{ data = JSON.parse(txt); }catch(e){ throw new Error('Respons server tidak valid.'); }
  if(data && data.ok===false) throw new Error(data.error || 'Gagal');
  return data;
}
function setSync(on, text){
  const el=$('#sync'); if(!el) return;
  if(on){ el.classList.remove('done'); el.classList.add('show');
    el.querySelector('.t').textContent = text||'Menyinkronkan…'; }
  else { el.classList.remove('show'); }
}
function syncDone(n){
  const el=$('#sync'); if(!el) return;
  el.classList.add('show','done');
  el.querySelector('.t').textContent = '✓ '+n+' data tersinkron';
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'), 2200);
}
const showLoad = on => setSync(on);
function openImg(url){ if(!url) return; $('#imgPopImg').src=url; $('#imgPop').classList.add('show'); }
function closeImg(){ $('#imgPop').classList.remove('show'); $('#imgPopImg').src=''; }
let toastT;
function toast(msg, type){
  const t=$('#toast'); t.textContent=msg; t.className=''; if(type)t.classList.add(type);
  t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2600);
}

/* ---------- FORMAT ---------- */
const rp = n => 'Rp ' + Number(n||0).toLocaleString('id-ID');
function isMoney(key){
  if(key.indexOf('%')>-1 || key.indexOf('Qty')===0) return false;
  return MONEY_HINT.some(h=>key.indexOf(h)>-1);
}
function initials(name){ return (name||'?').trim().split(/\s+/).slice(0,2).map(w=>w[0]||'').join('').toUpperCase(); }
const norm = s=>String(s==null?'':s).trim().toLowerCase();
function ymd(d){ const x=new Date(d); const m=String(x.getMonth()+1).padStart(2,'0'); const day=String(x.getDate()).padStart(2,'0'); return x.getFullYear()+'-'+m+'-'+day; }
function startOfWeek(d){ const x=new Date(d); const off=(x.getDay()+6)%7; x.setDate(x.getDate()-off); return x; }

function initLogin(){
  $('#markLogin').innerHTML = MARK;
  $('#togglePin').innerHTML = svg('audit');
  $('#togglePin').addEventListener('click', ()=>{
    const inp=$('#pin'); inp.type = inp.type==='password'?'text':'password';
  });
  $('#pin').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
  $('#btnLogin').addEventListener('click', doLogin);
  $('#openSetupLogin').addEventListener('click', openSettingsStandalone);
  if(!getApiUrl()){ setTimeout(openSettingsStandalone, 250); }
}

async function doLogin(){
  const pin = $('#pin').value.trim();
  $('#loginErr').textContent='';
  if(!pin){ $('#loginErr').textContent='Masukkan PIN.'; return; }
  if(!getApiUrl()){ openSettingsStandalone(); return; }
  showLoad(true);
  try{
    const r = await api({action:'login', pin});
    state.session = {role:r.role, cabang:r.cabang||'', nama:r.nama||r.role};
    localStorage.setItem('klinklin_session', JSON.stringify(state.session));
    enterApp();
  }catch(err){ $('#loginErr').textContent = err.message; }
  finally{ showLoad(false); }
}
function logout(){
  localStorage.removeItem('klinklin_session');
  state.session=null; state.cache={};
  $('#app').style.display='none'; $('#login').style.display='grid';
  $('#pin').value='';
}

function buildToolbar(){
  const v=state.view; let html='';
  if(v.search){
    html += '<div class="search">'+svg('search')+'<input id="q" placeholder="Cari…" /></div>';
  }
  (v.filters||[]).forEach(fld=>{
    if(v.branchLock && fld==='Cabang') return;
    let opts = FILTER_OPTS[fld] || [];
    if(fld==='Periode Bulan'){
      html += '<div class="fl"><span class="lbl">'+fld+'</span><input type="month" data-filter="'+fld+'"></div>';
    }else{
      html += '<div class="fl"><span class="lbl">'+fld+'</span><select data-filter="'+fld+'"><option value="">Semua</option>'+
        opts.map(o=>'<option>'+o+'</option>').join('')+'</select></div>';
    }
  });
  if(v.datePreset){
    html += '<div class="fl"><span class="lbl">Tanggal</span>'+
      '<select id="dpreset">'+
        '<option value="">Semua</option>'+
        '<option value="today">Hari ini</option>'+
        '<option value="yesterday">Kemarin</option>'+
        '<option value="week">Minggu ini</option>'+
        '<option value="range">Rentang tanggal…</option>'+
      '</select>'+
      '<span id="dprange" class="hide"> <input type="date" id="ds"> <input type="date" id="de"></span>'+
      '</div>';
  } else if(v.dateFilterField){
    html += '<div class="fl"><span class="lbl">'+v.dateFilterField+'</span>'+
      '<input type="date" id="ds" title="Dari tanggal"> <input type="date" id="de" title="Sampai tanggal"></div>';
  }
  $('#toolbar').innerHTML = html;
  if(v.search){
    let t; $('#q').addEventListener('input', e=>{ state.search=e.target.value.toLowerCase();
      clearTimeout(t); t=setTimeout(renderTable,160); });
  }
  document.querySelectorAll('[data-filter]').forEach(el=>{
    el.addEventListener('change', e=>{ state.filters[el.dataset.filter]=e.target.value; renderTable(); });
  });
  const ds=$('#ds'), de=$('#de');
  if(ds) ds.addEventListener('change', e=>{ state.dateStart=e.target.value; renderTable(); });
  if(de) de.addEventListener('change', e=>{ state.dateEnd=e.target.value; renderTable(); });
  const dp=$('#dpreset');
  if(dp) dp.addEventListener('change', e=>{
    const val=e.target.value, range=$('#dprange'), now=new Date();
    range.classList.toggle('hide', val!=='range');
    if(val==='today'){ const t=ymd(now); state.dateStart=t; state.dateEnd=t; }
    else if(val==='yesterday'){ const y=new Date(now); y.setDate(y.getDate()-1); const t=ymd(y); state.dateStart=t; state.dateEnd=t; }
    else if(val==='week'){ state.dateStart=ymd(startOfWeek(now)); state.dateEnd=ymd(now); }
    else if(val==='range'){ state.dateStart=ds?ds.value:''; state.dateEnd=de?de.value:''; }
    else { state.dateStart=''; state.dateEnd=''; }
    renderTable();
  });
}

async function loadList(){
  const v=state.view;
  setSync(true);
  try{
    const payload={action:'list', sheet:v.sheet};
    if(v.statusIn){ payload.statusIn=v.statusIn; payload.statusField=v.statusField; }
    if(v.branchLock){ payload.filters={'Cabang':state.session.cabang}; }
    const r = await api(payload);
    state.rows = r.data || [];
    renderTable();
    syncDone(state.rows.length);
  }catch(err){ setSync(false); toast(err.message,'err'); $('#panel').innerHTML=emptyState('Gagal memuat data'); }
}

function applyClientFilters(rows){
  const v=state.view;
  let out = rows.slice();
  Object.keys(state.filters).forEach(k=>{
    const val=state.filters[k]; if(!val) return;
    out = out.filter(r=>norm(r[k])===norm(val));
  });
  if(v.dateFilterField && (state.dateStart||state.dateEnd)){
    out = out.filter(r=>{
      const d=String(r[v.dateFilterField]||''); if(!d) return false;
      if(state.dateStart && d<state.dateStart) return false;
      if(state.dateEnd && d>state.dateEnd) return false;
      return true;
    });
  }
  if(state.search && v.search){
    out = out.filter(r=> v.search.some(k=>String(r[k]||'').toLowerCase().indexOf(state.search)>-1));
  }
  return out;
}

function renderTable(){
  const v=state.view;
  const rows = applyClientFilters(state.rows);
  if(!rows.length){ $('#panel').innerHTML=emptyState('Belum ada data'); $('#count').textContent=''; return; }
  const cols=v.table;
  const showAct = v.canEdit || v.approve || v.invoice;
  let html='<div class="tbl-wrap"><table><thead><tr>'+
    cols.map(c=>'<th>'+c+'</th>').join('')+ (showAct?'<th></th>':'') +'</tr></thead><tbody>';
  rows.forEach(r=>{
    html += '<tr>'+cols.map(c=>'<td'+(isMoney(c)?' class="money"':'')+'>'+cell(v,c,r)+'</td>').join('');
    if(showAct){
      let act='<div class="row-act">';
      if(v.approve){ const st=norm(r['Status Order'])||'pending';
        if(st==='pending'||st==='done'){
        act += '<button class="btn btn-gold btn-sm" data-approve="'+esc(r['ID Order'])+'">'+svg('check')+'Approve</button>';
      }}
      if(v.invoice && (norm(r['Status Order'])==='done' || norm(r['Status Order'])==='complete' || r['Bukti Transfer'])){
        act += '<button class="act-ic" data-invoice="'+esc(r['ID Order'])+'" title="Download Invoice PDF">'+svg('file')+'</button>';
      }
      if(v.canEdit){
        const locked = v.lockAfterProof && (r['Bukti Transfer'] || r['Bukti Cancel']);
        if(locked){
          act += '<span class="act-ic" title="Terkunci — sudah ada bukti transfer/cancel" style="opacity:.4;cursor:not-allowed">'+svg('check')+'</span>';
        }else{
          act += '<button class="act-ic" data-edit="'+esc(r[v.idField])+'" title="Edit">'+svg('edit')+'</button>';
        }
      }
      act+='</div>';
      html += '<td>'+act+'</td>';
    }
    html += '</tr>';
  });
  html+='</tbody></table></div>';
  $('#panel').innerHTML=html;
  $('#count').textContent = rows.length+' data';
  document.querySelectorAll('[data-edit]').forEach(b=>b.addEventListener('click',()=>{
    const row=state.rows.find(x=>String(x[v.idField])===b.dataset.edit); openForm(row);
  }));
  document.querySelectorAll('[data-invoice]').forEach(b=>b.addEventListener('click',()=>{
    const row=state.rows.find(x=>String(x['ID Order'])===b.dataset.invoice); downloadInvoice(row);
  }));
  document.querySelectorAll('[data-approve]').forEach(b=>b.addEventListener('click',()=>approveOrder(b.dataset.approve)));
}

function cell(v,c,r){
  const val=r[c];
  if(c==='Foto Profil'){
    return val ? '<img class="avatar" src="'+esc(val)+'" onerror="this.replaceWith(Object.assign(document.createElement(\'div\'),{className:\'avatar\',textContent:\''+initials(r['Nama Lengkap'])+'\'}))">'
               : '<div class="avatar">'+initials(r['Nama Lengkap'])+'</div>';
  }
  if(/^Bukti/.test(c)){
    return val ? '<a class="flink" data-img="'+esc(val)+'" style="cursor:zoom-in">Lihat</a>' : '<span style="color:var(--faint)">—</span>';
  }
  if(/File|Invoice/.test(c)){
    return val ? '<a class="flink" href="'+esc(val)+'" target="_blank" rel="noopener">Lihat</a>' : '<span style="color:var(--faint)">—</span>';
  }
  if(c==='Status Order' && v.statusBadge){
    const s=norm(val)||'pending'; return '<span class="badge b-'+s+'"><span class="d"></span>'+s+'</span>';
  }
  if(c==='Take Home Pay') return '<span class="thp">'+rp(val)+'</span>';
  if(isMoney(c)) return rp(val);
  return val!=null && val!=='' ? esc(val) : '<span style="color:var(--faint)">—</span>';
}
function emptyState(msg){
  return '<div class="empty">'+svg('inbox')+'<b>'+msg+'</b><span>Tambahkan data baru atau ubah filter.</span></div>';
}
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

async function approveOrder(id){

  setSync(true);
  try{ await api({action:'approveOrder', id}); toast('Order '+id+' disetujui','ok'); await loadList(); }

/* ============================================================
   FORM (ADD / EDIT)
   ============================================================ */
async function openForm(row){
  const v=state.view;
  state.editing = row; state.files={};
  $('#modalTitle').textContent = (row?'Edit ':'Tambah ')+v.title;

  // Finance (tanpa branchLock): muat ulang daftar cleaner sesuai cabang order ini.
  if(!v.branchLock) state.cache.cleaner = undefined;

  // prefetch lists needed for datalists
  await ensureLists(v);

  const data = row ? Object.assign({}, row) : defaults(v);
  let html='<div class="form-grid">';
  v.form.forEach(fd=>{
    if(fd.sec){ html += '<div class="sec-title">'+fd.sec+'</div>'; return; }
    html += renderField(fd, data[fd.k]);
  });
  html+='</div>';
  $('#modalBody').innerHTML=html;
  wireFields(v);
  if(v.special==='gaji') recomputeGaji();
  if(v.special==='order'){ recomputeOrder(); if(row && row['Bukti Transfer']) showInvoiceBtn(); }
  openOverlay();
}
function defaults(v){
  const d={}; const today=ymd(new Date());
  if(v.sheet==='ORDER'){ d['Tanggal Input']=today; d['Status Order']='pending';
    d['Cabang']=state.session.cabang; d['CS Penanggung Jawab']=state.session.nama;
    d['PPn']=PPN_DEFAULT; }
  if(v.sheet==='BONUS'){ d['Tanggal Input']=today; }
  if(v.sheet==='GAJI'){ d['Tanggal Cetak']=today; }
  return d;
}
function renderField(fd, val){
  const id='fld_'+fd.k.replace(/[^a-z0-9]/gi,'_');
  const full = fd.full || fd.t==='textarea' ? ' full':'';
  const comp = fd.computed ? ' computed':'';
  let inner='';
  const ro = fd.ro || fd.computed ? ' readonly' : '';
  val = val==null?'':val;
  if(fd.t==='select'){
    inner = '<select data-k="'+esc(fd.k)+'"'+ro+'>'+
      '<option value=""></option>'+
      (fd.opts||[]).map(o=>'<option'+(String(o)===String(val)?' selected':'')+'>'+esc(o)+'</option>').join('')+'</select>';
  } else if(fd.t==='textarea'){
    inner = '<textarea data-k="'+esc(fd.k)+'"'+ro+'>'+esc(val)+'</textarea>';
  } else if(fd.t==='file'){
    const has = val ? '<a class="file-name" href="'+esc(val)+'" target="_blank">File tersimpan</a>' : '';
    inner = '<div class="file-row">'+
      '<img class="prev" data-prev="'+esc(fd.k)+'"'+(val?' src="'+esc(val)+'" style="display:block"':'')+'>'+
      '<label class="file-btn">'+svg('upload')+'Pilih file'+
      '<input type="file" data-file="'+esc(fd.k)+'" accept="'+(fd.accept||'')+'" style="display:none"></label>'+
      '<span class="file-name" data-fn="'+esc(fd.k)+'">'+has+'</span></div>';
  } else if(fd.t==='datalist'){
    inner = '<input data-k="'+esc(fd.k)+'" list="'+id+'_dl" autocomplete="off"'+ro+' value="'+esc(val)+'">'+
      '<datalist id="'+id+'_dl" data-dl="'+esc(fd.list)+'"></datalist>';
  } else if(fd.t==='dynselect'){
    const items=(state.cache[fd.list]||[]);
    let opts=items.map(e=>e['Nama Lengkap']).filter(Boolean);
    if(val && opts.indexOf(val)<0) opts=[val].concat(opts);
    inner = '<select data-k="'+esc(fd.k)+'"'+ro+'><option value=""></option>'+
      opts.map(o=>'<option'+(String(o)===String(val)?' selected':'')+'>'+esc(o)+'</option>').join('')+'</select>';
  } else {
    let type = fd.t==='num'?'number': fd.t==='date'?'date': fd.t==='month'?'month':'text';
    inner = '<input type="'+type+'" data-k="'+esc(fd.k)+'"'+ro+' value="'+esc(val)+'">';
  }
  return '<div class="field'+full+comp+'"><label>'+esc(fd.k)+(fd.req?' <span class="req">*</span>':'')+'</label>'+inner+'</div>';
}

/* prefetch datalist sources */
async function ensureLists(v){
  const needs = new Set();
  v.form && v.form.forEach(fd=>{ if(fd.list) needs.add(fd.list); });
  if(needs.has('karyawan') && !state.cache.karyawan){
    state.cache.karyawan = (await api({action:'list', sheet:'KARYAWAN'})).data||[];
  }
  if(needs.has('cleaner') && !state.cache.cleaner){
    const cab = state.session.cabang || (state.editing && state.editing['Cabang']) || '';
    const r = await api({action:'list', sheet:'KARYAWAN', filters: cab?{'Cabang':cab}:{}});
    state.cache.cleaner = (r.data||[]).filter(e=>String(e['Jabatan']).trim().toLowerCase()==='cleaner');
  }
  if(needs.has('order') && !state.cache.order){
    const r = await api({action:'list', sheet:'ORDER', filters:{'Cabang':state.session.cabang}});
    state.cache.order = r.data||[];
  }
}
function fillDatalists(){
  document.querySelectorAll('[data-dl]').forEach(dl=>{
    const src=dl.dataset.dl; let items=[];
    if(src==='karyawan') items=(state.cache.karyawan||[]).map(e=>({v:e['ID Karyawan'], t:e['Nama Lengkap']}));
    if(src==='cleaner') items=(state.cache.cleaner||[]).map(e=>({v:e['Nama Lengkap'], t:e['Jabatan']}));
    if(src==='order') items=(state.cache.order||[]).map(o=>({v:o['ID Order'], t:o['Nama Customer']}));
    dl.innerHTML = items.map(i=>'<option value="'+esc(i.v)+'">'+esc(i.t||'')+'</option>').join('');
  });
}

/* wire inputs: computed, file uploads, special lookups */
function wireFields(v){
  fillDatalists();
  // klik pratinjau gambar -> popup
  document.querySelectorAll('[data-prev]').forEach(im=>{
    im.style.cursor='zoom-in';
    im.addEventListener('click', ()=>{ if(im.getAttribute('src')) openImg(im.getAttribute('src')); });
  });
  // file inputs
  document.querySelectorAll('[data-file]').forEach(inp=>{
    inp.addEventListener('change', async e=>{
      const file=e.target.files[0]; if(!file) return;
      const key=inp.dataset.file;
      const fn=document.querySelector('[data-fn="'+CSS.escape(key)+'"]');
      fn.textContent='Mengunggah…';
      try{
        const b64 = await fileToB64(file);
        const r = await api({action:'uploadFile', base64:b64, mime:file.type, name:file.name});
        state.files[key]=r.url;
        fn.innerHTML='<a class="file-name" href="'+esc(r.url)+'" target="_blank">Tersimpan ✓</a>';
        const prev=document.querySelector('[data-prev="'+CSS.escape(key)+'"]');
        if(prev && /image/.test(file.type)){ prev.src=r.url; prev.style.display='block'; }
        // auto status order
        if(v.special==='order'){
          if(key==='Bukti Transfer'){ setVal('Status Order','done'); showInvoiceBtn(); }
          if(key==='Bukti Cancel') setVal('Status Order','cancel');
        }
      }catch(err){ fn.textContent='Gagal'; toast(err.message,'err'); }
    });
  });
  // recompute triggers
  if(v.special==='order'){
    ['Qty 1','Harga 1','Qty 2','Harga 2','Qty 3','Harga 3','Diskon (%)','PPn'].forEach(k=>{
      const el=getEl(k); if(el) el.addEventListener('input', recomputeOrder);
    });
  }
  if(v.special==='gaji'){
    GAJI_BONUS_FIELDS.concat(GAJI_POTONGAN_FIELDS, GAJI_TUNJANGAN_FIELDS, ['Gaji Pokok']).forEach(k=>{
      const el=getEl(k); if(el) el.addEventListener('input', recomputeGaji);
    });
    const idk=getEl('ID Karyawan'); if(idk) idk.addEventListener('change', onPickKaryawan);
    const per=getEl('Periode Bulan'); if(per) per.addEventListener('change', onPickPeriode);
  }
  if(v.special==='bonus'){
    const no=getEl('No Order'); if(no) no.addEventListener('change', onPickOrder);
  }
}

/* ---------- field helpers ---------- */
function getEl(k){ return document.querySelector('[data-k="'+CSS.escape(k)+'"]'); }
function getVal(k){ const e=getEl(k); return e? e.value : ''; }
function numVal(k){ return Number(getVal(k)||0); }
function setVal(k,v){ const e=getEl(k); if(e) e.value=(v==null?'':v); }

/* kumpulkan nilai form order saat ini (untuk invoice) */
function collectOrderForm(){
  const v=state.view;
  const data = state.editing ? Object.assign({}, state.editing) : {};
  (v.form||[]).forEach(fd=>{
    if(fd.sec) return;
    if(fd.t==='file'){ if(state.files[fd.k]) data[fd.k]=state.files[fd.k]; }
    else data[fd.k]=getVal(fd.k);
  });
  data['Cabang'] = v.branchLock ? state.session.cabang : (data['Cabang']||state.session.cabang||'');
  return data;
}
/* tampilkan tombol unduh invoice di dalam form setelah bukti TF terunggah */
function showInvoiceBtn(){
  const fnEl=document.querySelector('[data-fn="Bukti Transfer"]');
  if(!fnEl || fnEl.querySelector('.inv-btn')) return;
  const b=document.createElement('button');
  b.type='button'; b.className='btn btn-gold btn-sm inv-btn'; b.style.marginLeft='8px';

/* ---------- special recompute ---------- */
function recomputeOrder(){
  const total = numVal('Qty 1')*numVal('Harga 1') + numVal('Qty 2')*numVal('Harga 2') + numVal('Qty 3')*numVal('Harga 3');
  const disc = numVal('Diskon (%)'), ppn = numVal('PPn');
  const afterDisc = total*(1-disc/100);
  const final = Math.round(afterDisc*(1+ppn/100));
  setVal('Total Akhir', total);
  setVal('Total Akhir Setelah Diskon', final);
  setVal('Total Tagihan', final);
}
function recomputeGaji(){
  let bonus=0; GAJI_BONUS_FIELDS.forEach(k=>bonus+=numVal(k));
  let pot=0; GAJI_POTONGAN_FIELDS.forEach(k=>pot+=numVal(k));
  let tun=0; GAJI_TUNJANGAN_FIELDS.forEach(k=>tun+=numVal(k));
  const pokok=numVal('Gaji Pokok');
  const thp = pokok + bonus + tun - pot;
  setVal('Total Bonus', bonus);
  setVal('Total Potongan', pot);
  setVal('Take Home Pay', thp);
  setVal('Gaji Diterima', thp);
}
async function onPickKaryawan(){
  const id=getVal('ID Karyawan');
  const emp=(state.cache.karyawan||[]).find(e=>String(e['ID Karyawan'])===id);
  if(!emp) return;
  setVal('Nama Karyawan', emp['Nama Lengkap']);
  setVal('Cabang', emp['Cabang']); setVal('Jabatan', emp['Jabatan']); setVal('Status', emp['Status']);
  try{
    const gp=await api({action:'gajiPokok', cabang:emp['Cabang'], jabatan:emp['Jabatan'], status:emp['Status']});
    if(gp.found){ setVal('Gaji Pokok', gp.gajiPokok); setVal('Tunjangan Kos', gp.tunjanganKos); setVal('Tunjangan Kerja', gp.tunjanganKerja); }
  }catch(e){}
  await onPickPeriode();
}
async function onPickPeriode(){
  const per=getVal('Periode Bulan'); const nama=getVal('Nama Karyawan');
  if(!per){ recomputeGaji(); return; }
  const [y,m]=per.split('-').map(Number);
  const start=per+'-01';
  const end=per+'-'+String(new Date(y,m,0).getDate()).padStart(2,'0');
  try{
    const r=await api({action:'bonusSummary', namaCleaner:nama, start, end});
    Object.keys(r.totals||{}).forEach(k=>setVal(k, r.totals[k]));
    setVal('Awal Periode', r.awal||start);
    setVal('Akhir Periode', r.akhir||end);
  }catch(e){ setVal('Awal Periode',start); setVal('Akhir Periode',end); }
  recomputeGaji();
}
function onPickOrder(){
  const id=getVal('No Order');
  const o=(state.cache.order||[]).find(x=>String(x['ID Order'])===id);
  if(!o) return;
  setVal('Nama Cleaner', o['Nama Cleaner']);
  setVal('Nama Customer', o['Nama Customer']);
  setVal('Tanggal Pengerjaan', o['Tanggal Pengerjaan']);
}

async function downloadInvoice(o){
  if(!o){ toast('Data order tidak ditemukan','err'); return; }
  if(typeof html2pdf==='undefined'){ toast('Modul PDF belum siap, coba lagi','err'); return; }
  setSync(true,'Membuat invoice…');
  const holder=document.createElement('div');
  holder.style.position='fixed'; holder.style.left='-9999px'; holder.style.top='0';
  holder.innerHTML=buildInvoiceHTML(o);
  document.body.appendChild(holder);
  try{
    await html2pdf().set({
      margin:[8,8,8,8], filename:'Invoice-'+(o['ID Order']||'KLINKLIN')+'.pdf',
      image:{type:'jpeg',quality:0.98},
      html2canvas:{scale:2, useCORS:true, backgroundColor:'#ffffff'},
      jsPDF:{unit:'mm', format:'a4', orientation:'portrait'}
    }).from(holder.firstElementChild).save();
    toast('Invoice diunduh','ok');
  }catch(e){ toast('Gagal membuat invoice','err'); }
  finally{ holder.remove(); setSync(false); }
}

/* ---------- save ---------- */
async function saveForm(){
  const v=state.view;
  const data = state.editing ? Object.assign({}, state.editing) : {};
  // collect field values
  v.form.forEach(fd=>{
    if(fd.sec) return;
    if(fd.t==='file'){
      if(state.files[fd.k]) data[fd.k]=state.files[fd.k];
    }else{
      data[fd.k]=getVal(fd.k);
    }
  });
  // enforce branch & cs
  if(v.sheet==='ORDER' && v.branchLock){ data['Cabang']=state.session.cabang; }
  if(v.sheet==='BONUS' && !data['Tanggal Input']) data['Tanggal Input']=new Date().toISOString().slice(0,10);

  // validation
  const miss=[];
  v.form.forEach(fd=>{ if(fd.req && !String(data[fd.k]||'').trim()) miss.push(fd.k); });
  if(miss.length){ toast('Wajib diisi: '+miss.join(', '),'err'); return; }

  setSync(true);
  try{
    if(state.editing){
      await api({action:'update', sheet:v.sheet, idField:v.idField, id:state.editing[v.idField], data});
      toast('Perubahan tersimpan','ok');
    }else{
      await api({action:'create', sheet:v.sheet, data});
      toast('Data ditambahkan','ok');
    }
    closeOverlay();
    state.cache[ {ORDER:'order', KARYAWAN:'karyawan'}[v.sheet] ] = undefined; // refresh caches
    await loadList();
  }catch(err){ setSync(false); toast(err.message,'err'); }
}

function fileToB64(file){
  return new Promise((res,rej)=>{ const r=new FileReader();
    r.onload=()=>res(String(r.result).split(',')[1]); r.onerror=rej; r.readAsDataURL(file); });
}

<script>
    // MASUKKAN URL WEB APP ANDA DI SINI
    const API_URL = 'https://script.google.com/macros/s/AKfycbx1QVFaJIzjTHSt4yUcsljSslMpYlTBb-eYP0Kz-xf9U0Pkat7kuj-83Cag3D_xCg7L/exec';

    // Konfigurasi Global
    const SETTING_PREMI_BPJS = 35000;
    let currentUser = null;

    // Utilitas Format Rupiah
    const formatRp = (angka) => 'Rp ' + parseFloat(angka).toLocaleString('id-ID');

    // FUNGSI KOMUNIKASI API (PENGGANTI google.script.run)
    async function apiCall(action, payload = {}) {
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // Menggunakan text/plain mencegah error CORS preflight
          body: JSON.stringify({ action: action, ...payload })
        });
        return await response.json();
      } catch (error) {
        console.error("API Error:", error);
        alert("Terjadi kesalahan jaringan atau server.");
        return null;
      }
    }

    function getGreeting() {
      const h = new Date().getHours();
      if(h < 11) return 'Selamat Pagi';
      if(h < 15) return 'Selamat Siang';
      if(h < 18) return 'Selamat Sore';
      return 'Selamat Malam';
    }

    async function doLogin() {
      const em = document.getElementById('loginEmail').value;
      const pw = document.getElementById('loginPassword').value;
      const msg = document.getElementById('loginMsg');
      const btn = document.getElementById('btnLogin');
      
      if(!em || !pw) {
        msg.innerText = "Isi email dan password.";
        msg.classList.remove('hidden');
        return;
      }
      
      btn.innerText = "Loading...";
      
      // Memanggil API via Fetch
      const res = await apiCall('login', { email: em, password: pw });
      
      if(res && res.success) {
        currentUser = res.user;
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('dashboardScreen').classList.remove('hidden');
        
        document.getElementById('greetingText').innerText = `${getGreeting()}, ${currentUser.nama} (${currentUser.jabatan})`;
        
        if(currentUser.role === 'HRD') {
          document.getElementById('menuHRD').classList.remove('hidden');
          document.getElementById('menuFinance').classList.add('hidden');
          showPage('pagePenggajian');
          initHRD();
        } else {
          document.getElementById('menuFinance').classList.remove('hidden');
          document.getElementById('menuHRD').classList.add('hidden');
          showPage('pageAuditOrder');
          loadOrders('Done');
        }
      } else if (res) {
        msg.innerText = res.message;
        msg.classList.remove('hidden');
        btn.innerText = "LOGIN";
      }
    }

    function logout() { location.reload(); }

    function showPage(pageId) {
      document.querySelectorAll('.page-content').forEach(el => el.classList.add('hidden'));
      document.getElementById(pageId).classList.remove('hidden');
    }

    function showLoader() { document.getElementById('loader').classList.remove('hidden'); }
    function hideLoader() { document.getElementById('loader').classList.add('hidden'); }

    // HRD LOGIC
    async function initHRD() {
      const res = await apiCall('getFilterData');
      if(res) {
        let opt = '<option value="">-- Pilih Cabang --</option>';
        res.cabang.forEach(c => opt += `<option value="${c}">${c}</option>`);
        document.getElementById('selCabang').innerHTML = opt;
      }
    }

    async function loadCleaners() {
      const cbg = document.getElementById('selCabang').value;
      if(!cbg) return;
      showLoader();
      const res = await apiCall('getCleanersByCabang', { cabang: cbg });
      if(res) {
        let opt = '<option value="">-- Pilih Cleaner --</option>';
        res.forEach(n => opt += `<option value="${n}">${n}</option>`);
        document.getElementById('selCleaner').innerHTML = opt;
      }
      hideLoader();
    }

    async function tarikDataInsentif() {
      const cabang = document.getElementById('selCabang').value;
      const nama = document.getElementById('selCleaner').value;
      const t1 = document.getElementById('tglAwal').value;
      const t2 = document.getElementById('tglAkhir').value;
      
      if(!cabang || !nama || !t1 || !t2) return;

      const d = new Date(t2);
      const bulan = d.toLocaleString('id-ID', { month: 'long', year: 'numeric' });
      document.getElementById('infoPeriode').innerText = `Periode Bulan: ${bulan}`;

      showLoader();
      const res = await apiCall('kalkulasiGaji', { cabang, nama, tglAwal: t1, tglAkhir: t2 });
      if(res) {
        document.getElementById('valGajiPokok').value = res.master.gajiPokok;
        document.getElementById('valTjTrans').value = res.master.tjTransport;
        document.getElementById('valBonusBln').value = res.master.bonusBulanan;
        
        document.getElementById('valSalon').value = res.insentif.bonusSalon;
        document.getElementById('valDeepclean').value = res.insentif.bonusDeepclean;
        document.getElementById('valLembur').value = res.insentif.lembur;
        document.getElementById('valUangMakan').value = res.insentif.uangMakan;
        kalkulasiTotal();
      }
      hideLoader();
    }

    function kalkulasiTotal() {
      let totalMasuk = 0;
      document.querySelectorAll('.calc-income').forEach(el => totalMasuk += (parseFloat(el.value) || 0));
      document.getElementById('totPemasukan').innerText = formatRp(totalMasuk);

      const chkBPJS = document.getElementById('chkBPJS').checked;
      document.getElementById('valBPJSPot').value = chkBPJS ? SETTING_PREMI_BPJS : 0;

      let totalPotongan = 0;
      document.querySelectorAll('.calc-pot').forEach(el => totalPotongan += (parseFloat(el.value) || 0));
      document.getElementById('totPotongan').innerText = formatRp(totalPotongan);

      const thp = totalMasuk - totalPotongan;
      document.getElementById('thpFinal').innerText = formatRp(thp);
    }

    // SLIP GAJI (Tetap Sama dengan Kode Sebelumnya)
    function generateSlipGaji() {
      document.getElementById('slipCabang').innerText = "KLINKLIN " + document.getElementById('selCabang').value;
      
      const t2 = document.getElementById('tglAkhir').value;
      const bln = new Date(t2).toLocaleString('en-US', { month: 'long', year: 'numeric' });
      document.getElementById('slipPeriode').innerText = bln;
      
      const nama = document.getElementById('selCleaner').value;
      document.getElementById('slipNama').innerText = nama;
      document.getElementById('slipTtdPenerima').innerText = nama;
      document.getElementById('slipTtdHRD').innerText = currentUser.nama;

      let htmlMasuk = '';
      const inMap = [
        ['Gaji', 'valGajiPokok'], ['Bonus Bulanan', 'valBonusBln'], ['Bonus Review', 'valReview'],
        ['Bonus Tanggal Merah', 'valTglMerah'], ['Bonus Salon', 'valSalon'], ['Bonus Deepclean', 'valDeepclean'],
        ['Tunjangan Transport', 'valTjTrans'], ['Tunjangan Kos', 'valKos'], ['Tunjangan Kerja', 'valKerja'],
        ['Lembur', 'valLembur'], ['Uang Makan', 'valUangMakan']
      ];
      
      inMap.forEach(i => {
        let val = document.getElementById(i[1]).value;
        if(val && parseFloat(val) > 0 || i[0] === 'Gaji' || i[0] === 'Bonus Bulanan') {
           htmlMasuk += `<tr><td>${i[0]}</td><td>${formatRp(val)}</td></tr>`;
        }
      });
      
      if(!document.getElementById('chkBPJS').checked){
         htmlMasuk += `<tr><td>Premi BPJS Kelas 3</td><td>Rp0</td></tr>`;
      }

      document.getElementById('slipBodyPemasukan').innerHTML = htmlMasuk;
      document.getElementById('slipGajiDiterima').innerText = document.getElementById('totPemasukan').innerText;

      let htmlPot = '';
      const outMap = [
        ['Cashbon', 'potCashbon'], ['Pot. Tidak Absen Pulang', 'potAbsenP'],
        ['Pot. Keterlambatan', 'potTelat'], ['Pot. Absen', 'potAbsen'],
        ['BPJS Ketenagakerjaan', 'potBPJSTK'], ['Potongan Lain', 'potLain']
      ];
      
      outMap.forEach(o => {
        let val = document.getElementById(o[1]).value;
        if(val && parseFloat(val) > 0) {
           let lbl = o[0] === 'Potongan Lain' ? document.getElementById('ketPotLain').value || 'Potongan Lain' : o[0];
           htmlPot += `<tr><td>${lbl}</td><td>${formatRp(val)}</td></tr>`;
        } else {
           htmlPot += `<tr><td>${o[0]}</td><td></td></tr>`;
        }
      });

      document.getElementById('slipBodyPotongan').innerHTML = htmlPot;
      document.getElementById('slipTotPotongan').innerText = document.getElementById('totPotongan').innerText;
      document.getElementById('slipTHP').innerText = document.getElementById('thpFinal').innerText;
      document.getElementById('slipSaldoJHT').innerText = formatRp(document.getElementById('saldoJHT').value || 0);
      
      document.getElementById('dashboardScreen').classList.add('no-print');
      document.getElementById('slipGajiPrintArea').classList.remove('hidden');
      window.print();
      
      setTimeout(() => {
        document.getElementById('dashboardScreen').classList.remove('no-print');
        document.getElementById('slipGajiPrintArea').classList.add('hidden');
      }, 500);
    }

    async function simpanSlipGaji() {
      // Fitur Simpan Gaji (Contoh Payload)
      const payload = {
        periodeStr: document.getElementById('slipPeriode').innerText,
        cabang: document.getElementById('selCabang').value,
        nama: document.getElementById('selCleaner').value,
        takeHomePay: document.getElementById('thpFinal').innerText
      };
      
      showLoader();
      const res = await apiCall('simpanPenggajian', { dataForm: payload });
      hideLoader();
      if(res && res.success) alert("Data berhasil disimpan ke Spreadsheet!");
    }

    // FINANCE LOGIC
    async function loadOrders(status) {
      showLoader();
      const res = await apiCall('getOrders', { status: status });
      if(res) {
        let html = '';
        res.forEach(o => {
          html += `
            <tr class="hover:bg-gray-100">
              <td class="p-3 font-medium text-premBlue">${o.idOrder}</td>
              <td class="p-3">${new Date(o.tanggal).toLocaleDateString('id-ID')}</td>
              <td class="p-3">${o.cabang}</td>
              <td class="p-3">${o.customer}<br><span class="text-xs text-gray-500">${o.alamat}</span></td>
              <td class="p-3 font-bold">${formatRp(o.tagihan)}</td>
              <td class="p-3 text-center">
                <button onclick="approve('${o.rowId}')" class="bg-green-600 text-white px-2 py-1 rounded text-xs hover:bg-green-700 shadow"><i class="fas fa-check"></i> Approve</button>
                <a href="${o.bukti}" target="_blank" class="bg-gray-500 text-white px-2 py-1 rounded text-xs hover:bg-gray-600 shadow ml-1"><i class="fas fa-image"></i> Bukti</a>
              </td>
            </tr>
          `;
        });
        document.getElementById('tblAuditOrder').innerHTML = html;
      }
      hideLoader();
    }

    async function approve(rowId) {
      if(!confirm("Approve order ini menjadi Complete?")) return;
      showLoader();
      const res = await apiCall('approveOrder', { rowId: rowId });
      if(res && res.success) {
        loadOrders('Done'); // Refresh
      }
      hideLoader();
    }
  </script>
